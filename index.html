  const simResults = simData?.results || [];
  const me = simResults.find(r => r.name === currentUser);
  const maxWin = simResults[0]?.winPct || 1;

  return (
    <div>
      <SectionHeader kicker="Monte Carlo · 20,000 simulations" title="Tournament Simulator"
        subtitle="Win probability estimates based on an Elo model from FIFA rankings. Updated by admin after each set of results." />

      {loading && (
        <div style={{ padding: 40, textAlign: 'center', color: 'var(--ink-soft)', fontSize: 14 }}>Loading…</div>
      )}

      {!loading && !simData && (
        <div className="card" style={{ padding: '40px 24px', textAlign: 'center', marginTop: 20 }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>🎲</div>
          <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 8 }}>Simulation not yet run</div>
          <div style={{ fontSize: 13, color: 'var(--ink-soft)', maxWidth: 340, margin: '0 auto' }}>
            Check back once results are in — the admin runs the simulation after each set of matches.
          </div>
        </div>
      )}

      {!loading && simData && (
        <div className="fadein">
          <div style={{ fontSize: 12, color: 'var(--ink-soft)', marginTop: 12, marginBottom: 16 }}>
            {simData.N?.toLocaleString()} simulations · after {simData.afterResults} match results
            {simData.runAt ? ' · ' + new Date(simData.runAt).toLocaleDateString('en-GB', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }) : ''}
            {simData.elapsed ? ' · took ' + (simData.elapsed/1000).toFixed(1) + 's' : ''}
          </div>

          {me && (
            <div className="card" style={{ padding: '16px 20px', marginBottom: 16, borderLeft: '3px solid var(--burgundy)' }}>
              <div style={{ fontSize: 11, color: 'var(--ink-soft)', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 6 }}>Your odds</div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 24, flexWrap: 'wrap' }}>
                <div>
                  <span style={{ fontSize: 36, fontWeight: 700, color: 'var(--burgundy)', lineHeight: 1 }}>{me.winPct.toFixed(1)}%</span>
                  <div style={{ fontSize: 12, color: 'var(--ink-soft)', marginTop: 2 }}>chance to win</div>
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                  <div style={{ fontSize: 13 }}>
                    <span style={{ color: 'var(--ink-soft)', marginRight: 6 }}>Top 3</span>
                    <span style={{ fontWeight: 700 }}>{me.top3Pct.toFixed(1)}%</span>
                  </div>
                  <div style={{ fontSize: 13 }}>
                    <span style={{ color: 'var(--ink-soft)', marginRight: 6 }}>Expected</span>
                    <span style={{ fontWeight: 700 }}>{me.expectedScore} pts</span>
                  </div>
                  <div style={{ fontSize: 13 }}>
                    <span style={{ color: 'var(--ink-soft)', marginRight: 6 }}>Currently</span>
                    <span style={{ fontWeight: 700 }}>{me.currentScore} pts</span>
                  </div>
                </div>
              </div>
            </div>
          )}

          <div className="card" style={{ padding: '18px 20px', marginBottom: 16 }}>
            <div className="micro-caps" style={{ marginBottom: 14 }}>\uD83C\uDFC6 Win Probability</div>
            {simResults.slice(0, Math.min(10, simResults.length)).map((r, i) => {
              const isMe = r.name === currentUser;
              const col = i===0?'#d6892a':i===1?'#9b9087':i===2?'#8b6e4e':isMe?'var(--burgundy)':'var(--forest)';
              return (
                <div key={r.name} style={{ display:'flex', alignItems:'center', gap:10, marginBottom:7 }}>
                  <span style={{ fontSize:11, color:'var(--ink-soft)', width:22, textAlign:'right', flexShrink:0 }}>
                    {i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}
                  </span>
                  <span style={{ fontSize:13, fontWeight:isMe?700:400, width:130, flexShrink:0, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
                    {r.name}
                  </span>
                  <div style={{ flex:1, height:12, background:'var(--cream-2)', borderRadius:2, overflow:'hidden', maxWidth:200 }}>
                    <div style={{ height:'100%', borderRadius:2, background:col, width:maxWin>0?(r.winPct/maxWin*100)+'%':'0%' }} />
                  </div>
                  <span style={{ fontSize:13, fontWeight:700, width:48, textAlign:'right' }} className="mono">
                    {r.winPct.toFixed(1)}%
                  </span>
                </div>
              );
            })}
          </div>

          <div className="card" style={{ overflow:'hidden', marginBottom:8 }}>
            <table style={{ width:'100%', borderCollapse:'collapse', fontSize:13 }}>
              <thead>
                <tr style={{ background:'var(--cream-2)', borderBottom:'1px solid var(--line)' }}>
                  <th style={{ padding:'9px 14px', textAlign:'left', fontWeight:600, width:32 }}>#</th>
                  <th style={{ padding:'9px 14px', textAlign:'left', fontWeight:600 }}>Participant</th>
                  <th style={{ padding:'9px 14px', textAlign:'right', fontWeight:600 }}>Win%</th>
                  <th style={{ padding:'9px 14px', textAlign:'right', fontWeight:600 }}>Top 3%</th>
                  <th style={{ padding:'9px 14px', textAlign:'right', fontWeight:600 }}>Exp</th>
                  <th style={{ padding:'9px 14px', textAlign:'right', fontWeight:600 }}>Now</th>
                  <th style={{ padding:'9px 14px', width:32 }}></th>
                </tr>
              </thead>
              <tbody>
                {simResults.map((r,i) => {
                  const isMe = r.name === currentUser;
                  return (
                    <SimTableRow key={r.name} r={r} i={i} isMe={isMe} leader={simResults[0]} allPredictions={allPredictions} />
                  );
                })}
              </tbody>
            </table>
          </div>
          <div style={{ fontSize:11, color:'var(--ink-soft)', textAlign:'right', marginBottom:16 }}>
            Elo model from FIFA rankings · team-based Golden Boot matching
          </div>
        </div>
      )}
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────
// BROWSE PICKS
// ──────────────────────────────────────────────────────────────────────
function BrowseView({ participants, allPredictions, results, profiles, currentUser }) {
  const [browseTab, setBrowseTab] = useState('participant');
  const [selected, setSelected] = useState(null);

  const sortedParticipants = useMemo(() => [...participants].sort((a, b) => a.localeCompare(b)), [participants]);
  const viewPreds = selected ? (allPredictions[selected] || { group: {}, ko: {} }) : null;

  return (
    <div>
      <SectionHeader kicker={participants.length + ' participants'} title="Browse Picks"
        subtitle="View predictions by participant or by match." />

      <div style={{ display:'flex', gap:0, borderBottom:'1px solid var(--line)', marginTop:16, marginBottom:20 }}>
        {[['participant','\uD83D\uDC64 By Participant'],['match','⚽ By Match'],['h2h','⚔️ Head to Head']].map(([key,label]) => (
          <button key={key} onClick={() => { setBrowseTab(key); setSelected(null); }}
            style={{ padding:'8px 18px', fontSize:13, fontWeight:browseTab===key?700:400, background:'none', border:'none', cursor:'pointer',
              color:browseTab===key?'var(--ink)':'var(--ink-soft)',
              borderBottom:browseTab===key?'2px solid var(--burgundy)':'2px solid transparent', marginBottom:-1 }}>
            {label}
          </button>
        ))}
      </div>

      {browseTab === 'participant' && <>
        <div style={{ display:'flex', flexWrap:'wrap', gap:8, marginBottom:20 }}>
          {sortedParticipants.map(p => {
            const isMe = p === currentUser;
            const isSel = p === selected;
            return (
              <button key={p} className="pill"
                onClick={() => setSelected(isSel ? null : p)}
                style={{ cursor:'pointer',
                  background:isSel?'var(--ink)':isMe?'rgba(27,94,63,0.1)':'var(--cream-2)',
                  color:isSel?'var(--cream)':'var(--ink)',
                  border:`1px solid ${isSel?'var(--ink)':isMe?'var(--forest)':'var(--line)'}`,
                  fontWeight:isSel?700:400, padding:'6px 12px', fontSize:13 }}>
                {p}{isMe?' (you)':''}</button>
            );
          })}
        </div>
        {!selected && <div style={{ textAlign:'center', padding:'40px 20px', color:'var(--ink-soft)', fontSize:14, fontStyle:'italic' }}>Tap a name above to view their picks</div>}
        {selected && viewPreds && (
          <div className="fadein">
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:16, flexWrap:'wrap', gap:8 }}>
              <div>
                <div className="display" style={{ fontSize:22, fontWeight:700 }}>{selected}</div>
                {profiles[selected] && <div style={{ fontSize:12, color:'var(--ink-soft)' }}>{profiles[selected].team && profiles[selected].team+' · '}{profiles[selected].country}</div>}
              </div>
              <button className="btn" style={{ fontSize:12, padding:'6px 12px', background:'var(--forest)', color:'white', display:'flex', alignItems:'center', gap:5 }}
                onClick={() => printPicks(viewPreds, selected, profiles)}>\uD83D\uDDB1️ Download as PDF</button>
            </div>
            <BrowseGroupStage predictions={viewPreds} results={results} />
            <div style={{ marginTop:20 }}>
              <div className="micro-caps" style={{ marginBottom:10 }}>Knockout Bracket</div>
              <BracketView predictions={viewPreds} onSave={() => {}} results={results} locked={true} />
            </div>
            <BrowseBonus predictions={viewPreds} />
          </div>
        )}
      </>}

      {browseTab === 'match' && (
        <MatchPicksView participants={participants} allPredictions={allPredictions}
          results={results} selected={selected} setSelected={setSelected} />
      )}
      {browseTab === 'h2h' && (
        <HeadToHeadView participants={participants} allPredictions={allPredictions}
          results={results} profiles={profiles} />
      )}
    </div>
  );
}


function HeadToHeadView({ participants, allPredictions, results, profiles }) {
  const [playerA, setPlayerA] = useState('');
  const [playerB, setPlayerB] = useState('');

  const sorted = useMemo(() => [...participants].sort((a,b) => a.localeCompare(b)), [participants]);

  const predsA = playerA ? (allPredictions[playerA] || { group:{}, ko:{} }) : null;
  const predsB = playerB ? (allPredictions[playerB] || { group:{}, ko:{} }) : null;

  const scoreA = useMemo(() => predsA ? computeUserScore(predsA, results.group||{}, results.ko||{}, results.bracketTeams, results.bonus||{}, predsA.joker||{}) : null, [predsA, results]);
  const scoreB = useMemo(() => predsB ? computeUserScore(predsB, results.group||{}, results.ko||{}, results.bracketTeams, results.bonus||{}, predsB.joker||{}) : null, [predsB, results]);

  const bracketA = useMemo(() => predsA ? buildBracket(predsA.group||{}, predsA.ko||{}).bracket : {}, [predsA]);
  const bracketB = useMemo(() => predsB ? buildBracket(predsB.group||{}, predsB.ko||{}).bracket : {}, [predsB]);
  const actualBracket = useMemo(() => buildActualBracket(results.group||{}, results.ko||{}).bracket, [results]);

  const selectStyle = { padding:'8px 12px', fontSize:14, fontWeight:600, border:'1px solid var(--line)', borderRadius:4, background:'var(--paper)', fontFamily:'inherit', color:'var(--ink)', minWidth:160 };

  const agree = (pA, pB) => pA && pB && pA.h !== '' && pA.h != null && pB.h !== '' && pB.h != null && pA.h == pB.h && pA.a == pB.a;
  const exact = (pred, actual) => pred && actual && actual.h !== '' && actual.h != null && parseInt(pred.h) === parseInt(actual.h) && parseInt(pred.a) === parseInt(actual.a);

  const renderMatchRow = (mId, isKo, home, away) => {
    const predA = isKo ? (predsA?.ko||{})[mId] : (predsA?.group||{})[mId];
    const predB = isKo ? (predsB?.ko||{})[mId] : (predsB?.group||{})[mId];
    const actual = isKo ? (results.ko||{})[mId] : (results.group||{})[mId];
    const hasResult = actual && actual.h !== '' && actual.h != null;
    const isAgree = !isKo && agree(predA, predB);
    const exA = exact(predA, actual);
    const exB = exact(predB, actual);
    const hasA = predA && predA.h !== '' && predA.h != null;
    const hasB = predB && predB.h !== '' && predB.h != null;

    // KO: get predicted teams from each bracket, fall back to actual bracket
    const bmA = isKo ? (bracketA[mId] || actualBracket[mId]) : null;
    const bmB = isKo ? (bracketB[mId] || actualBracket[mId]) : null;

    // Points scored per player for completed matches
    const ptsA = hasResult && hasA ? scoreMatch(predA, actual, home, away, !isKo).total : null;
    const ptsB = hasResult && hasB ? scoreMatch(predB, actual, home, away, !isKo).total : null;

    return (
      <div key={mId} style={{
        display:'grid', gridTemplateColumns:'1fr auto 1fr',
        borderBottom:'1px solid var(--line-soft)',
        background: isAgree ? 'rgba(27,94,63,0.04)' : 'transparent',
        padding:'6px 12px', alignItems:'center', gap:8,
      }}>
        {/* Player A */}
        <div style={{ textAlign:'right' }}>
          {hasA ? (
            <span style={{ fontWeight: exA?700:400, color: exA?'var(--forest)':'var(--ink)', fontSize:13 }}>
              {exA && '⭐ '}
              {isKo && bmA?.home && <><Flag team={bmA.home} size={12}/> {teamShort(bmA.home)} </>}
              <span style={{ fontVariantNumeric:'tabular-nums', fontWeight:700 }}>{predA.h}{'–'}{predA.a}</span>
              {isKo && bmA?.away && <> <Flag team={bmA.away} size={12}/> {teamShort(bmA.away)}</>}
            </span>
          ) : <span style={{ color:'var(--ink-soft)', fontSize:12, fontStyle:'italic' }}>—</span>}
          {hasResult && ptsA !== null && (
            <div style={{ fontSize:10, color: ptsA > 0 ? 'var(--forest)' : 'var(--ink-soft)', fontWeight:600, marginTop:1 }}>
              {ptsA > 0 ? `+${ptsA} pts` : '0 pts'}
            </div>
          )}
        </div>

        {/* Match info centre */}
        <div style={{ textAlign:'center', minWidth:140 }}>
          {isKo && !hasResult ? (
            <div style={{ fontSize:11, color:'var(--ink-soft)', fontWeight:600 }}>M{mId}</div>
          ) : (
            <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:4, fontSize:11, color:'var(--ink-soft)' }}>
              <Flag team={home} size={11}/><span>{teamShort(home)}</span>
              <span style={{ margin:'0 2px' }}>vs</span>
              <Flag team={away} size={11}/><span>{teamShort(away)}</span>
            </div>
          )}
          {hasResult && (
            <div style={{ fontSize:12, fontWeight:700, color:'var(--burgundy)', marginTop:2 }}>
              {actual.h}{'–'}{actual.a}
            </div>
          )}
          {isAgree && <div style={{ fontSize:10, color:'var(--forest)', fontWeight:600 }}>✓ Agree</div>}
        </div>

        {/* Player B */}
        <div style={{ textAlign:'left' }}>
          {hasB ? (
            <span style={{ fontWeight: exB?700:400, color: exB?'var(--forest)':'var(--ink)', fontSize:13 }}>
              {isKo && bmB?.home && <><Flag team={bmB.home} size={12}/> {teamShort(bmB.home)} </>}
              <span style={{ fontVariantNumeric:'tabular-nums', fontWeight:700 }}>{predB.h}{'–'}{predB.a}</span>
              {isKo && bmB?.away && <> <Flag team={bmB.away} size={12}/> {teamShort(bmB.away)}</>}
              {exB && ' ⭐'}
            </span>
          ) : <span style={{ color:'var(--ink-soft)', fontSize:12, fontStyle:'italic' }}>—</span>}
          {hasResult && ptsB !== null && (
            <div style={{ fontSize:10, color: ptsB > 0 ? 'var(--forest)' : 'var(--ink-soft)', fontWeight:600, marginTop:1 }}>
              {ptsB > 0 ? `+${ptsB} pts` : '0 pts'}
            </div>
          )}
        </div>
      </div>
    );
  };

  const renderGroupSection = (g) => {
    const matches = GROUP_MATCHES.filter(m => m.group === g);
    const agreements = matches.filter(m => agree((predsA?.group||{})[m.id], (predsB?.group||{})[m.id])).length;
    return (
      <div key={g} className="card" style={{ overflow:'hidden', marginBottom:8 }}>
        <div style={{ padding:'10px 12px', background:'var(--cream-2)', borderBottom:'1px solid var(--line)', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <span style={{ fontWeight:700, fontSize:13 }}>Group {g}</span>
          <span style={{ fontSize:11, color:'var(--forest)' }}>{agreements}/{matches.length} agree</span>
        </div>
        {matches.map(m => renderMatchRow(m.id, false, m.home, m.away))}
      </div>
    );
  };

  const koRounds = [
    { label:'Round of 32', ids:range(73,88) },
    { label:'Round of 16', ids:range(89,96) },
    { label:'Quarter-Finals', ids:range(97,100) },
    { label:'Semi-Finals', ids:[101,102] },
    { label:'3rd Place Play-off', ids:[103] },
    { label:'Final', ids:[104] },
  ];

  const bonusFields = [
    { key:'winner', label:'🏆 Winner' },
    { key:'runnerUp', label:'🥈 Runner-up' },
    { key:'thirdPlace', label:'🥉 3rd Place' },
    { key:'goldenBoot', label:'⚽ Golden Boot' },
    { key:'tiebreak', label:'⏱ Tie-break' },
  ];
  const jokerFields = [
    { key:'team', label:'🃏 Joker Team' },
    { key:'group', label:'🃏 Joker Group', format: v => v ? 'Group '+v : null },
  ];

  return (
    <div>
      {/* Player selectors */}
      <div style={{ display:'flex', alignItems:'center', gap:12, flexWrap:'wrap', marginBottom:20 }}>
        <select value={playerA} onChange={e => setPlayerA(e.target.value)} style={selectStyle}>
          <option value="">Select player 1…</option>
          {sorted.filter(p => p !== playerB).map(p => <option key={p} value={p}>{p}</option>)}
        </select>
        <span style={{ fontSize:18, fontWeight:700, color:'var(--ink-soft)' }}>⚔️</span>
        <select value={playerB} onChange={e => setPlayerB(e.target.value)} style={selectStyle}>
          <option value="">Select player 2…</option>
          {sorted.filter(p => p !== playerA).map(p => <option key={p} value={p}>{p}</option>)}
        </select>
        {(playerA || playerB) && (
          <button className="btn-ghost btn" style={{ fontSize:12 }} onClick={() => { setPlayerA(''); setPlayerB(''); }}>Clear</button>
        )}
      </div>

      {(!playerA || !playerB) && (
        <div style={{ textAlign:'center', padding:'40px 20px', color:'var(--ink-soft)', fontSize:14, fontStyle:'italic' }}>
          Select two participants above to compare their picks
        </div>
      )}

      {playerA && playerB && scoreA && scoreB && (
        <div className="fadein">
          {/* Score summary */}
          <div className="card" style={{ padding:'20px 24px', marginBottom:16 }}>
            <div style={{ display:'grid', gridTemplateColumns:'1fr auto 1fr', alignItems:'center', gap:16 }}>
              <div style={{ textAlign:'right' }}>
                <div style={{ fontSize:20, fontWeight:700 }}>{playerA}</div>
                {profiles[playerA] && <div style={{ fontSize:11, color:'var(--ink-soft)' }}>{profiles[playerA].team}</div>}
                <div style={{ fontSize:36, fontWeight:700, color: scoreA.total >= scoreB.total ? 'var(--forest)' : 'var(--ink-soft)', lineHeight:1.1, marginTop:4 }}>{scoreA.total}</div>
                <div style={{ fontSize:11, color:'var(--ink-soft)' }}>pts</div>
              </div>
              <div style={{ textAlign:'center' }}>
                {scoreA.total === scoreB.total
                  ? <div style={{ fontSize:13, fontWeight:700, color:'var(--ink-soft)' }}>TIED</div>
                  : <div style={{ fontSize:13, fontWeight:700, color:'var(--forest)' }}>{scoreA.total > scoreB.total ? playerA : playerB} leads by {Math.abs(scoreA.total - scoreB.total)}</div>}
                <div style={{ marginTop:12, fontSize:11, color:'var(--ink-soft)' }}>
                  {[['Group','group'],['KO','ko'],['Bonus','bonus']].map(([l,k]) => (
                    <div key={k} style={{ display:'grid', gridTemplateColumns:'1fr 60px 1fr', gap:4, marginBottom:2 }}>
                      <span style={{ textAlign:'right', fontWeight: (scoreA.sectionPts?.[k]||0) > (scoreB.sectionPts?.[k]||0) ? 700 : 400 }}>{scoreA.sectionPts?.[k]||0}</span>
                      <span style={{ textAlign:'center' }}>{l}</span>
                      <span style={{ textAlign:'left', fontWeight: (scoreB.sectionPts?.[k]||0) > (scoreA.sectionPts?.[k]||0) ? 700 : 400 }}>{scoreB.sectionPts?.[k]||0}</span>
                    </div>
                  ))}
                </div>
              </div>
              <div style={{ textAlign:'left' }}>
                <div style={{ fontSize:20, fontWeight:700 }}>{playerB}</div>
                {profiles[playerB] && <div style={{ fontSize:11, color:'var(--ink-soft)' }}>{profiles[playerB].team}</div>}
                <div style={{ fontSize:36, fontWeight:700, color: scoreB.total >= scoreA.total ? 'var(--forest)' : 'var(--ink-soft)', lineHeight:1.1, marginTop:4 }}>{scoreB.total}</div>
                <div style={{ fontSize:11, color:'var(--ink-soft)' }}>pts</div>
              </div>
            </div>
          </div>

          {/* Column headers */}
          <div style={{ display:'grid', gridTemplateColumns:'1fr auto 1fr', padding:'6px 12px', marginBottom:4, gap:8 }}>
            <div style={{ textAlign:'right', fontWeight:700, fontSize:13 }}>{playerA}</div>
            <div style={{ textAlign:'center', minWidth:140, fontSize:11, color:'var(--ink-soft)', textTransform:'uppercase', letterSpacing:'0.06em' }}>Match</div>
            <div style={{ textAlign:'left', fontWeight:700, fontSize:13 }}>{playerB}</div>
          </div>

          {/* Group matches */}
          <div className="micro-caps" style={{ margin:'12px 0 8px' }}>Group Stage</div>
          {GROUP_KEYS.map(g => renderGroupSection(g))}

          {/* KO matches */}
          <div className="micro-caps" style={{ margin:'16px 0 8px' }}>Knockout Stage</div>
          {koRounds.map(({ label, ids }) => {
            const validIds = ids.filter(mId => {
              const ab = actualBracket[mId];
              return ab?.home || ab?.away || (predsA && bracketA[mId]?.home) || (predsB && bracketB[mId]?.home);
            });
            if (!validIds.length) return null;
            const agreements = validIds.filter(mId => agree((predsA?.ko||{})[mId], (predsB?.ko||{})[mId])).length;            return (
              <div key={label} className="card" style={{ overflow:'hidden', marginBottom:8 }}>
                <div style={{ padding:'10px 12px', background:'var(--cream-2)', borderBottom:'1px solid var(--line)', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                  <span style={{ fontWeight:700, fontSize:13 }}>{label}</span>
                </div>
                {validIds.map(mId => {
                  const ab = actualBracket[mId];
                  const home = ab?.home || bracketA[mId]?.home || bracketB[mId]?.home || 'TBD';
                  const away = ab?.away || bracketA[mId]?.away || bracketB[mId]?.away || 'TBD';
                  return renderMatchRow(mId, true, home, away);
                })}
              </div>
            );
          })}

          {/* Bonus comparison */}
          <div className="micro-caps" style={{ margin:'16px 0 8px' }}>Bonus Picks</div>
          <div className="card" style={{ overflow:'hidden', marginBottom:8 }}>
            {[...bonusFields.map(f => ({ ...f, source:'bonus' })), ...jokerFields.map(f => ({ ...f, source:'joker' }))].map(({ key, label, source, format }) => {
              const vA = source === 'bonus' ? (predsA?.bonus||{})[key] : (predsA?.joker||{})[key];
              const vB = source === 'bonus' ? (predsB?.bonus||{})[key] : (predsB?.joker||{})[key];
              const dA = format ? format(vA) : vA;
              const dB = format ? format(vB) : vB;
              const match = dA && dB && dA === dB;
              return (
                <div key={key} style={{ display:'grid', gridTemplateColumns:'1fr 120px 1fr', borderBottom:'1px solid var(--line-soft)', padding:'8px 12px', background: match ? 'rgba(27,94,63,0.04)' : 'transparent', gap:8, alignItems:'center' }}>
                  <div style={{ textAlign:'right', fontSize:13, fontWeight: match?600:400 }}>{dA || <span style={{ color:'var(--ink-soft)', fontStyle:'italic' }}>—</span>}</div>
                  <div style={{ textAlign:'center', fontSize:11, color:'var(--ink-soft)' }}>{label}{match && ' ✓'}</div>
                  <div style={{ textAlign:'left', fontSize:13, fontWeight: match?600:400 }}>{dB || <span style={{ color:'var(--ink-soft)', fontStyle:'italic' }}>—</span>}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

function MatchPicksView({ participants, allPredictions, results, selected, setSelected }) {
  const [openSection, setOpenSection] = useState('A');

  const actualBracket = useMemo(() => {
    const { bracket: ab } = buildActualBracket(results.group || {}, results.ko || {});
    return ab;
  }, [results]);

  const matchTeams = (mId, isKo) => {
    if (!isKo) {
      const m = GROUP_MATCHES.find(gm => gm.id === mId);
      return m ? { home: m.home, away: m.away } : { home: '?', away: '?' };
    }
    const ab = actualBracket[mId];
    return { home: ab?.home || 'TBD', away: ab?.away || 'TBD' };
  };

  const koRounds = [
    { label: 'Round of 32', ids: range(73,88) },
    { label: 'Round of 16', ids: range(89,96) },
    { label: 'Quarter-Finals', ids: range(97,100) },
    { label: 'Semi-Finals', ids: [101,102] },
    { label: '3rd Place Play-off', ids: [103] },
    { label: 'Final', ids: [104] },
  ];

  const renderSection = (sectionKey, matchIds, isKo) => {
    const isOpen = openSection === sectionKey;
    const resultCount = matchIds.filter(mId => {
      const r = isKo ? (results.ko||{})[mId] : (results.group||{})[mId];
      return r && r.h !== '' && r.h != null;
    }).length;
    return (
      <div key={sectionKey} className="card" style={{ overflow:'hidden', marginBottom:8 }}>
        <button onClick={() => setOpenSection(isOpen ? null : sectionKey)}
          style={{ width:'100%', display:'flex', justifyContent:'space-between', alignItems:'center', background:'none', border:'none', padding:'13px 16px', cursor:'pointer' }}>
          <span style={{ fontWeight:600, fontSize:14 }}>{isKo ? sectionKey : 'Group '+sectionKey}</span>
          <div style={{ display:'flex', alignItems:'center', gap:8 }}>
            {resultCount > 0 && <span className="pill pill-success" style={{ fontSize:11 }}>{resultCount}/{matchIds.length} resulted</span>}
            {isOpen ? <ChevronDown size={16}/> : <ChevronRight size={16}/>}
          </div>
        </button>
        {isOpen && (
          <div className="fadein" style={{ borderTop:'1px solid var(--line)' }}>
            {matchIds.map(mId => {
              const { home, away } = matchTeams(mId, isKo);
              const actual = isKo ? (results.ko||{})[mId] : (results.group||{})[mId];
              const hasResult = actual && actual.h !== '' && actual.h != null && actual.a !== '' && actual.a != null;
              const isSel = selected === mId;
              return (
                <div key={mId}>
                  <button onClick={() => setSelected(isSel ? null : mId)}
                    style={{ width:'100%', display:'flex', alignItems:'center', justifyContent:'space-between',
                      padding:'10px 16px', background:isSel?'var(--cream-2)':'white', border:'none',
                      borderBottom:'1px solid var(--line-soft)', cursor:'pointer', textAlign:'left' }}>
                    <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                      <span style={{ fontSize:11, color:'var(--ink-soft)', width:28 }}>M{mId}</span>
                      <Flag team={home} size={13}/><span style={{ fontSize:13, fontWeight:500 }}>{teamShort(home)}</span>
                      <span style={{ fontSize:11, color:'var(--ink-soft)', margin:'0 2px' }}>vs</span>
                      <Flag team={away} size={13}/><span style={{ fontSize:13, fontWeight:500 }}>{teamShort(away)}</span>
                    </div>
                    <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                      {hasResult && <span style={{ fontSize:13, fontWeight:700, color:'var(--forest)' }}>{actual.h}{'–'}{actual.a}</span>}
                      <span style={{ fontSize:11, color:'var(--forest)' }}>{isSel?'▲ Hide':'▼ All picks'}</span>
                    </div>
                  </button>
                  {isSel && <MatchDetailPanel mId={mId} isKo={isKo} home={home} away={away}
                    actual={actual} hasResult={hasResult} participants={participants} allPredictions={allPredictions} />}
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  };

  return (
    <div>
      {GROUP_KEYS.map(g => renderSection(g, GROUP_MATCHES.filter(m => m.group===g).map(m => m.id), false))}
      <div className="micro-caps" style={{ margin:'16px 0 10px' }}>Knockout Stage</div>
      {koRounds.map(({label,ids}) => renderSection(label, ids, true))}
    </div>
  );
}

function MatchDetailPanel({ mId, isKo, home, away, actual, hasResult, participants, allPredictions }) {
  const rows = useMemo(() => {
    return participants.map(p => {
      const preds = allPredictions[p] || {};
      const pred = isKo ? (preds.ko||{})[mId] : (preds.group||{})[mId];
      const hasPred = pred && pred.h !== '' && pred.h != null && pred.a !== '' && pred.a != null;
      let pts = 0, isExact = false;
      if (hasResult && hasPred) {
        const scored = scoreMatch(pred, actual, home, away, !isKo);
        pts = scored.total;
        isExact = parseInt(pred.h) === parseInt(actual.h) && parseInt(pred.a) === parseInt(actual.a);
      }
      // For KO matches, derive the user's predicted teams for this slot from their bracket
      let predHome = null, predAway = null;
      if (isKo) {
        const { bracket: userBracket } = buildBracket(preds.group || {}, preds.ko || {});
        predHome = userBracket[mId]?.home || null;
        predAway = userBracket[mId]?.away || null;
      }
      return { name:p, pred, hasPred, pts, isExact, predHome, predAway };
    }).sort((a,b) => hasResult ? (b.pts - a.pts || a.name.localeCompare(b.name)) : a.name.localeCompare(b.name));
  }, [participants, allPredictions, mId, isKo, actual, hasResult, home, away]);

  const exactCount = rows.filter(r => r.isExact).length;

  return (
    <div className="fadein" style={{ background:'var(--cream-2)', borderBottom:'1px solid var(--line)' }}>
      <div style={{ padding:'10px 16px 4px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <span style={{ fontSize:11, color:'var(--ink-soft)', fontWeight:600, letterSpacing:'0.06em', textTransform:'uppercase' }}>
          {participants.length} predictions
        </span>
        <span style={{ fontSize:11, color:'var(--ink-soft)' }}>
          {hasResult ? (exactCount > 0 ? exactCount+' exact ⭐' : 'sorted by pts') : 'result pending · a–z'}
        </span>
      </div>
      <div style={{ padding:'0 16px 10px' }}>
        {rows.map(({ name, pred, hasPred, pts, isExact, predHome, predAway }) => (
          <div key={name} style={{ borderBottom:'1px solid var(--line-soft)', padding:'7px 0' }}>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
              <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                <span style={{ width:20, fontSize:14, textAlign:'center' }}>
                  {isExact ? '⭐' : hasResult && pts > 0 ? '✓' : hasResult ? '✕' : ''}
                </span>
                <span style={{ fontSize:13, fontWeight:isExact?700:400 }}>{name}</span>
              </div>
              <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                {!isKo && (
                  <span style={{ fontSize:14, fontWeight:700, color:'var(--forest)', fontVariantNumeric:'tabular-nums', minWidth:40, textAlign:'center' }}>
                    {hasPred ? pred.h+'–'+pred.a : <span style={{ color:'var(--ink-soft)', fontStyle:'italic', fontSize:12 }}>—</span>}
                  </span>
                )}
                {!isKo && !hasPred && (
                  <span style={{ fontSize:12, color:'var(--ink-soft)', fontStyle:'italic', minWidth:40, textAlign:'center' }}>—</span>
                )}
                {hasResult && (
                  <span className={'pill '+(pts>0?'pill-success':'')} style={{ fontSize:11, minWidth:32, textAlign:'center' }}>
                    {pts > 0 ? '+'+pts : '0'}
                  </span>
                )}
              </div>
            </div>
            {isKo && (predHome || predAway) && (
              <div style={{ display:'flex', alignItems:'center', gap:4, marginLeft:28, marginTop:2, fontSize:11, color:'var(--ink-soft)' }}>
                <Flag team={predHome} size={11}/>
                <span>{predHome ? teamShort(predHome) : 'TBD'}</span>
                {hasPred && <span style={{ fontWeight:700, color:'var(--forest)', margin:'0 2px' }}>{ pred.h + '–' + pred.a }</span>}
                <Flag team={predAway} size={11}/>
                <span>{predAway ? teamShort(predAway) : 'TBD'}</span>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

function LoginScreen({ onLogin, onGuest, participants, profiles, allPredictions, locked }) {

  const getPickStatus = (name) => {
    const preds = allPredictions[name];
    if (!preds) return 'none';
    const groupDone = GROUP_MATCHES.every(m => {
      const r = (preds.group||{})[m.id];
      return r && r.h !== '' && r.h != null && r.a !== '' && r.a != null;
    });
    const joker = preds.joker || {};
    const jokerDone = !!(joker.team && joker.group);
    const koDone = range(73, 104).every(mId => {
      const r = (preds.ko||{})[mId];
      return r && r.h !== '' && r.h != null && r.a !== '' && r.a != null;
    });
    const bonus = preds.bonus || {};
    const bonusDone = !!(bonus.winner && bonus.runnerUp && bonus.thirdPlace && bonus.goldenBoot && bonus.tiebreak);
    if (groupDone && jokerDone && koDone && bonusDone) return 'complete';
    return 'incomplete';
  };
  const [name, setName] = useState('');
  const [pin, setPin] = useState('');
  const [country, setCountry] = useState('');
  const [team, setTeam] = useState('');
  const [location, setLocation] = useState('');
  const [error, setError] = useState('');
  const [step, setStep] = useState('name'); // 'name' | 'pin-new' | 'pin-returning' | 'details' | 'complete-profile'

  const needsCountry = COMP.fields.includes('country');
  const needsTeam = COMP.fields.includes('team');
  const needsLocation = COMP.fields.includes('location');
  const needsDetails = needsCountry || needsTeam || needsLocation;

  const trimmedName = name.trim();
  const isReturning = trimmedName && participants.includes(trimmedName);
  const pinValid = /^\d{4}$/.test(pin);

  // Check if returning user has incomplete profile (missing team/country)
  const profileIncomplete = isReturning && needsDetails && (
    (needsTeam && !profiles[trimmedName]?.team) ||
    (needsCountry && !profiles[trimmedName]?.country)
  );

  const handleNameNext = () => {
    if (!trimmedName) return;
    setError('');
    if (isReturning) {
      const hasPin = !!(profiles[trimmedName] && profiles[trimmedName].pin);
      setStep(hasPin ? 'pin-returning' : 'pin-new');
    } else {
      if (needsDetails) setStep('details');
      else setStep('pin-new');
    }
  };

  const handleDetailsNext = () => {
    if (needsCountry && !country) { setError('Please select your country.'); return; }
    if (needsTeam && !team) { setError('Please select your team.'); return; }
    if (needsLocation && !location) { setError('Please select your location.'); return; }
    setError('');
    setStep('pin-new');
  };

  const handleCompleteProfileNext = () => {
    if (needsTeam && !team) { setError('Please select your team.'); return; }
    if (needsCountry && !country) { setError('Please select your country.'); return; }
    setError('');
    // Save updated profile with team/country merged in, then log in
    const updatedProfile = { ...(profiles[trimmedName] || {}), team, country };
    onLogin(trimmedName, updatedProfile);
  };

  const handlePinSubmit = () => {
    if (!pinValid) { setError('PIN must be exactly 4 digits.'); return; }
    if (step === 'pin-returning') {
      const storedPin = profiles[trimmedName]?.pin;
      if (storedPin && storedPin !== pin) { setError('Incorrect PIN. Please try again.'); setPin(''); return; }
    }
    setError('');
    const isPinReset = isReturning && step === 'pin-new' && !(profiles[trimmedName]?.pin);
    if (isPinReset) {
      // Save new PIN then check if profile needs completing
      if (profileIncomplete) {
        // Save the PIN first, then go to complete-profile
        onLogin(trimmedName, { ...(profiles[trimmedName] || {}), pin });
        setStep('complete-profile');
        return;
      }
      onLogin(trimmedName, { ...(profiles[trimmedName] || {}), pin });
      return;
    }
    if (isReturning && profileIncomplete) {
      // PIN ok — go to complete profile step before logging in
      setStep('complete-profile');
      return;
    }
    const profileToSave = isReturning ? null : { country, team, location, pin };
    onLogin(trimmedName, profileToSave);
  };

  const inputStyle = {
    width: '100%', padding: '11px 14px', fontSize: 15,
    border: '1px solid var(--line)', borderRadius: 4,
    background: 'white', fontFamily: 'inherit', color: 'var(--ink)',
    boxSizing: 'border-box',
  };
  const selectStyle = { ...inputStyle, appearance: 'auto' };

  return (
    <div className="wc-app" style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }}>
      <style>{styles}</style>
      <div style={{ maxWidth: 480, width: '100%' }}>
        <div style={{ textAlign: 'center', marginBottom: 32 }}>
          <div className="micro-caps" style={{ marginBottom: 4 }}>FIFA World Cup 2026</div>
          <h1 className="display" style={{ fontSize: 44, fontWeight: 700, lineHeight: 1, margin: '0 0 8px', letterSpacing: '-0.02em' }}>
            The <em>Prediction</em><br />Competition
          </h1>
          <p style={{ color: 'var(--ink-soft)', fontSize: 14, margin: '4px 0 0' }}>{COMP.name}</p>
          <p style={{ color: 'var(--ink-soft)', fontSize: 14, margin: 0 }}>June 11 – July 19, 2026 · USA, Canada, Mexico</p>
        </div>

        <div className="card" style={{ padding: 28 }}>

          {/* Step 1: Name */}
          {step === 'name' && (
            <>
              {!locked && (
                <>
                  <label className="micro-caps" style={{ display: 'block', marginBottom: 6 }}>Your name</label>
                  <input
                    value={name}
                    onChange={e => { setName(e.target.value); setError(''); }}
                    onKeyDown={e => e.key === 'Enter' && trimmedName && handleNameNext()}
                    {...(COMP.namePlaceholder ? { placeholder: COMP.namePlaceholder } : { placeholder: "e.g. José Mourinho" })}
                    autoFocus
                    style={{ ...inputStyle, marginBottom: 4 }}
                  />
                  {isReturning && <div style={{ fontSize: 12, color: 'var(--forest)', marginBottom: 12, fontWeight: 600 }}>✓ Welcome back!</div>}
                  {!isReturning && trimmedName && <div style={{ fontSize: 12, color: 'var(--ink-soft)', marginBottom: 12 }}>New participant — we'll set you up!</div>}
                  {!trimmedName && <div style={{ marginBottom: 16 }} />}
                  {error && <div style={{ fontSize: 13, color: 'var(--burgundy)', marginBottom: 12, display: 'flex', gap: 6 }}><AlertCircle size={14} />{error}</div>}
                  <button className="btn" style={{ width: '100%' }} onClick={handleNameNext} disabled={!trimmedName}>
                    Continue →
                  </button>
                  <hr className="h-rule" />
                </>
              )}
              {locked && (
                <div style={{ fontSize: 13, color: 'var(--ink-soft)', marginBottom: 16, padding: '10px 14px', background: 'var(--cream-2)', borderRadius: 6, borderLeft: '3px solid var(--burgundy)' }}>
                  🔒 The competition is locked — tap your name below to log in.
                </div>
              )}
              {locked && onGuest && (
                <>
                  <button className="btn-ghost btn" style={{ width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, fontSize: 14, marginBottom: 4 }}
                    onClick={onGuest}>
                    👀 View as Guest
                  </button>
                  <div style={{ fontSize: 11, color: 'var(--ink-soft)', textAlign: 'center', marginBottom: 16 }}>
                    See the leaderboard and results without entering picks
                  </div>
                </>
              )}
              {participants.length > 0 && (
                <>
                  <div className="micro-caps" style={{ marginBottom: 8 }}>{participants.length} registered</div>
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                    {[...participants].sort((a, b) => a.localeCompare(b)).map(p => {
                      const status = getPickStatus(p);
                      const bg = status === 'complete' ? 'rgba(27,94,63,0.12)' : status === 'incomplete' ? 'rgba(159,27,27,0.10)' : 'var(--cream-2)';
                      const border = status === 'complete' ? 'var(--forest)' : status === 'incomplete' ? 'var(--burgundy)' : 'var(--line)';
                      const col = status === 'complete' ? 'var(--forest)' : status === 'incomplete' ? 'var(--burgundy)' : 'var(--ink)';
                      return (
                        <button key={p} className="pill"
                          style={{ cursor: 'pointer', background: bg, borderColor: border, color: col, fontWeight: status !== 'none' ? 600 : 400 }}
                          onClick={() => { setName(p); setStep('pin-returning'); setError(''); }}>
                          {p}
                        </button>
                      );
                    })}
                  </div>
                  <div style={{ display: 'flex', gap: 12, marginTop: 10, fontSize: 11, color: 'var(--ink-soft)' }}>
                    <span style={{ color: 'var(--forest)', fontWeight: 600 }}>■ All picks done</span>
                    <span style={{ color: 'var(--burgundy)', fontWeight: 600 }}>■ Picks outstanding</span>
                  </div>
                </>
              )}
            </>
          )}
          {/* Step 2a: Details (country/team) for new SCB users */}
          {step === 'details' && (
            <>
              <div style={{ fontSize: 13, color: 'var(--ink-soft)', marginBottom: 16 }}>Registering as <strong>{trimmedName}</strong></div>
              {needsCountry && (
                <>
                  <label className="micro-caps" style={{ display: 'block', marginBottom: 6 }}>Country</label>
                  <select value={country} onChange={e => { setCountry(e.target.value); setError(''); }} style={{ ...selectStyle, marginBottom: 16 }}>
                    <option value="">Select your country…</option>
                    {SCB_COUNTRIES.map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                </>
              )}
              {needsTeam && (
                <>
                  <label className="micro-caps" style={{ display: 'block', marginBottom: 6 }}>Team</label>
                  <select value={team} onChange={e => { setTeam(e.target.value); setError(''); }} style={{ ...selectStyle, marginBottom: 16 }}>
                    <option value="">Select your team…</option>
                    {(COMPETITION_ID === 'gcfo-india' ? GCFO_INDIA_TEAMS : SCB_TEAMS).map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                </>
              )}
              {needsLocation && (
                <>
                  <label className="micro-caps" style={{ display: 'block', marginBottom: 6 }}>Location</label>
                  <select value={location} onChange={e => { setLocation(e.target.value); setError(''); }} style={{ ...selectStyle, marginBottom: 16 }}>
                    <option value="">Select your location…</option>
                    {GCFO_INDIA_LOCATIONS.map(l => <option key={l} value={l}>{l}</option>)}
                  </select>
                </>
              )}
              {error && <div style={{ fontSize: 13, color: 'var(--burgundy)', marginBottom: 12, display: 'flex', gap: 6 }}><AlertCircle size={14} />{error}</div>}
              <div style={{ display: 'flex', gap: 8 }}>
                <button className="btn btn-ghost" onClick={() => { setStep('name'); setError(''); }}>← Back</button>
                <button className="btn" style={{ flex: 1 }} onClick={handleDetailsNext}>Continue →</button>
              </div>
            </>
          )}

          {/* Complete profile step — for returning users missing team/country */}
          {step === 'complete-profile' && (
            <>
              <div style={{ fontSize: 13, color: 'var(--ink-soft)', marginBottom: 12 }}>
                Welcome back, <strong>{trimmedName}</strong>. We're missing a few profile details — please fill these in to continue.
              </div>
              {needsTeam && !profiles[trimmedName]?.team && (
                <>
                  <label className="micro-caps" style={{ display: 'block', marginBottom: 6 }}>Team</label>
                  <select value={team} onChange={e => { setTeam(e.target.value); setError(''); }}
                    style={{ ...selectStyle, marginBottom: 16 }}>
                    <option value="">Select your team…</option>
                    {(COMPETITION_ID === 'gcfo-india' ? GCFO_INDIA_TEAMS : SCB_TEAMS).map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                </>
              )}
              {needsCountry && !profiles[trimmedName]?.country && (
                <>
                  <label className="micro-caps" style={{ display: 'block', marginBottom: 6 }}>Country</label>
                  <select value={country} onChange={e => { setCountry(e.target.value); setError(''); }}
                    style={{ ...selectStyle, marginBottom: 16 }}>
                    <option value="">Select your country…</option>
                    {SCB_COUNTRIES.map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                </>
              )}
              {error && <div style={{ color: 'var(--burgundy)', fontSize: 13, marginBottom: 8 }}>{error}</div>}
              <button className="btn" style={{ width: '100%', marginTop: 4 }} onClick={handleCompleteProfileNext}>
                Save & Continue →
              </button>
            </>
          )}

          {/* Step 2b/3: Set PIN (new) or Enter PIN (returning) */}
          {(step === 'pin-new' || step === 'pin-returning') && (
            <>
              <div style={{ fontSize: 13, color: 'var(--ink-soft)', marginBottom: 4 }}>
                {step === 'pin-new' ? `Registering as` : `Welcome back,`} <strong>{trimmedName}</strong>
              </div>
              <label className="micro-caps" style={{ display: 'block', margin: '12px 0 6px' }}>
                {step === 'pin-returning' ? 'Enter your PIN' : isReturning ? 'Set a new PIN' : 'Set a 4-digit PIN'}
              </label>
              <p style={{ fontSize: 12, color: 'var(--ink-soft)', margin: '0 0 10px' }}>
                {step === 'pin-returning'
                  ? 'Enter the PIN you chose when you registered.'
                  : isReturning
                    ? 'Your PIN was reset — set a new one to secure your picks.'
                    : 'You\'ll need this to access your picks on any device.'}
              </p>
              <input
                type="password"
                inputMode="numeric"
                maxLength={4}
                value={pin}
                onChange={e => { setPin(e.target.value.replace(/\D/g, '').slice(0, 4)); setError(''); }}
                onKeyDown={e => e.key === 'Enter' && pinValid && handlePinSubmit()}
                placeholder="••••"
                autoFocus
                style={{ ...inputStyle, letterSpacing: '0.3em', fontSize: 22, textAlign: 'center', marginBottom: 16 }}
              />
              {error && <div style={{ fontSize: 13, color: 'var(--burgundy)', marginBottom: 12, display: 'flex', gap: 6 }}><AlertCircle size={14} />{error}</div>}
              <div style={{ display: 'flex', gap: 8 }}>
                <button className="btn btn-ghost" onClick={() => { setStep(isReturning ? 'name' : (needsDetails ? 'details' : 'name')); setError(''); setPin(''); }}>← Back</button>
                <button className="btn" style={{ flex: 1 }} onClick={handlePinSubmit} disabled={!pinValid}>
                  {step === 'pin-new' ? 'Register & Enter →' : 'Enter →'}
                </button>
              </div>
            </>
          )}

        </div>
        <p style={{ textAlign: 'center', fontSize: 12, color: 'var(--ink-soft)', marginTop: 16 }}>
          Returning? Tap your name or type it above. New? Enter your name to register.
        </p>
      </div>
    </div>
  );
}

const printPicks = (predictions, user, profiles) => {
  const grp = predictions.group || {};
  const ko = predictions.ko || {};
  const bonus = predictions.bonus || {};
  const joker = predictions.joker || {};
  const profile = profiles[user] || {};
  const { bracket } = buildBracket(grp, ko);
  const allStandings = computeAllStandings(grp);
  const f = (team) => TEAM_FLAGS[team] || '';
  const s = (team, max) => { if (!team) return 'TBD'; const m = max || 99; return team.length > m ? team.slice(0,m-1)+'…' : team; };

  const css = [
    '* { box-sizing:border-box; margin:0; padding:0; }',
    '@page { size: A4 landscape; margin: 10mm; }',
    'body { font-family: "Noto Color Emoji","Segoe UI Emoji","Apple Color Emoji",Helvetica Neue,Arial,sans-serif; font-size:10px; color:#1a1715; background:white; }',
    '.page { width:100%; padding:0; }',
    '.hdr { border-bottom:2px solid #9f1b1b; padding-bottom:8px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:flex-end; }',
    '.hdr-title { font-size:18px; font-weight:700; }',
    '.hdr-title em { color:#9f1b1b; font-style:italic; }',
    '.hdr-meta { font-size:9px; color:#6b635b; text-align:right; line-height:1.5; }',
    '.sec-row { display:flex; justify-content:space-between; align-items:baseline; border-bottom:1px solid #ddd2b8; padding-bottom:2px; margin-bottom:10px; }',
    '.sec { font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:#9f1b1b; }',
    '.joker-info { font-size:10px; color:#6b635b; }',
    '.joker-info strong { color:#1a1715; }',
    '.gg { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:8px; }',
    '.gb { break-inside:avoid; }',
    '.gt { font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:#6b635b; margin-bottom:2px; }',
    '.mt { width:100%; border-collapse:collapse; margin-bottom:4px; }',
    '.mt td { padding:2px 2px; vertical-align:middle; font-size:9px; }',
    '.mh { text-align:right; white-space:nowrap; max-width:115px; overflow:hidden; text-overflow:ellipsis; }',
    '.ma { text-align:left; white-space:nowrap; max-width:115px; overflow:hidden; text-overflow:ellipsis; }',
    '.ms { text-align:center; font-weight:700; color:#1b5e3f; padding:2px 4px; white-space:nowrap; }',
    '.mt tr { border-bottom:1px solid #f0ebe0; }',
    '.st { width:100%; border-collapse:collapse; }',
    '.st th { font-size:8px; color:#6b635b; padding:1px 2px; border-bottom:1px solid #ddd2b8; text-align:center; }',
    '.st th:first-child { text-align:left; }',
    '.st td { font-size:8px; padding:2px 2px; border-bottom:1px solid #f0ebe0; text-align:center; }',
    '.st td:first-child { text-align:left; white-space:nowrap; font-size:8px; }',
    '.qr { background:rgba(27,94,63,0.06); }',
    '.pb { page-break-after:always; break-after:page; }',
    '.ft { margin-top:8px; border-top:1px solid #ddd2b8; padding-top:5px; font-size:9px; color:#9b9087; display:flex; justify-content:space-between; }',
    '.brk { display:flex; flex-direction:row; align-items:flex-start; justify-content:center; gap:0; }',
    '.brc { display:flex; flex-direction:column; }',
    '.bsl { display:flex; align-items:center; justify-content:center; }',
    '.bmc { width:110px; border:1px solid #c8bfab; border-radius:2px; overflow:hidden; background:white; flex-shrink:0; }',
    '.bmt { display:flex; justify-content:space-between; align-items:center; padding:1px 3px; height:15px; }',
    '.bmw { background:#e8f5ee; }',
    '.bmn { font-size:8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:87px; }',
    '.bms { font-size:8px; font-weight:700; color:#1b5e3f; }',
    '.bmd { border-top:1px solid #ede7d6; }',
    '.con { display:flex; flex-direction:column; }',
    '.ct { border-right:1px solid #aaa; border-bottom:1px solid #aaa; }',
    '.cb { border-right:1px solid #aaa; border-top:1px solid #aaa; }',
    '.ctr { border-left:1px solid #aaa; border-bottom:1px solid #aaa; }',
    '.cbr { border-left:1px solid #aaa; border-top:1px solid #aaa; }',
    '.ch { border-top:1px solid #aaa; }',
    '.rnd-lbl { font-size:8px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:#6b635b; text-align:center; margin-bottom:3px; }',
    '.fin-lbl { font-size:9px; font-weight:700; color:#9f1b1b; text-align:center; letter-spacing:.06em; text-transform:uppercase; margin-bottom:3px; }',
    '.bn-tbl { border-collapse:collapse; }',
    '.bn-tbl td { padding:3px 6px; border-bottom:1px solid #ede7d6; font-size:10px; }',
    '.bn-lbl { font-weight:600; color:#6b635b; width:120px; }',
    '@media print { body { print-color-adjust:exact; -webkit-print-color-adjust:exact; } }',
  ].join(' ');

  const U = 56;
  const LW = 9;

  const bmc = (mId) => {
    const m = bracket[mId] || {};
    const r = ko[mId] || {};
    const h = m.home || null;
    const a = m.away || null;
    const hs = (r.h !== '' && r.h != null) ? r.h : null;
    const as_ = (r.a !== '' && r.a != null) ? r.a : null;
    const hasScore = hs !== null && as_ !== null;
    const hW = hasScore && parseInt(hs) > parseInt(as_);
    const aW = hasScore && parseInt(as_) > parseInt(hs);
    const tl = (team, score, win) =>
      '<div class="bmt' + (win ? ' bmw' : '') + '">' +
      '<span class="bmn">' + (team ? f(team)+' '+s(team,13) : '<em style="color:#bbb">TBD</em>') + '</span>' +
      (score !== null ? '<b class="bms">'+score+'</b>' : '') +
      '</div>';
    return '<div class="bmc">' + tl(h,hs,hW) + '<div class="bmd"></div>' + tl(a,as_,aW) + '</div>';
  };

  const bslot = (mId, slotH) =>
    '<div class="bsl" style="height:' + slotH + 'px;">' + bmc(mId) + '</div>';

  const rcol = (ids, slotH, lbl) =>
    '<div><div class="rnd-lbl">' + lbl + '</div><div class="brc">' +
    ids.map(id => bslot(id, slotH)).join('') + '</div></div>';

  const lcon = (n, slotH) => {
    let h = '';
    for (let i = 0; i < n; i++) {
      h += '<div class="ct" style="height:' + slotH + 'px;width:' + LW + 'px;"></div>';
      h += '<div class="cb" style="height:' + slotH + 'px;width:' + LW + 'px;"></div>';
    }
    return '<div class="con" style="margin-top:19px;">' + h + '</div>';
  };

  const rcon = (n, slotH) => {
    let h = '';
    for (let i = 0; i < n; i++) {
      h += '<div class="ctr" style="height:' + slotH + 'px;width:' + LW + 'px;"></div>';
      h += '<div class="cbr" style="height:' + slotH + 'px;width:' + LW + 'px;"></div>';
    }
    return '<div class="con" style="margin-top:19px;">' + h + '</div>';
  };

  const hline = (slotH) =>
    '<div style="width:' + LW + 'px;height:' + slotH + 'px;display:flex;align-items:center;margin-top:19px;">' +
    '<div class="ch" style="width:100%;height:0;"></div></div>';

  const totalH = U * 8;

  const leftBracket =
    '<div style="display:flex;flex-direction:row;align-items:flex-start;">' +
    rcol([74,77,73,75,83,84,81,82], U, 'R32') +
    lcon(4, U) +
    rcol([89,90,93,94], U*2, 'R16') +
    lcon(2, U*2) +
    rcol([97,98], U*4, 'QF') +
    lcon(1, U*4) +
    hline(U*8) +
    rcol([101], U*8, 'SF') +
    hline(U*8) +
    '</div>';

  const rightBracket =
    '<div style="display:flex;flex-direction:row;align-items:flex-start;">' +
    hline(U*8) +
    rcol([102], U*8, 'SF') +
    hline(U*8) +
    rcon(1, U*4) +
    rcol([99,100], U*4, 'QF') +
    rcon(2, U*2) +
    rcol([91,92,95,96], U*2, 'R16') +
    rcon(4, U) +
    rcol([76,78,79,80,86,88,85,87], U, 'R32') +
    '</div>';

  const center =
    '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:' + (totalH+19) + 'px;padding:0 8px;gap:12px;">' +
    '<div><div class="fin-lbl">✸ Final</div>' + bmc(104) + '</div>' +
    '<div><div class="rnd-lbl">3rd Place</div>' + bmc(103) + '</div>' +
    '</div>';

  const bracketSection =
    '<div class="brk">' + leftBracket + center + rightBracket + '</div>';

  const standingRow = (t, i) =>
    '<tr' + (i < 2 ? ' class="qr"' : '') + '>' +
    '<td>' + (i+1) + '. ' + f(t.team) + ' ' + s(t.team,14) + '</td>' +
    '<td>' + t.P + '</td><td>' + t.Pts + '</td>' +
    '<td>' + (t.GD>0?'+':'') + t.GD + '</td>' +
    '<td>' + t.GF + '</td></tr>';

  let groupsHtml = '';
  GROUP_KEYS.forEach(g => {
    const matches = GROUP_MATCHES.filter(m => m.group === g);
    const standings = allStandings[g] || [];
    groupsHtml += '<div class="gb">' +
      '<div class="gt">Group ' + g + '</div>' +
      '<table class="mt">' +
      matches.map(m => {
        const r = grp[m.id] || {};
        const has = r.h !== '' && r.h != null && r.a !== '' && r.a != null;
        return '<tr>' +
          '<td class="mh">' + f(m.home)+' '+s(m.home,16) + '</td>' +
          '<td class="ms">' + (has ? r.h+' – '+r.a : '_ – _') + '</td>' +
          '<td class="ma">' + f(m.away)+' '+s(m.away,16) + '</td>' +
          '</tr>';
      }).join('') +
      '</table>' +
      (standings.length ?
        '<table class="st"><thead><tr><th>Team</th><th>P</th><th>Pts</th><th>GD</th><th>GF</th></tr></thead><tbody>' +
        standings.map((t,i) => standingRow(t,i)).join('') +
        '</tbody></table>' : '') +
      '</div>';
  });

  const bonusRows = [
    ['\uD83C\uDFC6 Winner', bonus.winner ? f(bonus.winner)+' '+bonus.winner : '—'],
    ['\uD83E\uDD48 Runner-up', bonus.runnerUp ? f(bonus.runnerUp)+' '+bonus.runnerUp : '—'],
    ['\uD83E\uDD49 3rd Place', bonus.thirdPlace ? f(bonus.thirdPlace)+' '+bonus.thirdPlace : '—'],
    ['⚽ Golden Boot', bonus.goldenBoot || '—'],
    ['⏱ Tie-break', bonus.tiebreak || '—'],
  ].map(([l,v]) => '<tr><td class="bn-lbl">'+l+'</td><td>'+v+'</td></tr>').join('');

  const hdr = (sub) =>
    '<div class="hdr"><div><div class="hdr-title">WC26 <em>Predictions</em></div>' +
    '<div style="font-size:10px;color:#6b635b;margin-top:1px;">' + sub + '</div></div>' +
    '<div class="hdr-meta"><strong>' + user + '</strong><br>' +
    (profile.team ? profile.team+' · ' : '') + (profile.country||'') + '</div></div>';

  const jokerLine =
    '<div class="joker-info">' +
    '\uD83C\uDCCF Joker: <strong>' + (joker.team ? f(joker.team)+' '+joker.team : '—') + '</strong>' +
    ' &nbsp;&nbsp; Group: <strong>' + (joker.group ? joker.group : '—') + '</strong>' +
    '</div>';

  const secRow = (label) =>
    '<div class="sec-row"><span class="sec">' + label + '</span>' + jokerLine + '</div>';

  const date = new Date().toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'});

  const html =
    '<!DOCTYPE html><html><head><meta charset="UTF-8">' +
    '<title>WC26 Picks — ' + user + '</title>' +
    '<link href="https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=swap" rel="stylesheet">' +
    '<style>' + css + '</style></head><body>' +
    '<div class="page">' +
    hdr('Group Stage Picks · Printed ' + date) +
    secRow('Group Stage Predictions') +
    '<div class="gg">' + groupsHtml + '</div>' +
    '<div class="ft"><span>WC26 Predictions Competition</span><span>Page 1 of 2</span></div>' +
    '</div>' +
    '<div class="pb"></div>' +
    '<div class="page">' +
    hdr('Knockout Stage & Bonus Picks') +
    '<div class="sec-row"><span class="sec">Knockout Bracket</span></div>' +
    bracketSection +
    '<div style="margin-top:10px;"><div class="sec-row"><span class="sec">Bonus Picks</span></div>' +
    '<table class="bn-tbl">' + bonusRows + '</table></div>' +
    '<div class="ft"><span>WC26 Predictions Competition</span><span>Page 2 of 2</span></div>' +
    '</div>' +
    '<scr'+'ipt>window.print();<\/script>' +
    '</body></html>';

  const blob = new Blob([html], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  window.open(url, '_blank');
};



function Header({ user, userProfile, onLogout, view, setView, saveStatus, locked, predictions, profiles, isGuest }) {
  // Compute completion status for each tab
  const completion = useMemo(() => {
    const p = predictions || {};
    const group = p.group || {};
    const ko = p.ko || {};
    const bonus = p.bonus || {};
    const joker = p.joker || {};

    // Group: all 72 matches have scores AND joker picks set (joker lives on this tab)
    const groupDone = GROUP_MATCHES.every(m => {
      const r = group[m.id];
      return r && r.h !== '' && r.h != null && r.a !== '' && r.a != null;
    }) && !!(joker.team && joker.group);

    // Knockout: all 32 KO matches (73-104) have scores, draws have pk winners
    // User predictions store penalty winner as r.pk (not r.pkWinner which is admin results)
    const koDone = groupDone && range(73, 104).every(mId => {
      const r = ko[mId];
      if (!r || r.h === '' || r.h == null || r.a === '' || r.a == null) return false;
      if (parseInt(r.h) === parseInt(r.a) && !r.pk) return false;
      return true;
    });

    // Bonus: winner, runnerUp, thirdPlace, goldenBoot, tiebreak (joker handled in Group tab)
    const bonusDone = !!(
      bonus.winner && bonus.runnerUp && bonus.thirdPlace &&
      bonus.goldenBoot && bonus.tiebreak
    );

    return { groupDone, koDone, bonusDone };
  }, [predictions]);

  const doneStyle = { color: 'var(--forest)', fontWeight: 700 };
  const doneIndicator = <span style={{ color: 'var(--forest)', marginLeft: 3, fontSize: 10 }}>✓</span>;

  return (
    <header style={{ borderBottom: '1px solid var(--line)', background: 'var(--paper)', position: 'sticky', top: 0, zIndex: 10 }}>
      <div style={{ maxWidth: 1100, margin: '0 auto', padding: '12px 16px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div>
          <div className="micro-caps" style={{ marginBottom: -2 }}>FIFA World Cup 26</div>
          <div className="display" style={{ fontSize: 20, fontWeight: 700, letterSpacing: '-0.01em', lineHeight: 1.1 }}>
            Predictions <em style={{ fontStyle: 'italic', color: 'var(--burgundy)' }}>Pool</em>
          </div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, fontSize: 13 }}>
          {!isGuest && saveStatus === 'saving' && <span className="pill"><RefreshCw size={11} /> Saving</span>}
          {!isGuest && saveStatus === 'saved' && <span className="pill pill-success"><Check size={11} /> Saved</span>}
          <div style={{ textAlign: 'right' }}>
            <div style={{ fontWeight: 600, color: isGuest ? 'var(--ink-soft)' : 'var(--ink)' }}>
              {isGuest ? '👀 Guest' : user}
            </div>
            {!isGuest && userProfile && (
              <div style={{ fontSize: 11, color: 'var(--ink-soft)' }}>{userProfile.team} · {userProfile.country}</div>
            )}
          </div>
          {!isGuest && (
            <button
              className="btn"
              style={{ fontSize: 12, padding: '6px 12px', background: 'var(--forest)', color: 'white', border: 'none', borderRadius: 4, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 5 }}
              onClick={() => printPicks(predictions, user, profiles)}
              title="Download your picks as a PDF">
              🖨️ Download as PDF
            </button>
          )}
          <button className="btn-ghost" style={{ background: 'none', border: 'none', padding: 6, color: 'var(--ink-soft)' }} onClick={onLogout} title={isGuest ? 'Exit guest mode' : 'Sign out'}>
            <LogOut size={16} />
          </button>
        </div>
      </div>
      <nav className="scrollbar" style={{ maxWidth: 1100, margin: '0 auto', padding: '0 8px', display: 'flex', gap: 0, overflowX: 'auto' }}>
        {!isGuest && <button
          className={`tab-btn ${view === 'predictions' ? 'active' : ''}`}
          onClick={() => setView('predictions')}
          style={completion.groupDone && view !== 'predictions' ? doneStyle : {}}
        >
          <Calendar size={14} /> Group Stage{completion.groupDone && doneIndicator}
        </button>}
        {!isGuest && <button
          className={`tab-btn ${view === 'bracket' ? 'active' : ''}`}
          onClick={() => setView('bracket')}
          style={completion.koDone && view !== 'bracket' ? doneStyle : {}}
        >
          <Trophy size={14} /> Knockout{completion.koDone && doneIndicator}
        </button>}
        {!isGuest && <button
          className={`tab-btn ${view === 'bonus' ? 'active' : ''}`}
          onClick={() => setView('bonus')}

// Realistic football score distribution
const randomGoals = () => {
  const r = Math.random();
  if (r < 0.30) return 0;
  if (r < 0.57) return 1;
  if (r < 0.77) return 2;
  if (r < 0.90) return 3;
  if (r < 0.96) return 4;
  return 5;
};

const luckyDipMatches = (matchIds, existingPreds, overwrite = false) => {
  const newPreds = { ...existingPreds };
  matchIds.forEach(id => {
    const has = existingPreds[id] && existingPreds[id].h !== '' && existingPreds[id].h != null;
    if (has && !overwrite) return;
    newPreds[id] = { h: String(randomGoals()), a: String(randomGoals()) };
  });
  return newPreds;
};

// For KO lucky dip — also needs a pk pick if it's a draw
const luckyDipKoMatches = (bracket, existingKoPreds, overwrite = false) => {
  const newPreds = { ...existingKoPreds };
  for (let mId = 73; mId <= 104; mId++) {
    const m = bracket[mId];
    if (!m?.home || !m?.away) continue;
    const has = existingKoPreds[mId] && existingKoPreds[mId].h !== '' && existingKoPreds[mId].h != null;
    if (has && !overwrite) continue;
    const h = randomGoals(), a = randomGoals();
    const pk = h === a ? (Math.random() < 0.5 ? m.home : m.away) : undefined;
    newPreds[mId] = { h: String(h), a: String(a), ...(pk ? { pk } : {}) };
  }
  return newPreds;
};

function LuckyDipCard({ predictions, onSave, locked }) {
  const [confirm, setConfirm] = useState(false);

  const blankCount = GROUP_MATCHES.filter(m => {

  const handleFillBlanks = () => {
    const newGroup = luckyDipMatches(
      GROUP_MATCHES.map(m => m.id),
      predictions.group || {},
      false
    );
    onSave({ ...predictions, group: newGroup });
  };

  const handleRandomiseAll = () => {
    const newGroup = luckyDipMatches(
      GROUP_MATCHES.map(m => m.id),
      predictions.group || {},
      true
    );
    onSave({ ...predictions, group: newGroup });
    setConfirm(false);
  };

          <button

          >
            🎲 Fill {blankCount} blank{blankCount !== 1 ? 's' : ''}
          </button>
        )}
        {!confirm ? (
          <button

    return sum + total * getJokerMultiplier(m, jokerTeam, jokerGroup);

// MatchCells: renders as a React Fragment (4 grid cells) so all matches
// share the parent grid's column tracks → perfect score-box alignment.
function MatchCells({ match, pred, actual, onSet, jokerMultiplier = 1 }) {
  const locked = actual && actual.h !== '' && actual.h != null && actual.a !== '' && actual.a != null;
  const actualH = locked ? actual.h : null;
  const actualA = locked ? actual.a : null;
  const correct = locked && String(pred.h) === String(actualH) && String(pred.a) === String(actualA);
  const underdog = getUnderdog(match.home, match.away);

  const ph = locked ? parseInt(pred.h) : null;
  const pa = locked ? parseInt(pred.a) : null;
  const ah = locked ? parseInt(actualH) : null;
  const aa = locked ? parseInt(actualA) : null;
  const actualResult = locked && !isNaN(ah) && !isNaN(aa) ? (ah > aa ? 'H' : aa > ah ? 'A' : 'D') : null;
  const predResult   = locked && !isNaN(ph) && !isNaN(pa) ? (ph > pa ? 'H' : pa > ph ? 'A' : 'D') : null;
  const resultCorrect = actualResult && predResult && actualResult === predResult;

  const jokerColor = jokerMultiplier === 3 ? 'var(--burgundy)' : 'var(--amber)';
  const jokerBg = jokerMultiplier === 3
    ? 'rgba(159,27,27,0.05)'
    : jokerMultiplier === 2
      ? 'rgba(214,137,42,0.07)'
      : 'transparent';

  const cellBase = {
    padding: '9px 0',
    borderBottom: '1px solid var(--line-soft)',
    background: jokerBg,
  };

  const hasPred = pred.h !== '' && pred.h != null && pred.a !== '' && pred.a != null;
  const matchPts = locked && hasPred
    ? scoreMatch(pred, actual, match.home, match.away, true).total * jokerMultiplier
    : 0;

  return (
    <>
      {/* Col 1: home team - left border accent on joker rows */}
      <div style={{
        ...cellBase,
        display: 'flex', alignItems: 'center', justifyContent: 'flex-end',
        gap: 4, paddingRight: 8, minWidth: 0,
        borderLeft: jokerMultiplier > 1 ? `3px solid ${jokerColor}` : '3px solid transparent',
      }}>
        {FIFA_RANKINGS[match.home] && (
          <span style={{ fontSize: 9, color: match.home === underdog ? 'var(--burgundy)' : 'var(--ink-soft)', fontWeight: match.home === underdog ? 700 : 400, flexShrink: 0 }}>
            #{FIFA_RANKINGS[match.home]}
          </span>
        )}
        <span style={{
          fontSize: 13, fontWeight: match.home === underdog ? 600 : 500,
          color: match.home === underdog ? 'var(--burgundy)' : 'var(--ink)',
          overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
          textAlign: 'right',
        }}>
          {teamShort(match.home)}
        </span>
        <Flag team={match.home} size={16} />
      </div>

      {/* Col 2: score inputs */}
      <div style={{ ...cellBase, display: 'flex', alignItems: 'center', gap: 4, justifyContent: 'center', padding: '9px 6px' }}>
        <input
          type="number" min="0" max="20"
          className="input-score"
          value={pred.h ?? ''}
          onChange={e => onSet(match.id, 'h', e.target.value)}
          disabled={locked}
          style={locked ? { background: 'var(--cream-2)', color: 'var(--ink-soft)' } : {}}
        />
        <span style={{ fontSize: 12, color: 'var(--ink-soft)' }}>:</span>
        <input
          type="number" min="0" max="20"
          className="input-score"
          value={pred.a ?? ''}
          onChange={e => onSet(match.id, 'a', e.target.value)}
          disabled={locked}
          style={locked ? { background: 'var(--cream-2)', color: 'var(--ink-soft)' } : {}}
        />
      </div>

      {/* Col 3: away team - left-aligned */}
      <div style={{ ...cellBase, display: 'flex', alignItems: 'center', gap: 4, paddingLeft: 8, minWidth: 0 }}>
        <Flag team={match.away} size={16} />
        <span style={{
          fontSize: 13, fontWeight: match.away === underdog ? 600 : 500,
          color: match.away === underdog ? 'var(--burgundy)' : 'var(--ink)',
          overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
        }}>
          {teamShort(match.away)}
        </span>
        {FIFA_RANKINGS[match.away] && (
          <span style={{ fontSize: 9, color: match.away === underdog ? 'var(--burgundy)' : 'var(--ink-soft)', fontWeight: match.away === underdog ? 700 : 400, flexShrink: 0 }}>
            #{FIFA_RANKINGS[match.away]}
          </span>
        )}
      </div>

      {/* Result / joker label row - spans all 3 columns */}
      {(locked || jokerMultiplier > 1) && (
        <div style={{
          gridColumn: '1 / -1',
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
          padding: '3px 0 7px',
          borderBottom: '1px solid var(--line-soft)',
          background: jokerBg,
          marginTop: -1,
        }}>
          {jokerMultiplier > 1 && (
            <span style={{
              fontSize: 9, fontWeight: 800, letterSpacing: '0.06em',
              color: jokerColor,
              background: jokerMultiplier === 3 ? 'rgba(159,27,27,0.1)' : 'rgba(214,137,42,0.15)',
              padding: '2px 6px', borderRadius: 3,
            }}>
              {jokerMultiplier}× JOKER
            </span>
          )}
          {locked && (
            <>
              <span style={{ fontSize: 10, color: 'var(--ink-soft)' }}>Result:</span>
              <span className="mono" style={{
                fontSize: 12, fontWeight: 700,
                color: correct ? 'var(--forest)' : resultCorrect ? 'var(--amber)' : 'var(--ink-soft)',
              }}>
                {actualH}-{actualA}
              </span>
              {correct && <span style={{ fontSize: 9, color: 'var(--forest)', fontWeight: 700, letterSpacing: '0.06em' }}>EXACT ✓</span>}
              {!correct && resultCorrect && <span style={{ fontSize: 9, color: 'var(--amber)', fontWeight: 700, letterSpacing: '0.06em' }}>RESULT ✓</span>}
              {hasPred && (
                <span style={{
                  fontSize: 10, fontWeight: 800, letterSpacing: '0.04em',
                  color: matchPts > 0 ? 'var(--forest)' : 'var(--ink-soft)',
                  background: matchPts > 0 ? 'rgba(27,94,63,0.1)' : 'transparent',
                  padding: matchPts > 0 ? '2px 5px' : '0', borderRadius: 3,
                }}>
                  {matchPts > 0 ? `+${matchPts.toFixed(1).replace('.0','')} pts` : '0 pts'}
                </span>
              )}
            </>
          )}
        </div>
      )}
    </>
  );
}

function MatchRow({ match, pred, actual, onSet, jokerMultiplier = 1 }) {
  const locked = actual && actual.h !== '' && actual.h != null && actual.a !== '' && actual.a != null;
  const actualH = locked ? actual.h : null;
  const actualA = locked ? actual.a : null;
  const correct = locked && pred.h == actualH && pred.a == actualA;
  const underdog = getUnderdog(match.home, match.away);

  // For the result bar: compare predicted goals to actual
  const ph = locked ? parseInt(pred.h) : null;
  const pa = locked ? parseInt(pred.a) : null;
  const ah = locked ? parseInt(actualH) : null;
  const aa = locked ? parseInt(actualA) : null;
  const actualResult = locked && !isNaN(ah) && !isNaN(aa) ? (ah > aa ? 'H' : aa > ah ? 'A' : 'D') : null;
  const predResult   = locked && !isNaN(ph) && !isNaN(pa) ? (ph > pa ? 'H' : pa > ph ? 'A' : 'D') : null;
  const resultCorrect = actualResult && predResult && actualResult === predResult;

  const teamStyle = (team) => ({
    textAlign: team === match.home ? 'right' : 'left',
    color: team === underdog ? 'var(--burgundy)' : 'var(--ink)',
    fontWeight: team === underdog ? 600 : 500,
  });

  return (
    <div style={{ borderBottom: '1px solid var(--line-soft)', paddingBottom: locked ? 6 : 0 }}>
      <div className="match-row" style={{ borderBottom: 'none' }}>
        {/* Joker multiplier badge */}
        <div style={{ width: 28, textAlign: 'center', flexShrink: 0 }}>
          {jokerMultiplier > 1 && (
            <span style={{
              fontSize: 10, fontWeight: 800, lineHeight: 1,
              color: jokerMultiplier === 3 ? 'var(--burgundy)' : 'var(--amber)',
              display: 'block',
            }}>
              {jokerMultiplier}×
            </span>
          )}
        </div>
        <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'flex-end', gap: 6 }}>
          {match.home === underdog && (
            <span style={{ fontSize: 9, color: 'var(--burgundy)', fontWeight: 700, letterSpacing: '0.04em' }}>
              #{FIFA_RANKINGS[match.home]}
            </span>
          )}
          <span className="team-name" style={teamStyle(match.home)}>{teamShort(match.home)}</span>
          <Flag team={match.home} />
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
          <input
            type="number" min="0" max="20"
            className="input-score"
            value={pred.h ?? ''}
            onChange={e => onSet(match.id, 'h', e.target.value)}
            disabled={locked}
            style={locked ? { background: 'var(--cream-2)', color: 'var(--ink-soft)' } : {}}
          />
          <span style={{ fontSize: 12, color: 'var(--ink-soft)' }}>:</span>
          <input
            type="number" min="0" max="20"
            className="input-score"
            value={pred.a ?? ''}
            onChange={e => onSet(match.id, 'a', e.target.value)}
            disabled={locked}
            style={locked ? { background: 'var(--cream-2)', color: 'var(--ink-soft)' } : {}}
          />
        </div>
        <div style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 6 }}>
          <Flag team={match.away} />
          <span className="team-name" style={teamStyle(match.away)}>{teamShort(match.away)}</span>
          {match.away === underdog && (
            <span style={{ fontSize: 9, color: 'var(--burgundy)', fontWeight: 700, letterSpacing: '0.04em' }}>
              #{FIFA_RANKINGS[match.away]}
            </span>
          )}
        </div>
      </div>
      {locked && (
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6, paddingBottom: 4 }}>
          <span style={{ fontSize: 10, color: 'var(--ink-soft)' }}>Result:</span>
          <span
            className="mono"
            style={{
              fontSize: 12, fontWeight: 700,
              color: correct ? 'var(--forest)' : resultCorrect ? 'var(--amber)' : 'var(--ink-soft)',
            }}
          >
            {actualH}–{actualA}
          </span>
          {correct && (
            <span style={{ fontSize: 9, color: 'var(--forest)', fontWeight: 700, letterSpacing: '0.06em' }}>EXACT ✓</span>
          )}
          {!correct && resultCorrect && (
            <span style={{ fontSize: 9, color: 'var(--amber)', fontWeight: 700, letterSpacing: '0.06em' }}>RESULT ✓</span>
          )}
        </div>
      )}
    </div>
  );
}

// BRACKET VIEW (Knockout Predictions)
