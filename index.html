}

function RenameableParticipantCard({ name, profile, preds, bonus, joker, onRenameUser, onSetSelected, setBonus, setJokerField }) {
  const [editingName, setEditingName] = useState(false);
  const [newName, setNewName] = useState(name);
  const [renaming, setRenaming] = useState(false);

  const handleRename = async () => {
    const trimmed = newName.trim();
    if (!trimmed || trimmed === name) { setEditingName(false); setNewName(name); return; }
    setRenaming(true);
    await onRenameUser(name, trimmed);
    setRenaming(false);
    setEditingName(false);
    onSetSelected(trimmed);
  };

  return (
        <div className="card" style={{ padding: 22, maxWidth: 520 }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 18 }}>
            <div style={{ flex: 1 }}>
              {!editingName ? (
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <div className="display" style={{ fontSize: 18, fontWeight: 700 }}>{name}</div>
                  <button onClick={() => { setEditingName(true); setNewName(name); }}
                    style={{ fontSize: 11, color: 'var(--ink-soft)', background: 'none', border: '1px solid var(--line)', borderRadius: 4, padding: '2px 8px', cursor: 'pointer' }}>
                    ✏️ Rename
                  </button>
                </div>
              ) : (
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
                  <input
                    value={newName}
                    onChange={e => setNewName(e.target.value)}
                    onKeyDown={e => { if (e.key === 'Enter') handleRename(); if (e.key === 'Escape') { setEditingName(false); setNewName(name); } }}
                    autoFocus
                    style={{ fontSize: 16, fontWeight: 700, padding: '4px 8px', border: '1px solid var(--burgundy)', borderRadius: 4, fontFamily: 'inherit', width: 200 }}
                  />
                  <button onClick={handleRename} disabled={renaming}
                    className="btn" style={{ background: 'var(--forest)', fontSize: 12, padding: '4px 12px' }}>
                    {renaming ? 'Saving…' : 'Save'}
                  </button>
                  <button onClick={() => { setEditingName(false); setNewName(name); }}
                    className="btn-ghost btn" style={{ fontSize: 12, padding: '4px 10px' }}>
                    Cancel
                  </button>
                </div>
              )}
              {profile && (
                <div style={{ fontSize: 12, color: 'var(--ink-soft)', marginTop: 2 }}>{profile.team} · {profile.country}</div>
              )}
            </div>
          </div>

          {/* Bonus picks */}
          <div className="micro-caps" style={{ marginBottom: 10 }}>Bonus Picks</div>
          {BONUS_PICKS_CONFIG.map(({ key, label, icon, isTeam }) => (
            <div key={key} style={{ marginBottom: 16 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 6 }}>
                <span>{icon}</span>
                <span style={{ fontSize: 14, fontWeight: 600 }}>{label}</span>
                {bonus[key] && <span className="pill pill-success" style={{ fontSize: 10 }}>✓ {isTeam ? teamShort(bonus[key]) : bonus[key]}</span>}
              </div>
              {isTeam ? (
                <TeamSearchInput
                  value={bonus[key] || ''}
                  onChange={v => setBonus(key, v)}
                  placeholder="Search team..."
                />
              ) : (
                <input
                  value={bonus[key] || ''}
                  onChange={e => setBonus(key, e.target.value)}
                  placeholder="Player name..."
                  style={{
                    width: '100%', padding: '9px 12px', fontSize: 14,
                    border: '1px solid var(--line)', borderRadius: 4, fontFamily: 'inherit',
                  }}
                />
              )}
            </div>
          ))}

          {/* Tiebreak */}
          <div style={{ marginBottom: 20 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 6 }}>
              <span>⏱</span>
              <span style={{ fontSize: 14, fontWeight: 600 }}>Tie-Break Time</span>
              {bonus.tiebreak && <span className="pill" style={{ fontSize: 10 }}>{bonus.tiebreak}</span>}
            </div>
            <TiebreakerInput
              value={bonus.tiebreak || ''}
              onChange={v => setBonus('tiebreak', v)}
              disabled={false}
            />
          </div>

          <hr className="h-rule" />

          {/* Joker picks */}
          <div className="micro-caps" style={{ marginBottom: 10 }}>Joker Picks</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
            <div>
              <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 6 }}>Joker Team</div>
              <TeamSearchInput
                value={joker.team || ''}
                onChange={v => setJokerField('team', v)}
                placeholder="Pick a team..."
              />
            </div>
            <div>
              <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 6 }}>Joker Group</div>
              <JokerGroupPicker
                value={joker.group || ''}
                onChange={v => setJokerField('group', v)}
              />
            </div>
          </div>

          <div style={{ marginTop: 16, fontSize: 12, color: 'var(--forest)', fontWeight: 600 }}>
            Changes save automatically as you type.
          </div>
        </div>
  );
}

// ─── 3rd Place standings table ────────────────────────────────────────
function ThirdPlaceTable({ standings, qualifyingGroups = [] }) {
  const allThirds = GROUP_KEYS
    .map(g => {
      const s = standings[g];
      if (!s || s.length < 3) return null;
      return { ...s[2], group: g };
    })
    .filter(Boolean)
    .filter(t => t.P > 0)
    .sort((a, b) => {
      if (b.Pts !== a.Pts) return b.Pts - a.Pts;
      if (b.GD !== a.GD) return b.GD - a.GD;
      if (b.GF !== a.GF) return b.GF - a.GF;
      const ra = FIFA_RANKINGS[a.team] || 999, rb = FIFA_RANKINGS[b.team] || 999;
      if (ra !== rb) return ra - rb;
      return a.group.localeCompare(b.group);
    });

  if (!allThirds.length) return null;

  const qualifies = (t) => qualifyingGroups.includes(t.group);

  return (
    <div style={{ marginTop: 8, overflowX: 'auto' }} className="scrollbar">
      <div className="micro-caps" style={{ marginBottom: 6, color: 'var(--ink-soft)' }}>3rd Place Rankings</div>
      <table style={{ width: '100%', fontSize: 13, borderCollapse: 'collapse' }}>
        <thead>
          <tr style={{ borderBottom: '1px solid var(--line)', textAlign: 'left' }}>
            <th style={{ padding: '4px 4px', fontSize: 10, color: 'var(--ink-soft)', fontWeight: 600 }}>#</th>
            <th style={{ padding: '4px 4px', fontSize: 10, color: 'var(--ink-soft)', fontWeight: 600 }}>Team</th>
            <th style={{ padding: '4px 4px', fontSize: 10, color: 'var(--ink-soft)', fontWeight: 600, textAlign: 'center' }}>P</th>
            <th style={{ padding: '4px 4px', fontSize: 10, color: 'var(--ink-soft)', fontWeight: 600, textAlign: 'center' }}>GD</th>
            <th style={{ padding: '4px 4px', fontSize: 10, color: 'var(--ink-soft)', fontWeight: 600, textAlign: 'center' }}>GF</th>
            <th style={{ padding: '4px 4px', fontSize: 10, color: 'var(--ink-soft)', fontWeight: 600, textAlign: 'center' }}>Pts</th>
            <th style={{ padding: '4px 4px', fontSize: 10, color: 'var(--ink-soft)', fontWeight: 600, textAlign: 'center' }}>Grp</th>
          </tr>
        </thead>
        <tbody>
          {allThirds.map((t, i) => {
            const through = qualifies(t);
            const possible = !through && qualifyingGroups.length === 0 && i < 8;
            return (
              <tr key={t.group} style={{
                borderBottom: '1px solid var(--line-soft)',
                background: through ? 'rgba(27,94,63,0.06)' : 'transparent',
              }}>
                <td style={{ padding: '6px 4px', color: through ? 'var(--forest)' : (possible ? 'var(--amber)' : 'var(--ink-soft)'), fontWeight: 600 }}>
                  {i + 1}
                </td>
                <td style={{ padding: '6px 4px', display: 'flex', alignItems: 'center', gap: 6 }}>
                  <Flag team={t.team} size={14} />
                  <span style={{ fontWeight: through ? 600 : 400 }}>{teamShort(t.team)}</span>
                  {through && <span style={{ fontSize: 8, color: 'var(--forest)', fontWeight: 700, letterSpacing: '0.06em', marginLeft: 2 }}>Q</span>}
                </td>
                <td className="mono" style={{ padding: '6px 4px', textAlign: 'center' }}>{t.P}</td>
                <td className="mono" style={{ padding: '6px 4px', textAlign: 'center' }}>{t.GD > 0 ? '+' + t.GD : t.GD}</td>
                <td className="mono" style={{ padding: '6px 4px', textAlign: 'center' }}>{t.GF}</td>
                <td className="mono" style={{ padding: '6px 4px', textAlign: 'center', fontWeight: 700 }}>{t.Pts}</td>
                <td className="mono" style={{ padding: '6px 4px', textAlign: 'center', color: 'var(--ink-soft)' }}>{t.group}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
      <div style={{ fontSize: 10, color: 'var(--ink-soft)', marginTop: 6, display: 'flex', gap: 12 }}>
        <span><span style={{ color: 'var(--forest)' }}>●</span> Qualifies</span>
        <span><span style={{ color: 'var(--amber)' }}>●</span> Possible qualifier</span>
      </div>
    </div>
  );
}

// ─── Admin group card (same format as user GroupCard) ─────────────────
function AdminGroupCard({ groupKey, isOpen, onToggle, results, onSetResult }) {
  const teams = GROUPS[groupKey];
  const matches = GROUP_MATCHES.filter(m => m.group === groupKey);
  const actualResults = results.group || {};
  const standings = useMemo(() => computeAllStandings(actualResults), [actualResults]);
  const groupStandings = standings[groupKey] || [];
  const done = matches.filter(m => {
    const r = actualResults[m.id];
    return r && r.h !== '' && r.h != null && r.a !== '' && r.a != null;
  }).length;

  return (
    <div className="card" style={{ overflow: 'hidden' }}>
      <button
        onClick={onToggle}
        style={{ width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'space-between', background: 'none', border: 'none', padding: '14px 16px', textAlign: 'left' }}
      >
        <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
          <span className="group-letter" style={{ color: 'var(--burgundy)' }}>{groupKey}</span>
          <div>
            <div className="display" style={{ fontSize: 15, fontWeight: 600 }}>Group {groupKey}</div>
            <div style={{ fontSize: 11, color: 'var(--ink-soft)', marginTop: 1 }}>{teams.map(t => teamShort(t)).join(' · ')}</div>
          </div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <span className={`pill ${done === matches.length ? 'pill-success' : ''}`}>{done}/{matches.length}</span>
          {isOpen ? <ChevronDown size={18} /> : <ChevronRight size={18} />}
        </div>
      </button>

      {isOpen && (
        <div className="fadein" style={{ borderTop: '1px solid var(--line)' }}>
          <div style={{ padding: '12px 16px 4px' }}>
            <div className="micro-caps" style={{ marginBottom: 6 }}>Results</div>
            <div style={{ display: 'grid', gridTemplateColumns: 'minmax(0,1fr) auto minmax(0,1fr)', alignItems: 'center' }}>
              {[1, 2, 3].map(md => (
                <React.Fragment key={md}>
                  <div style={{ gridColumn: '1 / -1', fontSize: 11, color: 'var(--ink-soft)', fontWeight: 500, padding: '6px 0 2px' }}>Matchday {md}</div>
                  {matches.filter(m => m.matchday === md).map(m => {
                    const r = actualResults[m.id] || { h: '', a: '' };
                    const cellBase = { padding: '7px 0', borderBottom: '1px solid var(--line-soft)' };
                    return (

function RebuildParticipantsButton({ setParticipants, profiles, setProfiles }) {
  const [status, setStatus] = useState(null);
  const [count, setCount] = useState(null);

  const handleRebuild = async () => {
    setStatus('running');
    try {
      const snap = await db.collection('wc26').get();
      const names = new Set();

      // From prediction docs: {NS}-pred-{name}
      snap.docs.forEach(doc => {
        const id = doc.id;
        const prefix = NS + '-pred-';
        if (id.startsWith(prefix)) {
          const name = id.slice(prefix.length);
          if (name && name.trim()) names.add(name.trim());
        }
      });

      // Read existing profiles — preserve PINs/data where intact
      let existingProfiles = {};
      const profilesDoc = snap.docs.find(d => d.id === NS + '-profiles');
      if (profilesDoc) {
        try {
          existingProfiles = JSON.parse(profilesDoc.data().value || '{}');
          Object.keys(existingProfiles).forEach(n => { if (n.trim()) names.add(n.trim()); });
        } catch {}
      }

      if (names.size === 0) { setStatus('empty'); return; }

      // Merge: keep existing profiles intact, add blank placeholder for missing users
      // Blank profile = no PIN stored, user will be prompted to set one on next login
      const mergedProfiles = { ...existingProfiles };
      let added = 0;
      names.forEach(name => { if (!mergedProfiles[name]) { mergedProfiles[name] = {}; added++; } });

      const list = [...names].sort((a, b) => a.localeCompare(b));
      await storage.set(NS + '-participants', list, true);
      await storage.set(NS + '-profiles', mergedProfiles, true);
      setParticipants(list);
      setProfiles(mergedProfiles);
      setCount({ total: list.length, added });
      setStatus('done');
    } catch (e) {
      console.error(e);
      setStatus('error');
    }
  };

  return (
    <div>
      <button onClick={handleRebuild} disabled={status === 'running'}
        className="btn" style={{ background: 'var(--forest)', fontSize: 13, padding: '8px 18px', marginBottom: 10 }}>
        {status === 'running' ? 'Rebuilding…' : '🔧 Rebuild Participant List'}
      </button>
      {status === 'done' && (
        <div style={{ fontSize: 12, color: 'var(--forest)', fontWeight: 600 }}>
          ✓ {count.total} participant{count.total !== 1 ? 's' : ''} restored
          {count.added > 0
            ? ` · ${count.added} missing profile${count.added !== 1 ? 's' : ''} added without PIN — affected users will be prompted to set a new one on login`
            : ' · all profiles intact, PINs preserved'}
        </div>
      )}
      {status === 'empty' && (
        <div style={{ fontSize: 12, color: 'var(--ink-soft)' }}>
          No prediction or profile data found under this competition namespace.
        </div>
      )}
      {status === 'error' && (
        <div style={{ fontSize: 12, color: 'var(--burgundy)' }}>
          ✗ Failed — check your connection and try again.
        </div>
      )}
    </div>
  );
}

              allPredictions={allPredictions}
              results={results}
              profiles={profiles}
              onSave={onSave}
            />
          </div>

          <hr className="h-rule" />

          <h3 className="display" style={{ fontSize: 18, fontWeight: 700, margin: '0 0 12px' }}>Participants</h3>
          <p style={{ fontSize: 12, color: 'var(--ink-soft)', marginBottom: 12 }}>{participants.length} registered</p>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
            {participants.map(p => <span key={p} className="pill">{p}</span>)}
          </div>
        </div>
      )}

      <AdminSimulatorSection
        participants={participants}
        allPredictions={allPredictions}
        results={results}
      />
    </div>
  );
}

function SnapshotButton({ participants, allPredictions, results, profiles, onSave }) {
  const [label, setLabel] = useState('');
  const [saved, setSaved] = useState(false);

  // Compute current ranking order (same logic as leaderboard)
  const getCurrentRankings = () => {
    return [...participants].sort((a, b) => {
      const pa = allPredictions[a] || {};
      const pb = allPredictions[b] || {};
      const sa = computeUserScore(pa, results.group || {}, results.ko || {}, results.bracketTeams, results.bonus || {}, pa.joker || {});
      const sb = computeUserScore(pb, results.group || {}, results.ko || {}, results.bracketTeams, results.bonus || {}, pb.joker || {});
      return sb.total - sa.total;
    }).map(p => p);
  };

  const handleSave = () => {
    if (!label.trim()) return;
    const rankings = getCurrentRankings();
    onSave({ ...results, rankingSnapshot: { label: label.trim(), rankings, savedAt: Date.now() } });
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
    setLabel('');
  };

  return (
    <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap', width: '100%' }}>
      <input
        value={label}
        onChange={e => setLabel(e.target.value)}
        placeholder="e.g. After Matchday 1, After R32…"
        onKeyDown={e => e.key === 'Enter' && handleSave()}
        style={{
          flex: 1, minWidth: 180, padding: '9px 12px', fontSize: 14,
          border: '1px solid var(--line)', borderRadius: 4, fontFamily: 'inherit',
        }}
      />
      <button
        className="btn"
        onClick={handleSave}
        disabled={!label.trim()}
        style={{ background: saved ? 'var(--forest)' : 'var(--ink)', minWidth: 120 }}
      >
        {saved ? '✓ Saved!' : '📸 Snapshot'}
      </button>
    </div>
  );
}

function BracketTeamsAdmin({ results, onSave }) {
  const rounds = ['R32', 'R16', 'QF', 'SF', 'Final', '3rd'];
  const labels = { R32: 'Round of 32 (32 teams)', R16: 'Round of 16 (16 teams)', QF: 'Quarter-Finals (8 teams)', SF: 'Semi-Finals (4 teams)', Final: 'Finalists (2 teams)', '3rd': '3rd Place play-off (2 teams)' };
  const maxCount = { R32: 32, R16: 16, QF: 8, SF: 4, Final: 2, '3rd': 2 };

  const bracketTeams = results.bracketTeams || {};

  const toggleTeam = (round, team) => {
    const current = new Set(bracketTeams[round] || []);
    if (current.has(team)) current.delete(team);
    else if (current.size < maxCount[round]) current.add(team);
    onSave(round, Array.from(current));
  };

  return (
    <div style={{ marginTop: 20 }}>
      <p style={{ fontSize: 13, color: 'var(--ink-soft)' }}>Mark which teams reached each round (for the team-bonus scoring). Up to {maxCount.R32} for R32, halving each round.</p>
      {rounds.map(r => {
        const selected = new Set(bracketTeams[r] || []);
        return (
          <div key={r} className="card" style={{ padding: 14, marginBottom: 10 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 10 }}>
              <strong className="display" style={{ fontSize: 16 }}>{labels[r]}</strong>
              <span className="pill mono">{selected.size}/{maxCount[r]}</span>
            </div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {ALL_TEAMS.map(t => {
                const isOn = selected.has(t);
                const atCap = !isOn && selected.size >= maxCount[r];
                return (
                  <button
                    key={t}
                    onClick={() => toggleTeam(r, t)}
                    disabled={atCap}
                    className="pill"
                    style={{
                      cursor: atCap ? 'not-allowed' : 'pointer',
                      background: isOn ? 'var(--forest)' : 'var(--cream-2)',
                      color: isOn ? 'white' : 'var(--ink)',
                      borderColor: isOn ? 'var(--forest)' : 'var(--line)',
                      opacity: atCap ? 0.3 : 1,
                      padding: '4px 10px',
                    }}
                  >
                    <Flag team={t} size={11} /> {teamShort(t)}
                  </button>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
