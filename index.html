// ──────────────────────────────────────────────────────────────────────
// BracketMatchCard - used in bracket layout
// ──────────────────────────────────────────────────────────────────────

function BracketMatchCard({ match, pred, actual, onSet, onSetPk, gridColumn, gridRow, side, pairPos, isFinal, isThirdPlace, bracketPts = 0 }) {
  if (!match) return null;
  const homeKnown = !!match.home;
  const awayKnown = !!match.away;
  const hasTeams = homeKnown && awayKnown;   // both known — enables score entry
  const hasAnyTeam = homeKnown || awayKnown; // at least one — show card at full opacity
  const locked = actual && actual.h !== '' && actual.h != null && actual.a !== '' && actual.a != null;
  const userPred = pred || { h: '', a: '' };
  const h = userPred.h, a = userPred.a;
  const scoresEntered = h !== '' && h != null && a !== '' && a != null;
  const isDraw = scoresEntered && parseInt(h) === parseInt(a);
  const pkChoice = userPred.pk;
  const needsPk = isDraw && hasTeams && (pkChoice !== match.home && pkChoice !== match.away);

  // Determine which team "advanced" (for visual emphasis)
  let advancer = null;
  if (scoresEntered && hasTeams) {
    const hi = parseInt(h), ai = parseInt(a);
    if (hi > ai) advancer = match.home;
    else if (ai > hi) advancer = match.away;
    else if (pkChoice === match.home || pkChoice === match.away) advancer = pkChoice;
  }

  // Pre-compute KO match points (goals/result always scored regardless of teams)
  const actualHome = locked ? (actual.homeTeam || null) : null;
  const actualAway = locked ? (actual.awayTeam || null) : null;
  const homeMatchKo = hasTeams && actualHome && match.home === actualHome;
  const awayMatchKo = hasTeams && actualAway && match.away === actualAway;
  const fullSwapKo = hasTeams && actualHome && actualAway && match.home === actualAway && match.away === actualHome;
  let koPts = 0;
  if (locked && scoresEntered) {
    const eActH = fullSwapKo ? parseInt(actual.a) : parseInt(actual.h);
    const eActA = fullSwapKo ? parseInt(actual.h) : parseInt(actual.a);
    const pH = parseInt(h), pA = parseInt(a);
    // Result direction: always
    const pRes = pH > pA ? 'H' : pH < pA ? 'A' : 'D';
    const aRes = eActH > eActA ? 'H' : eActH < eActA ? 'A' : 'D';
    if (pRes === aRes) koPts += aRes === 'D' ? 2 : 1;
    // Goals: always (no team gate)
    if (pH === eActH) koPts += 1;
    if (pA === eActA) koPts += 1;
    // Exact bonus: always (regardless of teams)
    if (pH === eActH && pA === eActA) koPts += 1;

    // Giant Killer: R32 only — GW slot lost and user predicted it to lose
    if (match.id >= 73 && match.id <= 88) {
      const slot = R32_SLOTS[match.id];
      const gwIsHome = slot.home.type === '1', gwIsAway = slot.away.type === '1';
      if (gwIsHome || gwIsAway) {
        const gwSlotWon = gwIsHome
          ? (eActH > eActA || (eActH === eActA && actual.pkWinner === actualHome))
          : (eActA > eActH || (eActA === eActH && actual.pkWinner === actualAway));
        if (!gwSlotWon) {
          const userGwSlotWon = gwIsHome
            ? (pH > pA || (pH === pA && match.pkWinner === match.home))
            : (pA > pH || (pA === pH && match.pkWinner === match.away));
          if (!userGwSlotWon) koPts += SCORING.giantKillerBonus;
        }
      }
    }
  }
  const STUB = 9;       // length of horizontal stub from card edge
  const EXIT = 18;      // padding reserved in wrapper for connectors
  const GAP = 18;       // grid columnGap
  const VLINE = 'var(--line)';
  const VWIN  = 'var(--forest)';
  const lineColor = advancer ? VWIN : VLINE;

  const wrapperStyle = {
    gridColumn,
    gridRow,
    display: 'flex',
    flexDirection: 'column',
    justifyContent: 'center',
    position: 'relative',
    paddingRight: side === 'left' ? EXIT : 0,
    paddingLeft: side === 'right' ? EXIT : 0,
  };

  return (
    <div style={wrapperStyle}>
      {/* Bracket connectors */}
      {/* LEFT side, TOP pair: stub + vertical down + trunk */}
      {side === 'left' && pairPos === 'top' && (
        <>
          <div style={{ position: 'absolute', top: '50%', right: EXIT - STUB, width: STUB, height: 1, background: lineColor }} />
          <div style={{ position: 'absolute', top: '50%', right: EXIT - STUB - 1, bottom: 0, width: 1, background: lineColor }} />
          <div style={{ position: 'absolute', bottom: 0, right: -GAP, width: EXIT - STUB + GAP, height: 1, background: VLINE }} />
        </>
      )}
      {/* LEFT side, BOTTOM pair: stub - vertical UP (meets top's vertical) */}
      {side === 'left' && pairPos === 'bottom' && (
        <>
          <div style={{ position: 'absolute', top: '50%', right: EXIT - STUB, width: STUB, height: 1, background: lineColor }} />
          <div style={{ position: 'absolute', top: 0, right: EXIT - STUB - 1, height: '50%', width: 1, background: lineColor }} />
        </>
      )}
      {/* LEFT side, SOLO (SF - Final): horizontal line all the way through */}
      {side === 'left' && pairPos === 'solo' && (
        <div style={{ position: 'absolute', top: '50%', right: -GAP, width: EXIT + GAP, height: 1, background: lineColor }} />
      )}

      {/* RIGHT side mirrors */}
      {side === 'right' && pairPos === 'top' && (
        <>
          <div style={{ position: 'absolute', top: '50%', left: EXIT - STUB, width: STUB, height: 1, background: lineColor }} />
          <div style={{ position: 'absolute', top: '50%', left: EXIT - STUB - 1, bottom: 0, width: 1, background: lineColor }} />
          <div style={{ position: 'absolute', bottom: 0, left: -GAP, width: EXIT - STUB + GAP, height: 1, background: VLINE }} />
        </>
      )}
      {side === 'right' && pairPos === 'bottom' && (
        <>
          <div style={{ position: 'absolute', top: '50%', left: EXIT - STUB, width: STUB, height: 1, background: lineColor }} />
          <div style={{ position: 'absolute', top: 0, left: EXIT - STUB - 1, height: '50%', width: 1, background: lineColor }} />
        </>
      )}
      {side === 'right' && pairPos === 'solo' && (
        <div style={{ position: 'absolute', top: '50%', left: -GAP, width: EXIT + GAP, height: 1, background: lineColor }} />
      )}

      {/* Match card */}
      <div
        style={{
          background: isFinal ? 'linear-gradient(180deg, #FFF8E5 0%, #FAEEC8 100%)' : (isThirdPlace ? 'var(--cream-2)' : 'var(--paper)'),
          border: `1px solid ${isFinal ? 'var(--amber)' : (advancer ? 'var(--forest)' : 'var(--line)')}`,
          borderRadius: 4,
          padding: isFinal ? '14px 14px 10px' : '8px 9px',
          fontSize: 12,
          boxShadow: isFinal ? '0 4px 16px rgba(214,137,42,0.22)' : 'none',
          opacity: hasAnyTeam ? 1 : 0.45,
          position: 'relative',
          zIndex: 1,
        }}
      >
        {/* Match label */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4, height: 12 }}>
          <span style={{ fontSize: 9, color: 'var(--ink-soft)', fontWeight: 600, letterSpacing: '0.08em' }}>
            {isFinal ? '⚜ FINAL ⚜' : isThirdPlace ? '3RD PLACE' : `M${match.id}`}
          </span>
          {needsPk && (
            <span style={{ fontSize: 9, color: 'var(--burgundy)', fontWeight: 700 }}>PICK PK ↓</span>
          )}
        </div>

        {/* Home team row */}
        <TeamRowCompact
          team={match.home}
          score={h}
          isAdvancer={advancer === match.home}
          isLoser={advancer && advancer !== match.home}
          teamKnown={homeKnown}
          hasTeams={hasTeams}
          locked={locked}
          onScoreChange={(v) => onSet(match.id, 'h', v)}
          isFinal={isFinal}
          placeholder={getSlotLabel(match.id, 'home')}
        />
        {/* Away team row */}
        <TeamRowCompact
          team={match.away}
          score={a}
          isAdvancer={advancer === match.away}
          isLoser={advancer && advancer !== match.away}
          teamKnown={awayKnown}
          hasTeams={hasTeams}
          locked={locked}
          onScoreChange={(v) => onSet(match.id, 'a', v)}
          isFinal={isFinal}
          placeholder={getSlotLabel(match.id, 'away')}
        />

        {/* Penalty winner picker (visible when draw) */}
        {isDraw && hasTeams && !locked && (
          <div style={{ marginTop: 6, padding: '6px 2px 0', borderTop: '1px dashed var(--line)' }}>
            <div style={{ fontSize: 9, color: needsPk ? 'var(--burgundy)' : 'var(--ink-soft)', textAlign: 'center', marginBottom: 4, letterSpacing: '0.06em', fontWeight: 600 }}>WINS ON PENS</div>
            <div style={{ display: 'flex', gap: 4 }}>
              <button
                onClick={() => onSetPk(match.id, match.home)}
                style={{
                  flex: 1,
                  background: pkChoice === match.home ? 'var(--burgundy)' : 'transparent',
                  color: pkChoice === match.home ? 'white' : 'var(--ink)',
                  border: `1px solid ${pkChoice === match.home ? 'var(--burgundy)' : 'var(--line)'}`,
                  borderRadius: 3, padding: '3px 4px', cursor: 'pointer',
                  fontSize: 10, fontWeight: 600,
                  display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 3,
                  fontFamily: 'inherit',
                }}
              >
                <Flag team={match.home} size={10} /> {teamShort(match.home).slice(0, 10)}
              </button>
              <button
                onClick={() => onSetPk(match.id, match.away)}
                style={{
                  flex: 1,
                  background: pkChoice === match.away ? 'var(--burgundy)' : 'transparent',
                  color: pkChoice === match.away ? 'white' : 'var(--ink)',
                  border: `1px solid ${pkChoice === match.away ? 'var(--burgundy)' : 'var(--line)'}`,
                  borderRadius: 3, padding: '3px 4px', cursor: 'pointer',
                  fontSize: 10, fontWeight: 600,
                  display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 3,
                  fontFamily: 'inherit',
                }}
              >
                <Flag team={match.away} size={10} /> {teamShort(match.away).slice(0, 10)}
              </button>
            </div>
          </div>
        )}

        {/* Actual result overlay */}
        {locked && (
          <div style={{ marginTop: 6, textAlign: 'center' }}>
            <div style={{ fontSize: 9, color: 'var(--forest)', fontWeight: 600 }}>
              {actualHome ? teamShort(actualHome) : '?'} <span className="mono">{actual.h}-{actual.a}</span> {actualAway ? teamShort(actualAway) : '?'}
            </div>
            {actual.pkWinner && parseInt(actual.h) === parseInt(actual.a) && (
              <div style={{ fontSize: 9, color: 'var(--ink-soft)', fontStyle: 'italic', marginTop: 1 }}>
                {teamShort(actual.pkWinner)} win on pens
              </div>
            )}
            {/* Points: only show once match result is entered */}
            {scoresEntered && (
              <div style={{ marginTop: 2 }}>
                {(koPts + bracketPts) > 0 ? (
                  <>
                    <span style={{
                      display: 'inline-block',
                      fontSize: 10, fontWeight: 800,
                      color: 'var(--forest)',
                      background: 'rgba(27,94,63,0.1)',
                      padding: '2px 6px', borderRadius: 3,
                    }}>
                      +{(koPts + bracketPts).toFixed(1).replace('.0','')} pts
                    </span>
                    {bracketPts > 0 && koPts > 0 && (
                      <div style={{ fontSize: 8, color: 'var(--ink-soft)', marginTop: 1 }}>
                        {koPts} match + {bracketPts.toFixed(1).replace('.0','')} bracket
                      </div>
                    )}
                    {bracketPts > 0 && koPts === 0 && (
                      <div style={{ fontSize: 8, color: 'var(--ink-soft)', marginTop: 1 }}>
                        {bracketPts.toFixed(1).replace('.0','')} bracket pts
                      </div>
                    )}
                  </>
                ) : (
                  scoresEntered && <span style={{ fontSize: 10, color: 'var(--ink-soft)' }}>0 pts</span>
                )}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function TeamRowCompact({ team, score, isAdvancer, isLoser, teamKnown, hasTeams, locked, onScoreChange, isFinal, placeholder = 'TBD' }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 5,
      padding: '3px 0',
      opacity: isLoser ? 0.45 : 1,
      borderRadius: 2,
    }}>
      <span style={{ fontSize: 14, lineHeight: 1, flexShrink: 0 }}>
        {teamKnown ? (TEAM_FLAGS[team] || '⚽') : '○'}
      </span>
      <span style={{
        flex: 1, fontSize: isFinal ? 13 : 11,
        fontWeight: isAdvancer ? 700 : 500,
        color: teamKnown ? 'var(--ink)' : 'var(--ink-soft)',
        whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
        fontStyle: teamKnown ? 'normal' : 'italic',
      }}>
        {teamKnown ? teamShort(team) : placeholder}
      </span>
      <input
        type="number" min="0" max="20"
        value={score ?? ''}
        onChange={e => {
          const v = e.target.value;
          if (v === '' || (parseInt(v) >= 0 && parseInt(v) <= 20)) onScoreChange(v);
        }}
        disabled={!hasTeams || locked}
        style={{
          width: 28, height: 24, padding: 0, textAlign: 'center',
          fontFamily: 'JetBrains Mono, monospace',
          fontSize: 12, fontWeight: 700,
          background: !hasTeams || locked ? 'var(--cream-2)' : 'white',
          border: '1px solid var(--line)',
          borderRadius: 3, color: 'var(--ink)',
          MozAppearance: 'textfield',
        }}
      />
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────
// LIST BRACKET (fallback flat view, ordered by round)
// ──────────────────────────────────────────────────────────────────────

function ListBracket({ bracket, predictions, results, onSet, onSetPk, bracketPtsPerMatch = {} }) {
  const rounds = [
    { title: 'Round of 32', ids: range(73, 88) },
    { title: 'Round of 16', ids: range(89, 96) },
    { title: 'Quarter-Finals', ids: range(97, 100) },
    { title: 'Semi-Finals', ids: range(101, 102) },
    { title: '3rd Place Play-off', ids: [103] },
    { title: 'Final', ids: [104], isFinal: true },
  ];

  return (
    <>
      {rounds.map(({ title, ids, isFinal }) => {
        const matches = ids.map(id => bracket[id]).filter(Boolean);
        const allBlank = matches.every(m => !m || !m.home || !m.away);
        if (allBlank) return null;
        return (
          <div key={title} style={{ marginBottom: 26 }}>
            <div style={{ display: 'flex', alignItems: 'baseline', gap: 12, marginBottom: 10 }}>
              <h3 className="display" style={{ fontSize: 22, fontWeight: 700, margin: 0, letterSpacing: '-0.01em' }}>
                {isFinal && <Crown size={20} style={{ display: 'inline', color: 'var(--amber)', marginRight: 6, verticalAlign: 'baseline' }} />}
                {title}
              </h3>
              <div style={{ flex: 1, height: 1, background: 'var(--line)' }} />
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: isFinal ? '1fr' : 'repeat(auto-fill, minmax(260px, 1fr))', gap: 8 }}>
              {matches.map(m => (
                <ListMatchCard
                  key={m.id}
                  match={m}
                  pred={predictions[m.id]}
                  actual={results[m.id]}
                  onSet={onSet}
                  onSetPk={onSetPk}
                  isFinal={isFinal}
                  bracketPts={bracketPtsPerMatch[m.id] || 0}
                />
              ))}
            </div>
          </div>
        );
      })}
    </>
  );
}

function ListMatchCard({ match, pred, actual, onSet, onSetPk, isFinal, bracketPts = 0 }) {
  const homeKnown = !!match.home;
  const awayKnown = !!match.away;
  const hasTeams = homeKnown && awayKnown;
  const hasAnyTeam = homeKnown || awayKnown;
  const locked = actual && actual.h !== '' && actual.h != null && actual.a !== '' && actual.a != null;
  const userPred = pred || { h: '', a: '' };
  const isDraw = userPred.h !== '' && userPred.a !== '' && userPred.h != null && userPred.a != null && parseInt(userPred.h) === parseInt(userPred.a);
  const pkChoice = userPred.pk;
  const needsPk = isDraw && hasTeams && pkChoice !== match.home && pkChoice !== match.away;

  // Pre-compute match score pts for display (result direction always counts)
  let listKoPts = 0;
  if (locked && userPred.h !== '' && userPred.h != null) {
    const predH = parseInt(userPred.h), predA = parseInt(userPred.a);
    const actH = parseInt(actual.h), actA = parseInt(actual.a);
    const aHome = actual.homeTeam || null, aAway = actual.awayTeam || null;
    const hMatch = match.home === aHome, aMatch = match.away === aAway;
    const fSwap = match.home === aAway && match.away === aHome;
    const eH = fSwap ? actA : actH, eA = fSwap ? actH : actA;
    const pRes = predH > predA ? 'H' : predH < predA ? 'A' : 'D';
    const aRes = eH > eA ? 'H' : eH < eA ? 'A' : 'D';
    if (pRes === aRes) listKoPts += aRes === 'D' ? SCORING.correctDraw : SCORING.correctResult;
    if (predH === eH) listKoPts += SCORING.homeGoals;
    if (predA === eA) listKoPts += SCORING.awayGoals;
    if (predH === eH && predA === eA) listKoPts += SCORING.exactBonus;
    // Giant Killer: R32 only
    if (match.id >= 73 && match.id <= 88) {
      const slot = R32_SLOTS[match.id];
      const gwIsHome = slot.home.type === '1', gwIsAway = slot.away.type === '1';
      if (gwIsHome || gwIsAway) {
        const gwSlotWon = gwIsHome
          ? (eH > eA || (eH === eA && actual.pkWinner === aHome))
          : (eA > eH || (eA === eH && actual.pkWinner === aAway));
        if (!gwSlotWon) {
          const userGwSlotWon = gwIsHome
            ? (predH > predA || (predH === predA && userPred.pk === match.home))
            : (predA > predH || (predA === predH && userPred.pk === match.away));
          if (!userGwSlotWon) listKoPts += SCORING.giantKillerBonus;
        }
      }
    }
  }
  const totalListPts = listKoPts + bracketPts;

  return (
    <div className="card" style={{
      padding: 12, opacity: hasAnyTeam ? 1 : 0.5,
      background: isFinal ? '#FFF8E5' : 'var(--paper)',
      borderColor: isFinal ? 'var(--amber)' : 'var(--line)'
    }}>

        <span className="micro-caps">Match {match.id}</span>
        {isFinal && <span className="pill pill-warning"><Trophy size={10} /> Final</span>}
        {needsPk && <span className="pill pill-danger" style={{ fontSize: 9 }}>Choose PK winner</span>}
      </div>
      <div className="match-row" style={{ borderBottom: 'none', padding: '4px 0' }}>
        <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'flex-end', gap: 6 }}>

            {homeKnown ? teamShort(match.home) : getSlotLabel(match.id, 'home')}

          {homeKnown && <Flag team={match.home} />}

        <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
          <input
            type="number" min="0" max="20"
            className="input-score"
            value={userPred.h ?? ''}
            onChange={e => onSet(match.id, 'h', e.target.value)}

            style={(!hasTeams || locked) ? { background: 'var(--cream-2)', color: 'var(--ink-soft)' } : {}}
          />
          <span style={{ fontSize: 12, color: 'var(--ink-soft)' }}>:</span>
          <input
            type="number" min="0" max="20"
            className="input-score"
            value={userPred.a ?? ''}
            onChange={e => onSet(match.id, 'a', e.target.value)}
            disabled={!hasTeams || locked}
            style={(!hasTeams || locked) ? { background: 'var(--cream-2)', color: 'var(--ink-soft)' } : {}}
          />
        </div>
        <div style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 6 }}>
          {awayKnown && <Flag team={match.away} />}
          <span className="team-name" style={{ color: awayKnown ? 'var(--ink)' : 'var(--ink-soft)', fontStyle: awayKnown ? 'normal' : 'italic' }}>
            {awayKnown ? teamShort(match.away) : getSlotLabel(match.id, 'away')}
          </span>
        </div>
      </div>

      {/* Penalty winner picker */}
      {isDraw && hasTeams && !locked && (
        <div style={{ marginTop: 8, padding: '8px 0 0', borderTop: '1px dashed var(--line)' }}>
          <div className="micro-caps" style={{ marginBottom: 6, textAlign: 'center', color: needsPk ? 'var(--burgundy)' : 'var(--ink-soft)' }}>
            Penalty Shootout — Who Advances?
          </div>
          <div style={{ display: 'flex', gap: 6 }}>
            <button
              onClick={() => onSetPk(match.id, match.home)}
              style={{
                flex: 1, padding: '6px 8px', border: `1px solid ${pkChoice === match.home ? 'var(--burgundy)' : 'var(--line)'}`,
                background: pkChoice === match.home ? 'var(--burgundy)' : 'white',
                color: pkChoice === match.home ? 'white' : 'var(--ink)',
                borderRadius: 4, cursor: 'pointer', fontSize: 12, fontWeight: 600, fontFamily: 'inherit',
                display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 5,
              }}
            >
              <Flag team={match.home} size={12} /> {teamShort(match.home)}
            </button>
            <button
              onClick={() => onSetPk(match.id, match.away)}
              style={{
                flex: 1, padding: '6px 8px', border: `1px solid ${pkChoice === match.away ? 'var(--burgundy)' : 'var(--line)'}`,
                background: pkChoice === match.away ? 'var(--burgundy)' : 'white',
                color: pkChoice === match.away ? 'white' : 'var(--ink)',
                borderRadius: 4, cursor: 'pointer', fontSize: 12, fontWeight: 600, fontFamily: 'inherit',
                display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 5,
              }}
            >
              <Flag team={match.away} size={12} /> {teamShort(match.away)}

      {locked && (
        <div style={{ marginTop: 6, textAlign: 'center' }}>

                <>
                  <span style={{

function TeamSearchInput({ value, onChange, placeholder = 'Start typing a team name…' }) {
  const [query, setQuery] = useState(value || '');
  const [open, setOpen] = useState(false);
  const [highlighted, setHighlighted] = useState(0);

  // Keep input in sync if parent value changes (e.g. loaded from storage)
  useEffect(() => { setQuery(value || ''); }, [value]);

  const filtered = useMemo(() => {
    if (!query) return ALL_TEAMS.slice(0, 8);
    return ALL_TEAMS.filter(t => t.toLowerCase().includes(query.toLowerCase())).slice(0, 8);
  }, [query]);

  const isSelected = ALL_TEAMS.includes(query) && query === value;

  const select = (team) => {
    setQuery(team);
    onChange(team);
    setOpen(false);
    setHighlighted(0);
  };

  const clear = () => {
    setQuery('');
    onChange('');
    setOpen(false);
  };

  const showDropdown = open && !isSelected && filtered.length > 0;

  return (
    <div style={{ position: 'relative' }}>
      <div style={{ position: 'relative' }}>
        <input
          value={query}
          onChange={e => {
            const v = e.target.value;
            setQuery(v);
            setOpen(true);
            setHighlighted(0);
            if (v === '') onChange('');
          }}
          onFocus={() => setOpen(true)}
          onBlur={() => setTimeout(() => setOpen(false), 160)}
          onKeyDown={e => {
            if (!showDropdown) return;
            if (e.key === 'ArrowDown') { e.preventDefault(); setHighlighted(h => Math.min(h + 1, filtered.length - 1)); }
            if (e.key === 'ArrowUp') { e.preventDefault(); setHighlighted(h => Math.max(h - 1, 0)); }
            if (e.key === 'Enter') { e.preventDefault(); if (filtered[highlighted]) select(filtered[highlighted]); }
            if (e.key === 'Escape') setOpen(false);
          }}
          placeholder={placeholder}
          style={{
            width: '100%', padding: '11px 36px 11px 12px', fontSize: 15,
            border: `1px solid ${isSelected ? 'var(--forest)' : 'var(--line)'}`,
            borderRadius: 4, background: 'white', fontFamily: 'inherit',
            color: 'var(--ink)',
          }}
        />
        {isSelected && (
          <button
            onClick={clear}
            style={{
              position: 'absolute', right: 10, top: '50%', transform: 'translateY(-50%)',
              background: 'none', border: 'none', cursor: 'pointer',
              color: 'var(--ink-soft)', display: 'flex', alignItems: 'center', padding: 2,
            }}
          >
            <X size={14} />
          </button>
        )}
      </div>
      {showDropdown && (
        <div style={{
          position: 'absolute', top: '100%', left: 0, right: 0, zIndex: 200,
          background: 'white', border: '1px solid var(--line)', borderRadius: 4,
          marginTop: 2, boxShadow: '0 4px 16px rgba(0,0,0,0.12)',
          maxHeight: 260, overflowY: 'auto',
        }}>
          {filtered.map((t, i) => (
            <div
              key={t}
              onClick={() => select(t)}
              style={{
                padding: '9px 12px', cursor: 'pointer', fontSize: 14,
                background: i === highlighted ? 'var(--cream-2)' : 'white',
                display: 'flex', alignItems: 'center', gap: 10,
                borderBottom: i < filtered.length - 1 ? '1px solid var(--line-soft)' : 'none',
              }}
            >
              <span style={{ fontSize: 18, lineHeight: 1 }}>{TEAM_FLAGS[t] || '⚽'}</span>
              <span style={{ fontWeight: 500 }}>{t}</span>
              {FIFA_RANKINGS[t] && (
                <span style={{ marginLeft: 'auto', fontSize: 11, color: 'var(--ink-soft)' }}>#{FIFA_RANKINGS[t]}</span>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// Tiebreak helpers — time stored as "MM:SS" string
const timeToSeconds = (t) => {
  if (!t) return null;
  const [m, s] = t.split(':').map(Number);
  if (isNaN(m) || isNaN(s)) return null;
  return m * 60 + s;
};

const formatTime = (t) => t || '—';

// Distance for tiebreak: in normal mode = |guess - actual|, lower wins.
// In 0-0 mode (scoreless draw) = guess itself, higher wins.
const tiebreakDistance = (guess, actual, zeroZero) => {
  const g = timeToSeconds(guess), a = timeToSeconds(actual);
  if (g == null) return zeroZero ? -Infinity : Infinity; // unset = worst
  if (zeroZero) return g; // higher is better
  if (a == null) return Infinity;
  return Math.abs(g - a);
};

// MM:SS input with live validation
function TiebreakerInput({ value, onChange, disabled }) {
  const [raw, setRaw] = useState(value || '');

  useEffect(() => { setRaw(value || ''); }, [value]);

  const handleChange = (e) => {
    let v = e.target.value.replace(/[^0-9:]/g, '');
    // Auto-insert colon after 2 digits
    if (v.length === 2 && !v.includes(':') && raw.length < 2) v = v + ':';
    if (v.length > 5) v = v.slice(0, 5);
    setRaw(v);
    // Only propagate if valid MM:SS
    const match = v.match(/^(\d{1,3}):(\d{2})$/);
    if (match) {
      const secs = parseInt(match[2]);
      if (secs < 60) onChange(v);
    } else if (v === '') {
      onChange('');
    }
  };

  const isValid = raw === '' || /^\d{1,3}:\d{2}$/.test(raw);

  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
      <input
        value={raw}
        onChange={handleChange}
        disabled={disabled}
        placeholder="e.g. 23:45"
        maxLength={6}
        style={{
          width: 110, padding: '11px 12px', fontSize: 20, fontWeight: 700,
          textAlign: 'center', letterSpacing: '0.06em',
          fontFamily: 'JetBrains Mono, monospace',
          border: `1px solid ${!isValid && raw ? 'var(--burgundy)' : 'var(--line)'}`,
          borderRadius: 4, background: disabled ? 'var(--cream-2)' : 'white',
          color: 'var(--ink)',
        }}
      />
      <span style={{ fontSize: 12, color: 'var(--ink-soft)', lineHeight: 1.4 }}>
        minutes : seconds<br />
        <em style={{ fontSize: 11 }}>e.g. 90:00 for last minute</em>
      </span>
    </div>
  );
}

function TiebreakDotPlot({ participants, allPredictions, total }) {
  const times = participants
    .map(p => ({ name: p, time: allPredictions[p]?.bonus?.tiebreak }))
    .filter(x => x.time)
    .sort((a, b) => (timeToSeconds(a.time) || 0) - (timeToSeconds(b.time) || 0));

  if (!times.length) return (
    <div style={{ color: 'var(--ink-soft)', fontSize: 13, fontStyle: 'italic' }}>No tiebreak times submitted yet.</div>
  );

  const minT = timeToSeconds(times[0].time);
  const maxT = timeToSeconds(times[times.length - 1].time);
  const span = maxT - minT || 1;

  return (
    <>
      <div style={{ fontSize: 12, color: 'var(--ink-soft)', marginBottom: 12 }}>
        {times.length} of {total} submitted · earliest: <strong>{times[0].time}</strong> · latest: <strong>{times[times.length - 1].time}</strong>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
        {times.map(({ name, time }) => {
          const secs = timeToSeconds(time) || 0;
          const pct = ((secs - minT) / span) * 100;
          return (
            <div key={name} style={{ display: 'flex', alignItems: 'center', gap: 10, fontSize: 12 }}>
              <span style={{ width: 90, fontWeight: 500, flexShrink: 0, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{name}</span>
              <div style={{ flex: 1, height: 6, background: 'var(--cream-2)', borderRadius: 3, position: 'relative' }}>
                <div style={{ position: 'absolute', left: `${pct}%`, top: 0, width: 8, height: 8, borderRadius: '50%', background: 'var(--burgundy)', marginTop: -1, marginLeft: -4 }} />
              </div>
              <span className="mono" style={{ width: 44, textAlign: 'right', fontWeight: 700, flexShrink: 0 }}>{time}</span>
            </div>
          );
        })}
      </div>
    </>
  );
}

function FieldView({ participants, allPredictions, profiles }) {
  const total = participants.length;

  // Tally bonus picks
  const bonusTallies = useMemo(() => {
    const tallies = {};
    FIELD_SECTIONS.forEach(({ key }) => { tallies[key] = {}; });
    participants.forEach(p => {
      const bonus = allPredictions[p]?.bonus || {};
      FIELD_SECTIONS.forEach(({ key }) => {
        const pick = bonus[key]?.trim();
        if (!pick) return;
        tallies[key][pick] = (tallies[key][pick] || 0) + 1;
      });
    });
    return tallies;
  }, [participants, allPredictions]);

  // Tally joker picks
  const jokerTallies = useMemo(() => {
    const tallies = { team: {}, group: {} };
    participants.forEach(p => {
      const joker = allPredictions[p]?.joker || {};
      if (joker.team) tallies.team[joker.team] = (tallies.team[joker.team] || 0) + 1;
      if (joker.group) tallies.group[joker.group] = (tallies.group[joker.group] || 0) + 1;
    });
    return tallies;
  }, [participants, allPredictions]);

  const toEntries = (tally) =>
    Object.entries(tally)
      .map(([label, count]) => ({ label, count }))
      .sort((a, b) => b.count - a.count);

  // Participation stats
  const submitted = participants.filter(p => {
    const preds = allPredictions[p] || {};
    const groupDone = GROUP_MATCHES.every(m => {
      const pred = preds.group?.[m.id];
      return pred && pred.h !== '' && pred.h != null && pred.a !== '' && pred.a != null;
    });
    return groupDone;
  }).length;

  return (
    <div>
      <SectionHeader
        kicker={`${total} participants · locked`}
        title="The Field"
        subtitle="How everyone has predicted — distributions across all picks."
      />

      {/* Completion summary */}
      <div className="card" style={{ padding: 16, marginTop: 18, display: 'flex', gap: 20, flexWrap: 'wrap' }}>
        <div style={{ textAlign: 'center' }}>
          <div className="display mono" style={{ fontSize: 32, fontWeight: 800, color: 'var(--burgundy)' }}>{total}</div>
          <div className="micro-caps">Participants</div>
        </div>
        <div style={{ textAlign: 'center' }}>
          <div className="display mono" style={{ fontSize: 32, fontWeight: 800, color: 'var(--forest)' }}>{submitted}</div>
          <div className="micro-caps">Full entries</div>
        </div>
        <div style={{ textAlign: 'center' }}>
          <div className="display mono" style={{ fontSize: 32, fontWeight: 800, color: 'var(--amber)' }}>
            {Object.keys(jokerTallies.team).length}
          </div>
          <div className="micro-caps">Joker teams used</div>
        </div>
        {/* Country breakdown pill strip */}
        <div style={{ flex: 1, minWidth: 160 }}>
          <div className="micro-caps" style={{ marginBottom: 6 }}>Countries represented</div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4 }}>
            {Object.entries(
              participants.reduce((acc, p) => {
                const c = profiles[p]?.country;
                if (c) acc[c] = (acc[c] || 0) + 1;
                return acc;
              }, {})
            ).sort((a, b) => b[1] - a[1]).map(([c, n]) => (
              <span key={c} className="pill" style={{ fontSize: 10 }}>{c} {n > 1 ? `×${n}` : ''}</span>
            ))}
          </div>
        </div>
      </div>

      {/* Bonus pick distributions */}
      <div style={{ marginTop: 28, display: 'flex', flexDirection: 'column', gap: 20 }}>
        {FIELD_SECTIONS.map(({ key, label, icon, isTeam }) => {
          const entries = toEntries(bonusTallies[key]);
          const picked = entries.reduce((s, e) => s + e.count, 0);
          return (
            <div key={key} className="card" style={{ padding: 20 }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  <span style={{ fontSize: 24 }}>{icon}</span>
                  <div>
                    <div className="display" style={{ fontSize: 18, fontWeight: 700 }}>{label}</div>
                    <div style={{ fontSize: 12, color: 'var(--ink-soft)' }}>{picked}/{total} picks submitted</div>
                  </div>
                </div>
                {entries[0] && (
                  <div style={{ textAlign: 'right' }}>
                    <div style={{ fontSize: 11, color: 'var(--ink-soft)' }}>Most popular</div>
                    <div style={{ fontWeight: 700, fontSize: 14 }}>
                      {isTeam && TEAM_FLAGS[entries[0].label]} {isTeam ? teamShort(entries[0].label) : entries[0].label}
                    </div>
                  </div>
                )}
              </div>
              <DistributionChart entries={entries} isTeam={isTeam} total={picked} />
            </div>
          );
        })}
      </div>

      {/* Joker distributions */}
      <div style={{ marginTop: 28 }}>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 12, marginBottom: 16 }}>
          <h3 className="display" style={{ fontSize: 22, fontWeight: 700, margin: 0, letterSpacing: '-0.01em' }}>🃏 Joker Picks</h3>
          <div style={{ flex: 1, height: 1, background: 'var(--line)' }} />
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
          {/* Joker Team */}
          <div className="card" style={{ padding: 18 }}>
            <div className="display" style={{ fontSize: 16, fontWeight: 700, marginBottom: 14 }}>Joker Team</div>
            <DistributionChart entries={toEntries(jokerTallies.team)} isTeam={true} total={participants.filter(p => allPredictions[p]?.joker?.team).length} />
          </div>
          {/* Joker Group */}
          <div className="card" style={{ padding: 18 }}>
            <div className="display" style={{ fontSize: 16, fontWeight: 700, marginBottom: 14 }}>Joker Group</div>
            <DistributionChart
              entries={toEntries(jokerTallies.group).map(({ label, count }) => ({
                label: `Group ${label} (${GROUPS[label]?.map(t => teamShort(t)).join(', ')})`,
                count,
              }))}
              isTeam={false}
              total={participants.filter(p => allPredictions[p]?.joker?.group).length}
            />
          </div>
        </div>
      </div>

      {/* Tiebreak distribution */}
      <div style={{ marginTop: 28 }}>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 12, marginBottom: 14 }}>
          <h3 className="display" style={{ fontSize: 22, fontWeight: 700, margin: 0, letterSpacing: '-0.01em' }}>⏱ Tiebreak Times</h3>
          <div style={{ flex: 1, height: 1, background: 'var(--line)' }} />
        </div>
        <div className="card" style={{ padding: 18 }}>
          <TiebreakDotPlot participants={participants} allPredictions={allPredictions} total={total} />
        </div>
      </div>
    </div>
  );
}

function LeaderboardView({ participants, allPredictions, results, profiles }) {
  const [breakdown, setBreakdown] = useState('team');
  const [filter, setFilter] = useState('total');

  const actualBonus = results.bonus || {};
  const actualTiebreak = actualBonus.tiebreak || '';
  const zeroZero = actualBonus.tiebreakZeroZero === true;
  const tiebreakActive = actualTiebreak || zeroZero;
  const grp = results.group || {};
  const ko = results.ko || {};

  // Determine which filter sections are available based on actual results entered
  const availability = useMemo(() => {
    const hasActual = (matchId) => { const r = grp[matchId]; return r && r.h !== '' && r.h != null; };
    const hasKo = (ids) => ids.some(id => { const r = ko[id]; return r && r.h !== '' && r.h != null; });
    return {
      total: true,
      group: GROUP_MATCHES.some(m => hasActual(m.id)),
      md1: GROUP_MATCHES.filter(m => m.matchday === 1).some(m => hasActual(m.id)),
      md2: GROUP_MATCHES.filter(m => m.matchday === 2).some(m => hasActual(m.id)),
      md3: GROUP_MATCHES.filter(m => m.matchday === 3).some(m => hasActual(m.id)),
      ko: hasKo(range(73, 104)),
      R32: hasKo(range(73, 88)),
      R16: hasKo(range(89, 96)),
      QF: hasKo(range(97, 100)),
      SF: hasKo(range(101, 102)),
      '3rd': hasKo([103]),
      Final: hasKo([104]),
      bonus: Object.keys(actualBonus).some(k => ['winner','runnerUp','thirdPlace','goldenBoot'].includes(k) && actualBonus[k]),
    };
  }, [grp, ko, actualBonus]);

  // If current filter becomes unavailable (shouldn't happen, but safety), reset
  const activeFilter = availability[filter] ? filter : 'total';

  // Filter options with indentation level
  const FILTER_OPTIONS = [
    { key: 'total',  label: 'Total Score',      indent: 0 },
    { key: 'group',  label: 'Group Stage',       indent: 1 },
    { key: 'md1',    label: 'Matchday 1',        indent: 2 },
    { key: 'md2',    label: 'Matchday 2',        indent: 2 },
    { key: 'md3',    label: 'Matchday 3',        indent: 2 },
    { key: 'ko',     label: 'Knockout Rounds',   indent: 1 },
    { key: 'R32',    label: 'Round of 32',       indent: 2 },
    { key: 'R16',    label: 'Last 16',           indent: 2 },
    { key: 'QF',     label: 'Quarter Finals',    indent: 2 },
    { key: 'SF',     label: 'Semi Finals',       indent: 2 },
    { key: '3rd',    label: '3rd / 4th Place',   indent: 2 },
    { key: 'Final',  label: 'Final',             indent: 2 },
    { key: 'bonus',  label: 'Bonus Picks',       indent: 1 },
  ];

  const scores = useMemo(() => {
    const snapshot = results.rankingSnapshot?.rankings || null;
    const koStarted = Object.keys(ko).length > 0;

    return participants.map(p => {
      const preds = allPredictions[p] || { group: {}, ko: {} };
      const score = computeUserScore(preds, results.group || {}, results.ko || {}, results.bracketTeams, results.bonus || {}, preds.joker || {});
      const tbGuess = preds.bonus?.tiebreak || '';
      const tbDist = tiebreakActive ? tiebreakDistance(tbGuess, actualTiebreak, zeroZero) : null;
      const profile = profiles[p] || {};
      const maxPossible = koStarted
        ? computeMaxPossible(preds, score.total, results.ko || {}, results.bonus || {}, preds.joker || {})
        : null;
      return { name: p, ...score, tbGuess, tbDist, profile, maxPossible, snapshotRank: snapshot ? snapshot.indexOf(p) : -1 };
    }).sort((a, b) => {
      const aVal = a.sectionPts?.[activeFilter] ?? a.total;
      const bVal = b.sectionPts?.[activeFilter] ?? b.total;
      if (bVal !== aVal) return bVal - aVal;
      // Tiebreak only applies on total score view
      if (activeFilter === 'total') {
        if (a.tbDist == null || b.tbDist == null) return 0;
        if (zeroZero) return b.tbDist - a.tbDist;
        return a.tbDist - b.tbDist;
      }
      return 0;
    });
  }, [participants, allPredictions, results, profiles, activeFilter]);

  const maxScore = Math.max(...scores.map(s => s.sectionPts?.[activeFilter] ?? s.total), 1);
  const actualMatchesDone = Object.values(results.group || {}).filter(r => r && r.h !== '' && r.h != null).length;
  const snapshotLabel = results.rankingSnapshot?.label || null;

  // Team and country breakdown stats
  const teamStats = useMemo(() => {
    const stats = {};
    scores.forEach(s => {
      const team = s.profile?.team;
      if (!team) return;
      if (!stats[team]) stats[team] = { count: 0, totalPts: 0 };
      stats[team].count++;
      stats[team].totalPts += s.total;
    });
    return Object.entries(stats)
      .map(([team, { count, totalPts }]) => ({ team, count, avg: count ? totalPts / count : 0 }))
      .sort((a, b) => b.avg - a.avg);
  }, [scores]);

  const countryStats = useMemo(() => {
    const stats = {};
    scores.forEach(s => {
      const country = s.profile?.country;
      if (!country) return;
      if (!stats[country]) stats[country] = { count: 0, totalPts: 0 };
      stats[country].count++;
      stats[country].totalPts += s.total;
    });
    return Object.entries(stats)
      .map(([country, { count, totalPts }]) => ({ country, count, avg: count ? totalPts / count : 0 }))
      .sort((a, b) => b.avg - a.avg);
  }, [scores]);

  return (
    <div>
      <SectionHeader
        kicker={`${participants.length} participant${participants.length !== 1 ? 's' : ''}`}
        title="Leaderboard"
        subtitle={actualMatchesDone === 0 ? 'No results entered yet — leaderboard will populate as matches are played.' : `${actualMatchesDone}/72 group matches resulted`}
      />

      {/* Filter dropdown */}
      <div style={{ marginTop: 16, display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap' }}>
        <span className="micro-caps" style={{ flexShrink: 0 }}>Ranked by</span>
        <select
          value={activeFilter}
          onChange={e => setFilter(e.target.value)}
          style={{
            padding: '8px 12px', fontSize: 14, fontWeight: 600,
            border: '1px solid var(--line)', borderRadius: 4,
            background: 'var(--paper)', fontFamily: 'inherit',
            color: 'var(--ink)', minWidth: 180,
          }}
        >
          {FILTER_OPTIONS.map(({ key, label, indent }) => (
            <option key={key} value={key} disabled={!availability[key]}
              style={{ paddingLeft: indent * 16 }}
            >
              {'\u00a0'.repeat(indent * 3)}{label}{!availability[key] ? ' —' : ''}
            </option>
          ))}
        </select>
        {activeFilter !== 'total' && (
          <button className="btn-ghost btn" style={{ fontSize: 12, padding: '6px 10px' }}
            onClick={() => setFilter('total')}>
            ← Total
          </button>
        )}
      </div>

      {snapshotLabel && (
        <div style={{ marginTop: 10, fontSize: 12, color: 'var(--ink-soft)', display: 'flex', alignItems: 'center', gap: 6 }}>
          <span>📸</span> Movement vs: <strong>{snapshotLabel}</strong>
        </div>
      )}

      <div style={{ marginTop: snapshotLabel ? 10 : 24, display: 'flex', flexDirection: 'column', gap: 8 }}>
        {scores.length === 0 && (
          <div className="card" style={{ padding: 24, textAlign: 'center', color: 'var(--ink-soft)' }}>
            No participants yet.
          </div>
        )}
        {scores.map((s, i) => {
          // Movement vs snapshot
          const prevRank = s.snapshotRank; // 0-indexed
          const moved = prevRank >= 0 ? prevRank - i : null; // positive = moved up
          const MoveBadge = () => {
            if (moved === null) return null;
            if (moved === 0) return <span style={{ fontSize: 10, color: 'var(--ink-soft)', fontWeight: 600 }}>—</span>;
            if (moved > 0) return <span style={{ fontSize: 10, color: 'var(--forest)', fontWeight: 800 }}>▲{moved}</span>;
            return <span style={{ fontSize: 10, color: 'var(--burgundy)', fontWeight: 800 }}>▼{Math.abs(moved)}</span>;
          };

          return (
          <div key={s.name} className="card" style={{ padding: 14, display: 'flex', alignItems: 'center', gap: 14, background: i === 0 ? 'linear-gradient(90deg, #FFF8E5 0%, var(--paper) 60%)' : 'var(--paper)', borderColor: i === 0 ? 'var(--amber)' : 'var(--line)' }}>
            <div style={{ width: 38, textAlign: 'center', flexShrink: 0 }}>
              {i === 0 ? (
                <Crown size={22} style={{ color: 'var(--amber)' }} />
              ) : (
                <span className="display" style={{ fontSize: 22, fontWeight: 700, color: 'var(--ink-soft)' }}>{i + 1}</span>
              )}
              <div style={{ lineHeight: 1, marginTop: 2 }}><MoveBadge /></div>
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', gap: 12 }}>
                <div>
                  <strong style={{ fontSize: 16 }}>{s.name}</strong>
                  {s.profile?.team && (
                    <span style={{ fontSize: 11, color: 'var(--ink-soft)', marginLeft: 8 }}>
                      {s.profile.team}{s.profile.country ? ` · ${s.profile.country}` : ''}
                    </span>
                  )}
                </div>
                <div style={{ textAlign: 'right' }}>
                  <span className="display mono" style={{ fontSize: 24, fontWeight: 700 }}>
                    {activeFilter === 'total'
                      ? s.total.toFixed(1).replace('.0','')
                      : (s.sectionPts?.[activeFilter] ?? 0).toFixed(1).replace('.0','')}
                  </span>
                  {activeFilter !== 'total' && (
                    <div style={{ fontSize: 10, color: 'var(--ink-soft)', marginTop: 1 }}>
                      total <span className="mono" style={{ fontWeight: 600 }}>{s.total.toFixed(1).replace('.0','')}</span>
                    </div>
                  )}
                  {activeFilter === 'total' && s.maxPossible != null && (
                    <div style={{ fontSize: 10, color: 'var(--ink-soft)', marginTop: 1 }}>
                      max <span className="mono" style={{ fontWeight: 600 }}>{Math.round(s.maxPossible)}</span>
                    </div>
                  )}
                </div>
              </div>
              <div style={{ display: 'flex', gap: 10, fontSize: 11, color: 'var(--ink-soft)', marginTop: 4, flexWrap: 'wrap' }}>
                <span>Group: <strong className="mono">{s.groupPoints}</strong></span>
                <span>KO: <strong className="mono">{s.koPoints}</strong></span>
                <span>Bracket: <strong className="mono">{s.bracketPoints.toFixed(1).replace('.0','')}</strong></span>
                {s.bonusPoints > 0 && <span style={{ color: 'var(--amber)' }}>Bonus: <strong className="mono">{s.bonusPoints}</strong></span>}
                <span>Exact: <strong className="mono">{s.detail.exactScores}</strong></span>
                {s.detail.underdogWins > 0 && (
                  <span style={{ color: 'var(--burgundy)' }}>Upsets: <strong className="mono">{s.detail.underdogWins}</strong></span>
                )}
                {s.detail.giantKillerWins > 0 && (
                  <span style={{ color: 'var(--burgundy)' }}>Giant kills: <strong className="mono">{s.detail.giantKillerWins}</strong></span>
                )}
                {s.tbGuess && (
                  <span style={{ color: 'var(--ink-soft)' }}>
                    ⏱ <strong className="mono">{s.tbGuess}</strong>
                    {s.tbDist != null && s.tbDist !== Infinity && !zeroZero && (
                      <span> ({s.tbDist}s off)</span>
                    )}
                  </span>
                )}
              </div>
              <div style={{ height: 3, background: 'var(--cream-2)', borderRadius: 2, marginTop: 8, overflow: 'hidden' }}>
                <div style={{ width: `${((s.sectionPts?.[activeFilter] ?? s.total) / maxScore) * 100}%`, height: '100%', background: i === 0 ? 'var(--amber)' : 'var(--burgundy)' }} />
              </div>
            </div>
          </div>
          );
        })}
      </div>

      {/* Participation breakdown */}
      {(teamStats.length > 0 || countryStats.length > 0) && (
        <div style={{ marginTop: 36 }}>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 12, marginBottom: 14 }}>
            <h3 className="display" style={{ fontSize: 22, fontWeight: 700, margin: 0, letterSpacing: '-0.01em' }}>Breakdown</h3>
            <div style={{ flex: 1, height: 1, background: 'var(--line)' }} />
            <div style={{ display: 'inline-flex', background: 'var(--cream-2)', borderRadius: 6, padding: 2, border: '1px solid var(--line)' }}>
              {['team', 'country'].map(b => (
                <button key={b} onClick={() => setBreakdown(b)} style={{
                  background: breakdown === b ? 'var(--ink)' : 'transparent',
                  color: breakdown === b ? 'var(--cream)' : 'var(--ink-soft)',
                  border: 'none', padding: '5px 12px', fontSize: 12, fontWeight: 600,
                  borderRadius: 4, cursor: 'pointer', fontFamily: 'inherit',
                  textTransform: 'capitalize',
                }}>{b}</button>
              ))}
            </div>
          </div>

          {breakdown === 'team' && (
            <div className="card" style={{ overflow: 'hidden' }}>
              <table style={{ width: '100%', fontSize: 13, borderCollapse: 'collapse' }}>
                <thead>
                  <tr style={{ background: 'var(--cream-2)', borderBottom: '1px solid var(--line)' }}>
                    <th style={{ padding: '8px 14px', textAlign: 'left', fontWeight: 600 }}>Team</th>
                    <th style={{ padding: '8px 14px', textAlign: 'center', fontWeight: 600 }}>Participants</th>
                    <th style={{ padding: '8px 14px', textAlign: 'right', fontWeight: 600 }}>Avg pts</th>
                  </tr>
                </thead>
                <tbody>
                  {teamStats.map(({ team, count, avg }, i) => (
                    <tr key={team} style={{ borderBottom: '1px solid var(--line-soft)', background: i === 0 ? 'rgba(214,137,42,0.05)' : 'transparent' }}>
                      <td style={{ padding: '9px 14px', fontWeight: i === 0 ? 700 : 400 }}>{team}</td>
                      <td style={{ padding: '9px 14px', textAlign: 'center', color: 'var(--ink-soft)' }}>{count}</td>
                      <td style={{ padding: '9px 14px', textAlign: 'right', fontWeight: 700 }} className="mono">{avg.toFixed(1)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {breakdown === 'country' && (
            <div className="card" style={{ overflow: 'hidden' }}>
              <table style={{ width: '100%', fontSize: 13, borderCollapse: 'collapse' }}>
                <thead>
                  <tr style={{ background: 'var(--cream-2)', borderBottom: '1px solid var(--line)' }}>
                    <th style={{ padding: '8px 14px', textAlign: 'left', fontWeight: 600 }}>Country</th>
                    <th style={{ padding: '8px 14px', textAlign: 'center', fontWeight: 600 }}>Participants</th>
                    <th style={{ padding: '8px 14px', textAlign: 'right', fontWeight: 600 }}>Avg pts</th>
                  </tr>
                </thead>
                <tbody>
                  {countryStats.map(({ country, count, avg }, i) => (
                    <tr key={country} style={{ borderBottom: '1px solid var(--line-soft)', background: i === 0 ? 'rgba(214,137,42,0.05)' : 'transparent' }}>
                      <td style={{ padding: '9px 14px', fontWeight: i === 0 ? 700 : 400 }}>{country}</td>
                      <td style={{ padding: '9px 14px', textAlign: 'center', color: 'var(--ink-soft)' }}>{count}</td>
                      <td style={{ padding: '9px 14px', textAlign: 'right', fontWeight: 700 }} className="mono">{avg.toFixed(1)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function RulesView() {
  return (
    <div>
      <SectionHeader kicker="How it works" title="Rules & Scoring" />
      <div className="card" style={{ padding: 22, marginTop: 18 }}>
        <h3 className="display" style={{ fontSize: 20, fontWeight: 700, margin: '0 0 10px' }}>The competition</h3>
        <p style={{ fontSize: 14, color: 'var(--ink-soft)', margin: '0 0 10px' }}>
          Predict the score of every match across all 12 groups, the knockout bracket and the bonus picks, including your tie-break time.
        </p>
        <p style={{ fontSize: 14, color: 'var(--ink-soft)', margin: '0 0 10px' }}>
          The bracket auto-derives from your predictions with each match updating as you input your picks.

function AdminKoBracketCard({ match, onSetScore, onSetPk, gridColumn, gridRow, side, pairPos, isFinal, isThirdPlace }) {
  if (!match) return null;
  const homeKnown = !!match.home;
  const awayKnown = !!match.away;
  const hasTeams = homeKnown && awayKnown;
  const h = match.hScore, a = match.aScore;
  const scoresEntered = h !== '' && h != null && a !== '' && a != null;
  const isDraw = scoresEntered && parseInt(h) === parseInt(a);
  const needsPk = isDraw && hasTeams && match.pkWinner !== match.home && match.pkWinner !== match.away;

  let winner = null;
  if (scoresEntered && hasTeams) {
    const hi = parseInt(h), ai = parseInt(a);
    if (hi > ai) winner = match.home;
    else if (ai > hi) winner = match.away;
    else if (match.pkWinner) winner = match.pkWinner;
  }

  const STUB = 9, EXIT = 18, GAP = 18;
  const lineColor = winner ? 'var(--forest)' : 'var(--line)';

  return (
    <div style={{
      gridColumn, gridRow,
      display: 'flex', flexDirection: 'column', justifyContent: 'center',
      position: 'relative',
      paddingRight: side === 'left' ? EXIT : 0,
      paddingLeft: side === 'right' ? EXIT : 0,
    }}>
      {side === 'left' && pairPos === 'top' && (<><div style={{ position: 'absolute', top: '50%', right: EXIT - STUB, width: STUB, height: 1, background: lineColor }} /><div style={{ position: 'absolute', top: '50%', right: EXIT - STUB - 1, bottom: 0, width: 1, background: lineColor }} /><div style={{ position: 'absolute', bottom: 0, right: -GAP, width: EXIT - STUB + GAP, height: 1, background: 'var(--line)' }} /></>)}
      {side === 'left' && pairPos === 'bottom' && (<><div style={{ position: 'absolute', top: '50%', right: EXIT - STUB, width: STUB, height: 1, background: lineColor }} /><div style={{ position: 'absolute', top: 0, right: EXIT - STUB - 1, height: '50%', width: 1, background: lineColor }} /></>)}
      {side === 'left' && pairPos === 'solo' && <div style={{ position: 'absolute', top: '50%', right: -GAP, width: EXIT + GAP, height: 1, background: lineColor }} />}
      {side === 'right' && pairPos === 'top' && (<><div style={{ position: 'absolute', top: '50%', left: EXIT - STUB, width: STUB, height: 1, background: lineColor }} /><div style={{ position: 'absolute', top: '50%', left: EXIT - STUB - 1, bottom: 0, width: 1, background: lineColor }} /><div style={{ position: 'absolute', bottom: 0, left: -GAP, width: EXIT - STUB + GAP, height: 1, background: 'var(--line)' }} /></>)}
      {side === 'right' && pairPos === 'bottom' && (<><div style={{ position: 'absolute', top: '50%', left: EXIT - STUB, width: STUB, height: 1, background: lineColor }} /><div style={{ position: 'absolute', top: 0, left: EXIT - STUB - 1, height: '50%', width: 1, background: lineColor }} /></>)}
      {side === 'right' && pairPos === 'solo' && <div style={{ position: 'absolute', top: '50%', left: -GAP, width: EXIT + GAP, height: 1, background: lineColor }} />}

      <div style={{
        background: isFinal ? 'linear-gradient(180deg,#FFF8E5 0%,#FAEEC8 100%)' : isThirdPlace ? 'var(--cream-2)' : 'var(--paper)',
        border: `1px solid ${isFinal ? 'var(--amber)' : winner ? 'var(--forest)' : 'var(--line)'}`,
        borderRadius: 4, padding: isFinal ? '12px 12px 8px' : '7px 8px',
        opacity: homeKnown || awayKnown ? 1 : 0.45, position: 'relative', zIndex: 1,
        boxShadow: isFinal ? '0 4px 14px rgba(214,137,42,0.18)' : 'none',
      }}>
        <div style={{ fontSize: 9, color: 'var(--ink-soft)', fontWeight: 600, marginBottom: 3 }}>
          {isFinal ? '⚜ FINAL ⚜' : isThirdPlace ? '3RD PLACE' : `M${match.id}`}
          {needsPk && <span style={{ color: 'var(--burgundy)', marginLeft: 6 }}>PICK PK ↓</span>}
        </div>
        {[{ team: match.home, score: h, side: 'h', known: homeKnown }, { team: match.away, score: a, side: 'a', known: awayKnown }].map(({ team, score, side: s, known }) => (
          <div key={s} style={{ display: 'flex', alignItems: 'center', gap: 4, padding: '2px 0', opacity: winner && winner !== team ? 0.45 : 1 }}>
            <span style={{ fontSize: 13, flexShrink: 0 }}>{known ? (TEAM_FLAGS[team] || '⚽') : '○'}</span>
            <span style={{ flex: 1, fontSize: 11, fontWeight: winner === team ? 700 : 500, color: known ? 'var(--ink)' : 'var(--ink-soft)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', fontStyle: known ? 'normal' : 'italic' }}>
              {known ? teamShort(team) : getSlotLabel(match.id, s === 'h' ? 'home' : 'away')}
            </span>
            <input type="number" min="0" max="20" value={score ?? ''} disabled={!hasTeams}
              onChange={e => { const v = e.target.value; if (v === '' || (parseInt(v) >= 0 && parseInt(v) <= 20)) onSetScore(match.id, s, v); }}
              style={{ width: 26, height: 22, padding: 0, textAlign: 'center', fontFamily: 'JetBrains Mono, monospace', fontSize: 12, fontWeight: 700, background: !hasTeams ? 'var(--cream-2)' : 'white', border: '1px solid var(--line)', borderRadius: 3, MozAppearance: 'textfield' }}
            />
          </div>
        ))}
        {isDraw && hasTeams && (
          <div style={{ marginTop: 5, padding: '4px 2px 0', borderTop: '1px dashed var(--line)' }}>
            <div style={{ fontSize: 9, color: needsPk ? 'var(--burgundy)' : 'var(--ink-soft)', textAlign: 'center', marginBottom: 3, fontWeight: 600 }}>WINS ON PENS</div>
            <div style={{ display: 'flex', gap: 3 }}>
              {[match.home, match.away].map(t => (
                <button key={t} onClick={() => onSetPk(match.id, t)} style={{ flex: 1, background: match.pkWinner === t ? 'var(--burgundy)' : 'transparent', color: match.pkWinner === t ? 'white' : 'var(--ink)', border: `1px solid ${match.pkWinner === t ? 'var(--burgundy)' : 'var(--line)'}`, borderRadius: 3, padding: '2px 3px', cursor: 'pointer', fontSize: 9, fontWeight: 600, fontFamily: 'inherit', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 2 }}>
                  <Flag team={t} size={9} /> {teamShort(t).slice(0, 9)}
                </button>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function AdminKoSection({ results, setKoResult, setKoTeam, setKoPkWinner, onSaveResults }) {
  const [layoutMode, setLayoutMode] = useState('bracket');
  const { bracket, completeGroups, allComplete } = useMemo(
    () => buildActualBracket(results.group || {}, results.ko || {}),
    [results]
  );
  const matchIds = Object.keys(BRACKET_POS).map(Number);

  // Save score AND team names in one atomic operation — avoids race condition with separate useEffect
  const handleSetScore = (mId, side, value) => {
    const m = bracket[mId];
    const existing = results.ko?.[mId] || {};
    const update = {
      ...existing,
      [side]: value,
      ...(m?.home ? { homeTeam: m.home } : {}),
      ...(m?.away ? { awayTeam: m.away } : {}),
    };
    onSaveResults({ ...results, ko: { ...results.ko, [mId]: update } });
  };

  const handleSetPk = (mId, team) => {
    const m = bracket[mId];
    const existing = results.ko?.[mId] || {};
    const update = {
      ...existing,
      pkWinner: team,
      ...(m?.home ? { homeTeam: m.home } : {}),
      ...(m?.away ? { awayTeam: m.away } : {}),
    };
    onSaveResults({ ...results, ko: { ...results.ko, [mId]: update } });
  };

  const headerStyle = (col) => ({ gridColumn: col, gridRow: 1, fontFamily: 'DM Sans, sans-serif', fontSize: 10, letterSpacing: '0.16em', textTransform: 'uppercase', fontWeight: 700, color: 'var(--ink-soft)', textAlign: 'center', padding: '6px 0', borderBottom: '1px solid var(--line)' });

  return (
    <div style={{ marginTop: 20 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 14, flexWrap: 'wrap' }}>
        <p style={{ fontSize: 13, color: 'var(--ink-soft)', margin: 0, flex: 1 }}>
          Teams auto-fill from actual group results. Enter the score for each match — bracket advances automatically.
        </p>
        <div style={{ display: 'inline-flex', background: 'var(--cream-2)', borderRadius: 6, padding: 2, border: '1px solid var(--line)', flexShrink: 0 }}>
          {['bracket', 'list'].map(m => (
            <button key={m} onClick={() => setLayoutMode(m)} style={{ background: layoutMode === m ? 'var(--ink)' : 'transparent', color: layoutMode === m ? 'var(--cream)' : 'var(--ink-soft)', border: 'none', padding: '5px 12px', fontSize: 12, fontWeight: 600, borderRadius: 4, cursor: 'pointer', fontFamily: 'inherit', textTransform: 'capitalize' }}>{m}</button>
          ))}
        </div>
      </div>

      {completeGroups.size < 12 && (
        <div className="card" style={{ padding: 12, marginBottom: 14, background: 'rgba(214,137,42,0.08)', borderColor: 'var(--amber)', fontSize: 13 }}>
          <AlertCircle size={14} style={{ display: 'inline', color: 'var(--amber)', marginRight: 6 }} />
          {completeGroups.size}/12 groups fully resulted — R32 teams will auto-fill as group results are entered.
        </div>
      )}

      {allComplete && (() => {
        const s = computeAllStandings(results.group || {});
        const b3 = getBest3rdPlaceGroups(s);
        return (
          <div className="card" style={{ padding: 14, marginBottom: 14 }}>
            <div className="micro-caps" style={{ marginBottom: 8 }}>8 3rd-place qualifiers</div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {b3.map(g => {
                const team = s[g]?.[2]?.team;
                if (!team) return null;
                return (
                  <span key={g} className="pill pill-success" style={{ padding: '4px 10px', fontSize: 12 }}>
                    <Flag team={team} size={12} /> {teamShort(team)} <span style={{ opacity: 0.7 }}>(Grp {g})</span>
                  </span>
                );
              })}
            </div>
          </div>
        );
      })()}

      {layoutMode === 'bracket' ? (
        <>
          <div className="scrollbar" style={{ overflowX: 'auto', margin: '0 -16px', padding: '0 16px 12px' }}>
            <div style={{ display: 'grid', gridTemplateColumns: '170px 156px 148px 148px 178px 148px 148px 156px 170px', gridTemplateRows: '28px repeat(16, minmax(38px, 1fr))', columnGap: 18, minWidth: 1500, minHeight: 720 }}>
              <div style={headerStyle(1)}>Round of 32</div>
              <div style={headerStyle(2)}>Round of 16</div>
              <div style={headerStyle(3)}>Quarter-Final</div>
              <div style={headerStyle(4)}>Semi-Final</div>
              <div style={{ ...headerStyle(5), color: 'var(--burgundy)', fontWeight: 800 }}>FINAL</div>
              <div style={headerStyle(6)}>Semi-Final</div>
              <div style={headerStyle(7)}>Quarter-Final</div>
              <div style={headerStyle(8)}>Round of 16</div>
              <div style={headerStyle(9)}>Round of 32</div>
              {matchIds.map(mId => {
                const pos = BRACKET_POS[mId];
                const m = bracket[mId];
                if (!m) return null;
                return (
                  <AdminKoBracketCard
                    key={mId}
                    match={m}
                    onSetScore={handleSetScore}
                    onSetPk={handleSetPk}
                    gridColumn={pos.col}
                    gridRow={pos.row}
                    side={pos.side}
                    pairPos={pos.pairPos}
                    isFinal={mId === 104}
                    isThirdPlace={mId === 103}
                  />
                );
              })}
            </div>
          </div>
          <div style={{ marginTop: 20, maxWidth: 360, margin: '20px auto 0' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
              <div style={{ flex: 1, height: 1, background: 'var(--line)' }} />
              <span className="micro-caps" style={{ color: 'var(--ink-soft)' }}>3rd Place Play-off</span>
              <div style={{ flex: 1, height: 1, background: 'var(--line)' }} />
            </div>
            <AdminKoBracketCard match={bracket[103]} onSetScore={handleSetScore} onSetPk={handleSetPk} side="center" pairPos="solo" isThirdPlace />
          </div>
        </>
      ) : (
        // Flat list fallback
        [{ range: [73, 88], label: 'Round of 32' }, { range: [89, 96], label: 'Round of 16' }, { range: [97, 100], label: 'Quarter-Finals' }, { range: [101, 102], label: 'Semi-Finals' }, { range: [103, 103], label: '3rd Place' }, { range: [104, 104], label: 'Final' }].map(({ range: [a, b], label }) => (
          <div key={label} className="card" style={{ padding: 16, marginBottom: 10 }}>
            <div className="display" style={{ fontWeight: 700, marginBottom: 8 }}>{label}</div>
            {range(a, b).map(mId => {
              const m = bracket[mId] || {};
              const r = results.ko?.[mId] || {};
              const isDraw = r.h !== '' && r.a !== '' && r.h != null && r.a != null && parseInt(r.h) === parseInt(r.a);
              const hasTeams = m.home && m.away;
              return (
                <div key={mId} style={{ padding: '8px 0', borderBottom: '1px solid var(--line-soft)' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>
                    <span className="mono" style={{ fontSize: 11, color: 'var(--ink-soft)', minWidth: 40 }}>M{mId}</span>
                    <span style={{ fontSize: 13, fontWeight: 600, minWidth: 80 }}>{m.home ? teamShort(m.home) : getSlotLabel(mId, 'home')}</span>
                    <input type="number" min="0" max="20" className="input-score" style={{ width: 36, height: 32 }} disabled={!hasTeams}

// ─── 3rd Place standings table ────────────────────────────────────────
function ThirdPlaceTable({ standings, qualifyingGroups = [] }) {
  const allThirds = GROUP_KEYS
    .map(g => {
      const s = standings[g];
      if (!s || s.length < 3) return null;
      return { ...s[2], group: g };
    })
    .filter(Boolean)
    .filter(t => t.played > 0)
    .sort((a, b) => {
      if (b.pts !== a.pts) return b.pts - a.pts;
      const gda = a.gf - a.ga, gdb = b.gf - b.ga;
      if (gdb !== gda) return gdb - gda;
      return b.gf - a.gf;
    });

  if (!allThirds.length) return null;

  const qualifies = (t) => qualifyingGroups.includes(t.group);

  return (
    <div style={{ marginTop: 8 }}>
      <div className="micro-caps" style={{ marginBottom: 6, color: 'var(--ink-soft)' }}>3rd Place Rankings</div>
      <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 11 }}>
        <thead>
          <tr style={{ borderBottom: '1px solid var(--line)' }}>
            <th style={{ textAlign: 'left', padding: '3px 4px', fontWeight: 600 }}>Team</th>
            <th style={{ textAlign: 'center', padding: '3px 2px', fontWeight: 600 }}>P</th>
            <th style={{ textAlign: 'center', padding: '3px 2px', fontWeight: 600 }}>GD</th>
            <th style={{ textAlign: 'center', padding: '3px 2px', fontWeight: 600 }}>GF</th>
            <th style={{ textAlign: 'center', padding: '3px 2px', fontWeight: 600 }}>Pts</th>
            <th style={{ textAlign: 'center', padding: '3px 2px', fontWeight: 600 }}>Grp</th>
          </tr>
        </thead>
        <tbody>
          {allThirds.map((t, i) => {
            const through = qualifies(t) || (qualifyingGroups.length === 0 && i < 8);
            return (
              <tr key={t.group} style={{
                borderBottom: '1px solid var(--line-soft)',
                background: through ? 'rgba(27,94,63,0.06)' : 'transparent',
              }}>
                <td style={{ padding: '3px 4px', display: 'flex', alignItems: 'center', gap: 4 }}>
                  <Flag team={t.team} size={12} />
                  <span style={{ fontWeight: through ? 700 : 400 }}>{teamShort(t.team)}</span>
                  {through && <span style={{ fontSize: 8, color: 'var(--forest)', fontWeight: 700, letterSpacing: '0.06em' }}>Q</span>}
                </td>
                <td style={{ textAlign: 'center', padding: '3px 2px' }}>{t.pts}</td>
                <td style={{ textAlign: 'center', padding: '3px 2px' }}>{t.gf - t.ga > 0 ? '+' : ''}{t.gf - t.ga}</td>
                <td style={{ textAlign: 'center', padding: '3px 2px' }}>{t.gf}</td>
                <td style={{ textAlign: 'center', padding: '3px 2px', fontWeight: 700 }}>{t.pts}</td>
                <td style={{ textAlign: 'center', padding: '3px 2px', color: 'var(--ink-soft)' }}>{t.group}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

// ─── Admin group section ───────────────────────────────────────────────
function AdminGroupSection({ results, onSave }) {
  const [openGroup, setOpenGroup] = useState('A');

  const setGroupResult = (mId, side, value) => {
    if (value !== '' && (isNaN(parseInt(value)) || parseInt(value) < 0 || parseInt(value) > 20)) return;
    onSave({ ...results, group: { ...results.group, [mId]: { ...results.group?.[mId], [side]: value } } });
  };

  const randomiseAll = () => {
    const newGroup = {};
    GROUP_MATCHES.forEach(m => {
      const h = Math.floor(Math.random() * 4);
      const a = Math.floor(Math.random() * 4);
      newGroup[m.id] = { h: String(h), a: String(a) };
    });
    onSave({ ...results, group: newGroup });
  };

  const standings = useMemo(() => computeAllStandings(results.group || {}), [results.group]);
  const allComplete = GROUP_KEYS.every(g =>
    GROUP_MATCHES.filter(m => m.group === g).every(m => {
      const r = results.group?.[m.id];
      return r && r.h !== '' && r.h != null && r.a !== '' && r.a != null;
    })
  );
  const best3 = allComplete ? getBest3rdPlaceGroups(standings) : [];
  const totalDone = GROUP_MATCHES.filter(m => {
    const r = results.group?.[m.id];
    return r && r.h !== '' && r.h != null && r.a !== '' && r.a != null;
  }).length;

  return (
    <div style={{ marginTop: 16 }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14, flexWrap: 'wrap', gap: 8 }}>
        <p style={{ fontSize: 13, color: 'var(--ink-soft)', margin: 0 }}>
          Enter actual scores — standings and 3rd-place table update automatically. {totalDone}/72 results entered.
        </p>
        <button className="btn" style={{ fontSize: 12, background: 'var(--forest)', whiteSpace: 'nowrap' }} onClick={randomiseAll}>
          🎲 Randomise All Groups
        </button>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {GROUP_KEYS.map(g => (
          <AdminGroupCard
            key={g}
            groupKey={g}
            isOpen={openGroup === g}
            onToggle={() => setOpenGroup(openGroup === g ? null : g)}
            results={results}
            onSetResult={setGroupResult}
          />
        ))}
      </div>
      <div className="card" style={{ padding: 18, marginTop: 16 }}>
        <ThirdPlaceTable standings={standings} qualifyingGroups={best3} />
        {!allComplete && (
          <div style={{ fontSize: 12, color: 'var(--ink-soft)', marginTop: 8, fontStyle: 'italic' }}>
            Complete all 12 groups for the 8 qualifying 3rd-place teams to be determined.
          </div>
        )}
      </div>
    </div>
  );
}
