const storage = {
  async get(key, shared = false) {
    if (!shared) { try { return localStorage.getItem('wc26_' + key); } catch { return null; } }
    try { const snap = await db.collection('wc26').doc(key).get(); return snap.exists ? snap.data().value : null; } catch { return null; }
  },
  async set(key, value, shared = false) {
    const str = typeof value === 'string' ? value : JSON.stringify(value);
    if (!shared) { try { localStorage.setItem('wc26_' + key, str); } catch {} return true; }
    try { await db.collection('wc26').doc(key).set({ value: str }); return true; } catch { return false; }
  },
  async list(prefix, shared = false) {
    if (!shared) { try { return Object.keys(localStorage).filter(k => k.startsWith('wc26_' + (prefix || ''))).map(k => k.replace('wc26_', '')); } catch { return []; } }
    try { const snap = await db.collection('wc26').get(); return snap.docs.map(d => d.id).filter(id => !prefix || id.startsWith(prefix)); } catch { return []; }
  },
  async getJSON(key, shared = false) { const v = await this.get(key, shared); if (!v) return null; try { return JSON.parse(v); } catch { return v; } },
  async clearAll() {

// Human-readable placeholder for a bracket slot before the team is known
const getSlotLabel = (matchId, side) => {
  if (matchId >= 73 && matchId <= 88) {
    const slot = R32_SLOTS[matchId];
    if (!slot) return '?';
    const def = side === 'home' ? slot.home : slot.away;
    if (def.type === '1') return `${def.g}1`;
    if (def.type === '2') return `${def.g}2`;
    if (def.type === '3') return `3${def.eligible.join('')}`;
  }
  if (matchId === 103) {
    return side === 'home' ? `L${KO_FEED[103].h}` : `L${KO_FEED[103].a}`;
  }
  if (matchId >= 89 && matchId <= 104) {
    const feed = KO_FEED[matchId];
    if (!feed) return '?';
    return side === 'home' ? `W${feed.h}` : `W${feed.a}`;
  }
  return '?';
};

// Returns the underdog team name if one side is ranked 20+ spots lower (and thus the upset pick)
const getUnderdog = (home, away) => {
  const hr = FIFA_RANKINGS[home], ar = FIFA_RANKINGS[away];
  if (!hr || !ar) return null;
  if (ar - hr > SCORING.underdogThreshold) return away; // away ranked lower (bigger number)
  if (hr - ar > SCORING.underdogThreshold) return home; // home ranked lower
  return null;
};

// Returns the score multiplier for a group stage match given a user's joker picks
// 3× if match involves Joker Team AND is in Joker Group (i.e. team is in group)
// 2× if match involves Joker Team OR is in Joker Group
// 1× otherwise
const getJokerMultiplier = (match, jokerTeam, jokerGroup) => {
  if (!jokerTeam && !jokerGroup) return 1;
  const teamMatch = jokerTeam && (match.home === jokerTeam || match.away === jokerTeam);
  const groupMatch = jokerGroup && match.group === jokerGroup;
  if (teamMatch && groupMatch) return 3;
  if (teamMatch || groupMatch) return 2;
  return 1;
};

// Compute group standings from match predictions
const computeGroupStandings = (groupKey, predictions) => {
  const teams = GROUPS[groupKey];
  const stats = {};
  teams.forEach(t => { stats[t] = { team: t, group: groupKey, P:0, W:0, D:0, L:0, GF:0, GA:0, GD:0, Pts:0 }; });

  GROUP_MATCHES.filter(m => m.group === groupKey).forEach(m => {
    const pred = predictions[m.id];
    if (!pred || pred.h === '' || pred.a === '' || pred.h == null || pred.a == null) return;
    const h = parseInt(pred.h), a = parseInt(pred.a);
    if (isNaN(h) || isNaN(a)) return;
    stats[m.home].P++; stats[m.away].P++;
    stats[m.home].GF += h; stats[m.home].GA += a;
    stats[m.away].GF += a; stats[m.away].GA += h;
    if (h > a) { stats[m.home].W++; stats[m.home].Pts += 3; stats[m.away].L++; }
    else if (a > h) { stats[m.away].W++; stats[m.away].Pts += 3; stats[m.home].L++; }
    else { stats[m.home].D++; stats[m.away].D++; stats[m.home].Pts++; stats[m.away].Pts++; }
  });

  Object.values(stats).forEach(s => { s.GD = s.GF - s.GA; });

  // Sort: Pts > GD > GF > alphabetical (deterministic tiebreak)
  const sorted = Object.values(stats).sort((x, y) => {
    if (y.Pts !== x.Pts) return y.Pts - x.Pts;
    if (y.GD !== x.GD) return y.GD - x.GD;
    if (y.GF !== x.GF) return y.GF - x.GF;
    return x.team.localeCompare(y.team);
  });
  return sorted;
};

// All group standings keyed by group
const computeAllStandings = (predictions) => {
  const all = {};
  GROUP_KEYS.forEach(g => { all[g] = computeGroupStandings(g, predictions); });
  return all;
};

// Get the 8 best 3rd-placed teams. Returns array of group keys (those whose 3rd advances).
const getBest3rdPlaceGroups = (standings) => {
  const thirds = GROUP_KEYS.map(g => {
    const t = standings[g]?.[2];
    if (!t) return null;
    return { ...t, group: g, fifaRank: FIFA_RANKINGS[t.team] || 999 };
  }).filter(Boolean);
  // Sort by Pts, GD, GF, then FIFA ranking (lower = better), then group letter
  thirds.sort((x, y) => {
    if (y.Pts !== x.Pts) return y.Pts - x.Pts;
    if (y.GD !== x.GD) return y.GD - x.GD;
    if (y.GF !== x.GF) return y.GF - x.GF;
    if (x.fifaRank !== y.fifaRank) return x.fifaRank - y.fifaRank; // lower rank = better
    return x.group.localeCompare(y.group);
  });
  return thirds.slice(0, 8).map(t => t.group);
};

const assignThirdPlaceSlots = (qualifyingGroups) => {
  // Match IDs for group winners facing 3rd place teams
  // Columns in FIFA table: 1A=M79, 1B=M85, 1D=M81, 1E=M74, 1G=M82, 1I=M77, 1K=M87, 1L=M80
  const colToMatch = [79, 85, 81, 74, 82, 77, 87, 80];
  const sortedGroups = [...qualifyingGroups].sort();
  const key = sortedGroups.join('');

  for (const [groups, assignments] of THIRD_PLACE_TABLE) {
    if ([...groups].sort().join('') === key) {
      const result = {};
      // assignments[i] = which 3rd-place group goes to colToMatch[i]
      assignments.forEach((group, i) => {
        if (group) result[colToMatch[i]] = group;
      });
      return result;
    }
  }

  // Fallback: use backtracking if combination not found in table
  const slotIds = [79, 85, 81, 74, 82, 77, 87, 80];
  const eligibility = {
    74: ['A','B','C','D','F'], 77: ['C','D','F','G','H'], 79: ['C','E','F','H','I'],
    80: ['E','H','I','J','K'], 81: ['B','E','F','I','J'], 82: ['A','E','H','I','J'],
    85: ['E','F','G','I','J'], 87: ['D','E','I','J','L'],
  };
  const groupOptions = {};
  qualifyingGroups.forEach(g => { groupOptions[g] = slotIds.filter(s => eligibility[s].includes(g)); });
  const res = {};
  const solve = (remaining) => {
    if (remaining.length === 0) return true;
    remaining.sort((a, b) => groupOptions[a].filter(s => !res[s]).length - groupOptions[b].filter(s => !res[s]).length || a.localeCompare(b));
    const g = remaining[0];
    for (const slot of groupOptions[g].filter(s => !res[s])) {
      res[slot] = g;
      if (solve(remaining.slice(1))) return true;
      delete res[slot];
    }
    return false;
  };
  solve([...qualifyingGroups]);
  return res;
};

// Get team at a given R32 slot reference
const getTeamForR32 = (slotDef, standings, thirdPlaceAssignment) => {
  if (slotDef.type === '1') return standings[slotDef.g]?.[0]?.team || null;
  if (slotDef.type === '2') return standings[slotDef.g]?.[1]?.team || null;
  if (slotDef.type === '3') {
    // Find which qualifying group is assigned to this slot
    // (we'll pass the slot's matchId via context separately)
    return null;
  }
  return null;
};

// Build the full bracket from predictions
// Returns: { matchId: { home, away, homeScore, awayScore } } for matches 73-104
const buildBracket = (predictions, koPredictions) => {
  const standings = computeAllStandings(predictions);
  const best3 = getBest3rdPlaceGroups(standings);
  const slotAssignment = assignThirdPlaceSlots(best3);

  // Inverse: slot ID → group key (which group's 3rd is in that R32 slot)
  const slotToGroup = slotAssignment; // already { slotId: groupKey }

  // Determine which groups are fully predicted (all 6 matches scored)
  const completeGroups = new Set();
  GROUP_KEYS.forEach(g => {
    const allDone = GROUP_MATCHES.filter(m => m.group === g).every(m => {
      const p = predictions[m.id];
      return p && p.h !== '' && p.a !== '' && p.h != null && p.a != null;
    });
    if (allDone) completeGroups.add(g);
  });
  const allGroupsComplete = completeGroups.size === 12;

  const bracket = {};

  // R32 — only resolve teams once their feeder groups are fully predicted
  for (let mId = 73; mId <= 88; mId++) {
    const slot = R32_SLOTS[mId];
    let home = null, away = null;
    // Home
    if (slot.home.type === '1' && completeGroups.has(slot.home.g)) home = standings[slot.home.g][0].team;
    else if (slot.home.type === '2' && completeGroups.has(slot.home.g)) home = standings[slot.home.g][1].team;
    else if (slot.home.type === '3' && allGroupsComplete) {
      const g = slotToGroup[mId];
      home = g ? standings[g][2].team : null;
    }
    // Away
    if (slot.away.type === '1' && completeGroups.has(slot.away.g)) away = standings[slot.away.g][0].team;
    else if (slot.away.type === '2' && completeGroups.has(slot.away.g)) away = standings[slot.away.g][1].team;
    else if (slot.away.type === '3' && allGroupsComplete) {
      const g = slotToGroup[mId];
      away = g ? standings[g][2].team : null;
    }
    const pred = koPredictions[mId] || {};
    bracket[mId] = {
      id: mId, round: 'R32',
      home, away,
      hScore: pred.h, aScore: pred.a,
      pkWinner: pred.pk, // home or away team name, when user predicts draw + chooses pen winner
    };
  }

  // Helper: get winner of a match (based on predicted score + penalty pick on draws)
  const winnerOf = (mId) => {
    const m = bracket[mId];
    if (!m || !m.home || !m.away) return null;
    if (m.hScore === '' || m.aScore === '' || m.hScore == null || m.aScore == null) return null;
    const h = parseInt(m.hScore), a = parseInt(m.aScore);
    if (isNaN(h) || isNaN(a)) return null;
    if (h > a) return m.home;
    if (a > h) return m.away;
    // Draw → user must pick penalty winner. If they haven't, return null (bracket stops here).
    if (m.pkWinner === m.home || m.pkWinner === m.away) return m.pkWinner;
    return null;
  };
  const loserOf = (mId) => {
    const m = bracket[mId];
    if (!m || !m.home || !m.away) return null;
    const w = winnerOf(mId);
    if (!w) return null;
    return w === m.home ? m.away : m.home;
  };

  // R16, QF, SF
  const rounds = [
    { range: [89, 96], roundName: 'R16' },
    { range: [97, 100], roundName: 'QF' },
    { range: [101, 102], roundName: 'SF' },
  ];
  rounds.forEach(({ range, roundName }) => {
    for (let mId = range[0]; mId <= range[1]; mId++) {
      const feed = KO_FEED[mId];
      const home = winnerOf(feed.h);
      const away = winnerOf(feed.a);
      const pred = koPredictions[mId] || {};
      bracket[mId] = { id: mId, round: roundName, home, away, hScore: pred.h, aScore: pred.a, pkWinner: pred.pk };
    }
  });

  // 3rd place
  {
    const feed = KO_FEED[103];
    const home = loserOf(feed.h);
    const away = loserOf(feed.a);
    const pred = koPredictions[103] || {};
    bracket[103] = { id: 103, round: '3rd', home, away, hScore: pred.h, aScore: pred.a, pkWinner: pred.pk };
  }
  // Final
  {
    const feed = KO_FEED[104];
    const home = winnerOf(feed.h);
    const away = winnerOf(feed.a);
    const pred = koPredictions[104] || {};
    bracket[104] = { id: 104, round: 'Final', home, away, hScore: pred.h, aScore: pred.a, pkWinner: pred.pk };
  }

  return { bracket, standings, best3, slotToGroup, completeGroups, allGroupsComplete };
};

// Build bracket from actual results (for admin bracket view)
const buildActualBracket = (actualGroupResults, actualKoResults) => {
  const standings = computeAllStandings(actualGroupResults);
  const completeGroups = new Set();
  GROUP_KEYS.forEach(g => {
    const done = GROUP_MATCHES.filter(m => m.group === g).every(m => {
      const r = actualGroupResults[m.id];
      return r && r.h !== '' && r.h != null && r.a !== '' && r.a != null;
    });
    if (done) completeGroups.add(g);
  });
  const allComplete = completeGroups.size === 12;
  const best3 = allComplete ? getBest3rdPlaceGroups(standings) : [];
  const slotAssignment = allComplete ? assignThirdPlaceSlots(best3) : {};

  const bracket = {};

  // R32 — auto-fill from actual standings
  for (let mId = 73; mId <= 88; mId++) {
    const slot = R32_SLOTS[mId];
    let autoHome = null, autoAway = null;
    if (slot.home.type === '1' && completeGroups.has(slot.home.g)) autoHome = standings[slot.home.g][0].team;
    else if (slot.home.type === '2' && completeGroups.has(slot.home.g)) autoHome = standings[slot.home.g][1].team;
    else if (slot.home.type === '3' && allComplete) { const g = slotAssignment[mId]; autoHome = g ? standings[g][2].team : null; }
    if (slot.away.type === '1' && completeGroups.has(slot.away.g)) autoAway = standings[slot.away.g][0].team;
    else if (slot.away.type === '2' && completeGroups.has(slot.away.g)) autoAway = standings[slot.away.g][1].team;
    else if (slot.away.type === '3' && allComplete) { const g = slotAssignment[mId]; autoAway = g ? standings[g][2].team : null; }
    const r = actualKoResults[mId] || {};
    bracket[mId] = { id: mId, round: 'R32', home: autoHome || r.homeTeam || null, away: autoAway || r.awayTeam || null, hScore: r.h, aScore: r.a, pkWinner: r.pkWinner };
  }

  const actualWinnerOf = (mId) => {
    const m = bracket[mId];
    if (!m?.home || !m?.away) return null;
    const r = actualKoResults[mId];
    if (!r || r.h === '' || r.h == null || r.a === '' || r.a == null) return null;
    const h = parseInt(r.h), a = parseInt(r.a);
    if (isNaN(h) || isNaN(a)) return null;
    if (h > a) return m.home;
    if (a > h) return m.away;
    return r.pkWinner || null;
  };
  const actualLoserOf = (mId) => { const w = actualWinnerOf(mId); const m = bracket[mId]; if (!w || !m) return null; return w === m.home ? m.away : m.home; };

  [[89,96,'R16'],[97,100,'QF'],[101,102,'SF']].forEach(([s, e, rnd]) => {
    for (let mId = s; mId <= e; mId++) {
      const feed = KO_FEED[mId];
      const r = actualKoResults[mId] || {};
      bracket[mId] = { id: mId, round: rnd, home: actualWinnerOf(feed.h), away: actualWinnerOf(feed.a), hScore: r.h, aScore: r.a, pkWinner: r.pkWinner };
    }
  });

  const r103 = actualKoResults[103] || {};
  bracket[103] = { id: 103, round: '3rd', home: actualLoserOf(KO_FEED[103].h), away: actualLoserOf(KO_FEED[103].a), hScore: r103.h, aScore: r103.a, pkWinner: r103.pkWinner };
  const r104 = actualKoResults[104] || {};
  bracket[104] = { id: 104, round: 'Final', home: actualWinnerOf(KO_FEED[104].h), away: actualWinnerOf(KO_FEED[104].a), hScore: r104.h, aScore: r104.a, pkWinner: r104.pkWinner };

  return { bracket, completeGroups, allComplete };
};

// ──────────────────────────────────────────────────────────────────────
// SCORING
// ──────────────────────────────────────────────────────────────────────

const scoreMatch = (pred, actual, homeTeam = null, awayTeam = null, isGroupStage = false) => {
  if (!pred || !actual) return { total: 0, breakdown: {} };
  const ph = parseInt(pred.h), pa = parseInt(pred.a);
  const ah = parseInt(actual.h), aa = parseInt(actual.a);
  if (isNaN(ph) || isNaN(pa) || isNaN(ah) || isNaN(aa)) return { total: 0, breakdown: {} };

  const breakdown = {};
  let total = 0;

  if (ph === ah) { breakdown.homeGoals = 1; total += SCORING.homeGoals; }
  if (pa === aa) { breakdown.awayGoals = 1; total += SCORING.awayGoals; }

  const actualResult = ah > aa ? 'H' : (aa > ah ? 'A' : 'D');
  const predResult = ph > pa ? 'H' : (pa > ph ? 'A' : 'D');
  const resultCorrect = actualResult === predResult;

  if (resultCorrect) {
    if (actualResult === 'D') { breakdown.correctDraw = SCORING.correctDraw; total += SCORING.correctDraw; }
    else { breakdown.correctResult = SCORING.correctResult; total += SCORING.correctResult; }
  }

  // Bonus: exact score (right result + both goal counts)
  if (ph === ah && pa === aa) {
    breakdown.exactBonus = SCORING.exactBonus;
    total += SCORING.exactBonus;
  }

  // Bonus: correctly predicted a group-stage upset (lower-ranked team wins)
  if (isGroupStage && resultCorrect && actualResult !== 'D' && homeTeam && awayTeam) {
    const winner = actualResult === 'H' ? homeTeam : awayTeam;
    const loser  = actualResult === 'H' ? awayTeam : homeTeam;
    const winnerRank = FIFA_RANKINGS[winner], loserRank = FIFA_RANKINGS[loser];
    if (winnerRank && loserRank && winnerRank - loserRank > SCORING.underdogThreshold) {
      breakdown.underdogBonus = SCORING.underdogBonus;
      total += SCORING.underdogBonus;
    }
  }

  return { total, breakdown };
};

// Compute total score for a user given predictions + actual results
const computeUserScore = (userPreds, actualGroupResults, actualKoResults, actualBracketTeams, actualBonus = {}, joker = {}) => {
  let groupPoints = 0;
  let koPoints = 0;
  let bracketPoints = 0;
  const detail = { exactScores: 0, correctResults: 0, correctDraws: 0, underdogWins: 0, giantKillerWins: 0, matches: 0 };
  const mdPts = { 1: 0, 2: 0, 3: 0 };
  const koRoundPts = { R32: 0, R16: 0, QF: 0, SF: 0, '3rd': 0, Final: 0 };

  // Group match score predictions
  GROUP_MATCHES.forEach(m => {
    const actual = actualGroupResults[m.id];
    if (!actual || actual.h === '' || actual.a === '' || actual.h == null) return;
    const pred = userPreds.group?.[m.id];
    if (!pred || pred.h === '' || pred.a === '' || pred.h == null) return;
    const { total, breakdown } = scoreMatch(pred, actual, m.home, m.away, true);
    const multiplier = getJokerMultiplier(m, joker.team, joker.group);
    const pts = total * multiplier;
    groupPoints += pts;
    mdPts[m.matchday] = (mdPts[m.matchday] || 0) + pts;
    detail.matches++;
    if (breakdown.exactBonus) detail.exactScores++;
    if (breakdown.correctResult) detail.correctResults++;
    if (breakdown.correctDraw) detail.correctDraws++;
    if (breakdown.underdogBonus) detail.underdogWins++;
  });

  // Build user's predicted bracket
  const { bracket: userBracket } = buildBracket(userPreds.group || {}, userPreds.ko || {});

  // Auto-derive actual bracket from group results + KO results
  const { bracket: actualDerivedBracket } = buildActualBracket(actualGroupResults, actualKoResults);

  // Build actual teams per round and actual slot per team
  const actualTeamsByRound = { R32: new Set(), R16: new Set(), QF: new Set(), SF: new Set(), Final: new Set(), '3rd': new Set() };
  const actualMatchByTeamByRound = {};

  // R32 — derive directly from actual group standings per slot, no 'allGroupsComplete' gate
  // This is the same slot logic as buildActualBracket but without requiring all 12 groups done
  if (!actualMatchByTeamByRound.R32) actualMatchByTeamByRound.R32 = {};
  const actualStandings = computeAllStandings(actualGroupResults);
  const actualCompleteGroups = new Set(GROUP_KEYS.filter(g =>
    GROUP_MATCHES.filter(m => m.group === g).every(m => {
      const r = actualGroupResults[m.id];
      return r && r.h !== '' && r.h != null && r.a !== '' && r.a != null;
    })
  ));
  const actualAllComplete = actualCompleteGroups.size === 12;
  const actualBest3 = actualAllComplete ? getBest3rdPlaceGroups(actualStandings) : [];
  const actualSlotToGroup = actualAllComplete ? assignThirdPlaceSlots(actualBest3) : {};

  for (let mId = 73; mId <= 88; mId++) {
    const r32r = actualKoResults[mId];
    if (!r32r || r32r.h == null || r32r.h === '') continue; // reveal only when result entered
    const slot = R32_SLOTS[mId];
    let home = null, away = null;
    if (slot.home.type === '1' && actualCompleteGroups.has(slot.home.g)) home = actualStandings[slot.home.g]?.[0]?.team;
    else if (slot.home.type === '2' && actualCompleteGroups.has(slot.home.g)) home = actualStandings[slot.home.g]?.[1]?.team;
    else if (slot.home.type === '3' && actualAllComplete) { const g = actualSlotToGroup[mId]; home = g ? actualStandings[g]?.[2]?.team : null; }
    home = home || r32r?.homeTeam || null;
    if (slot.away.type === '1' && actualCompleteGroups.has(slot.away.g)) away = actualStandings[slot.away.g]?.[0]?.team;
    else if (slot.away.type === '2' && actualCompleteGroups.has(slot.away.g)) away = actualStandings[slot.away.g]?.[1]?.team;
    else if (slot.away.type === '3' && actualAllComplete) { const g = actualSlotToGroup[mId]; away = g ? actualStandings[g]?.[2]?.team : null; }
    away = away || r32r?.awayTeam || null;
    if (home) { actualTeamsByRound.R32.add(home); actualMatchByTeamByRound.R32[home] = { matchId: mId, side: 'home' }; }
    if (away) { actualTeamsByRound.R32.add(away); actualMatchByTeamByRound.R32[away] = { matchId: mId, side: 'away' }; }
  }

  // R16+ — teams only known once a match result is entered
  for (let mId = 89; mId <= 104; mId++) {
    const round = ROUND_FOR(mId);
    if (!round) continue;
    const r = actualKoResults[mId];
    if (!r || r.h == null || r.h === '') continue;
    const home = r.homeTeam || actualDerivedBracket[mId]?.home;
    const away = r.awayTeam || actualDerivedBracket[mId]?.away;
    if (!actualMatchByTeamByRound[round]) actualMatchByTeamByRound[round] = {};
    if (home) { actualTeamsByRound[round].add(home); actualMatchByTeamByRound[round][home] = { matchId: mId, side: 'home' }; }
    if (away) { actualTeamsByRound[round].add(away); actualMatchByTeamByRound[round][away] = { matchId: mId, side: 'away' }; }
  }

  // User's R32 bracket — derive directly from user's predictions per slot, same approach
  const userStandings = computeAllStandings(userPreds.group || {});
  const userCompleteGroups = new Set(GROUP_KEYS.filter(g =>
    GROUP_MATCHES.filter(m => m.group === g).every(m => {
      const p = (userPreds.group || {})[m.id];
      return p && p.h !== '' && p.h != null && p.a !== '' && p.a != null;
    })
  ));
  const userAllComplete = userCompleteGroups.size === 12;
  const userBest3 = userAllComplete ? getBest3rdPlaceGroups(userStandings) : [];
  const userSlotToGroup = userAllComplete ? assignThirdPlaceSlots(userBest3) : {};

  // Build userR32Bracket: mId -> { home, away } — tracks side explicitly
  const userR32Bracket = {};
  for (let mId = 73; mId <= 88; mId++) {
    const slot = R32_SLOTS[mId];
    let home = null, away = null;
    if (slot.home.type === '1' && userCompleteGroups.has(slot.home.g)) home = userStandings[slot.home.g]?.[0]?.team;
    else if (slot.home.type === '2' && userCompleteGroups.has(slot.home.g)) home = userStandings[slot.home.g]?.[1]?.team;
    else if (slot.home.type === '3' && userAllComplete) { const g = userSlotToGroup[mId]; home = g ? userStandings[g]?.[2]?.team : null; }
    if (slot.away.type === '1' && userCompleteGroups.has(slot.away.g)) away = userStandings[slot.away.g]?.[0]?.team;
    else if (slot.away.type === '2' && userCompleteGroups.has(slot.away.g)) away = userStandings[slot.away.g]?.[1]?.team;
    else if (slot.away.type === '3' && userAllComplete) { const g = userSlotToGroup[mId]; away = g ? userStandings[g]?.[2]?.team : null; }
    userR32Bracket[mId] = { home, away };
  }

  // Score bracket — full pts if exact match AND exact side; half pts if in round but different position
  // R32: use userR32Bracket (direct from standings, side-aware)
  for (let mId = 73; mId <= 88; mId++) {
    const v = SCORING.bracketTeam.R32;
    const { home: uHome, away: uAway } = userR32Bracket[mId] || {};
    let pts = 0;
    [{ team: uHome, side: 'home' }, { team: uAway, side: 'away' }].forEach(({ team, side }) => {
      if (!team) return;
      const actual = actualMatchByTeamByRound.R32?.[team];
      if (!actual) return; // didn't reach R32
      if (actual.matchId === mId && actual.side === side) pts += v;        // exact slot + side
      else pts += v * SCORING.halfMultiplier;                               // in R32, different position
    });
    bracketPoints += pts;
    koRoundPts.R32 = (koRoundPts.R32 || 0) + pts;
  }

  // R16+: use userBracket (derived from KO predictions), same side-aware check
  for (let mId = 89; mId <= 104; mId++) {
    const round = ROUND_FOR(mId);
    if (!round || !SCORING.bracketTeam[round]) continue;
    const um = userBracket[mId];
    if (!um) continue;
    const v = SCORING.bracketTeam[round];
    let pts = 0;
    [{ team: um.home, side: 'home' }, { team: um.away, side: 'away' }].forEach(({ team, side }) => {
      if (!team) return;
      const actual = actualMatchByTeamByRound[round]?.[team];
      if (!actual) return;
      if (actual.matchId === mId && actual.side === side) pts += v;
      else pts += v * SCORING.halfMultiplier;
    });
    bracketPoints += pts;
    koRoundPts[round] = (koRoundPts[round] || 0) + pts;
  }

  // Giant Killer bonus (scored as match pts, not bracket pts)
  for (let mId = 73; mId <= 88; mId++) {
    const actual = actualKoResults[mId];
    if (!actual || actual.h == null || actual.h === '' || actual.a == null || actual.a === '') continue;
    const slot = R32_SLOTS[mId];
    const gwIsHome = slot.home.type === '1', gwIsAway = slot.away.type === '1';
    if (!gwIsHome && !gwIsAway) continue;
    const aH = parseInt(actual.h), aA = parseInt(actual.a);
    if (isNaN(aH) || isNaN(aA)) continue;
    const gwSlotWon = gwIsHome
      ? (aH > aA || (aH === aA && actual.pkWinner === actual.homeTeam))
      : (aA > aH || (aA === aH && actual.pkWinner === actual.awayTeam));
    if (gwSlotWon) continue; // GW won — no giant killer
    const um = userBracket[mId];
    if (!um?.home || !um?.away) continue;
    const predH = parseInt(um.hScore), predA = parseInt(um.aScore);
    if (isNaN(predH) || isNaN(predA)) continue;
    const userGwSlotWon = gwIsHome
      ? (predH > predA || (predH === predA && um.pkWinner === um.home))
      : (predA > predH || (predA === predH && um.pkWinner === um.away));
    if (!userGwSlotWon) {
      koPoints += SCORING.giantKillerBonus;
      koRoundPts.R32 = (koRoundPts.R32 || 0) + SCORING.giantKillerBonus;
      detail.giantKillerWins++;
    }
  }


  for (let mId = 73; mId <= 104; mId++) {
    const actual = actualKoResults[mId];
    if (!actual || actual.h === '' || actual.a === '' || actual.h == null) continue;
    const userM = userBracket[mId];
    if (!userM || !userM.home || !userM.away) continue;
    const userPred = { h: userM.hScore, a: userM.aScore };
    if (userPred.h === '' || userPred.h == null) continue;

    // Determine actual teams — prefer explicit homeTeam/awayTeam, fall back to derived bracket
    const actualHome = actual.homeTeam || actualDerivedBracket[mId]?.home || null;
    const actualAway = actual.awayTeam || actualDerivedBracket[mId]?.away || null;
    const actualH = parseInt(actual.h), actualA = parseInt(actual.a);
    const predH = parseInt(userPred.h), predA = parseInt(userPred.a);
    if (isNaN(predH) || isNaN(predA) || isNaN(actualH) || isNaN(actualA)) continue;

    const homeMatch = userM.home === actualHome;
    const awayMatch = userM.away === actualAway;
    const fullSwap = userM.home === actualAway && userM.away === actualHome;
    const bothMatch = (homeMatch && awayMatch) || fullSwap;

    // Effective actual scores (aligned to user's orientation if swapped)
    const eActH = fullSwap ? actualA : actualH;
    const eActA = fullSwap ? actualH : actualA;
    const eHomeMatch = fullSwap ? (userM.away === actualHome) : homeMatch;
    const eAwayMatch = fullSwap ? (userM.home === actualAway) : awayMatch;

    let pts = 0;

    // Result direction: ALWAYS scored regardless of which teams are playing
    const predResult = predH > predA ? 'H' : predH < predA ? 'A' : 'D';
    const actResult  = eActH  > eActA  ? 'H' : eActH  < eActA  ? 'A' : 'D';
    if (predResult === actResult) {
      pts += actResult === 'D' ? SCORING.correctDraw : SCORING.correctResult;
    }

    // Goals: always awarded if the goal count matches (regardless of teams)
    if (predH === eActH) pts += SCORING.homeGoals;
    if (predA === eActA) pts += SCORING.awayGoals;

    // Exact bonus: always awarded when predicted score matches actual score (regardless of teams)
    if (predH === eActH && predA === eActA) {
      pts += SCORING.exactBonus;
      detail.exactScores++;
    }

    koPoints += pts;
    const round = ROUND_FOR(mId);
    if (round) koRoundPts[round] = (koRoundPts[round] || 0) + pts;
  }

  // Bonus picks
  let bonusPoints = 0;
  const BONUS_KEYS = ['winner', 'runnerUp', 'thirdPlace', 'goldenBoot'];
  const userBonus = userPreds.bonus || {};
  BONUS_KEYS.forEach(key => {
    const actual = actualBonus[key];
    const pick = userBonus[key];
    if (!actual || !pick) return;
    const a = actual.trim().toLowerCase();
    const p = pick.trim().toLowerCase();
    // Exact match OR one contains the other (handles "Haaland" matching "Erling Haaland")
    const matches = a === p || a.includes(p) || p.includes(a);
    if (matches) {
      bonusPoints += SCORING.bonusPick;
      detail.bonusCorrect = (detail.bonusCorrect || 0) + 1;
    }
  });

  const sectionPts = {
    total: groupPoints + koPoints + bracketPoints + bonusPoints,
    group: groupPoints,
    md1: mdPts[1] || 0, md2: mdPts[2] || 0, md3: mdPts[3] || 0,
    ko: koPoints + bracketPoints,
    R32: koRoundPts.R32 || 0,
    R16: koRoundPts.R16 || 0,
    QF: koRoundPts.QF || 0,
    SF: koRoundPts.SF || 0,
    '3rd': koRoundPts['3rd'] || 0,
    Final: koRoundPts.Final || 0,
    bonus: bonusPoints,
  };

  return {
    total: sectionPts.total,
    groupPoints, koPoints, bracketPoints, bonusPoints,
    detail, sectionPts,
  };
};

// Compute the maximum additional points a user can still earn from here.
// Only meaningful once KO stage has started (group stage locked).
const computeMaxPossible = (userPreds, currentTotal, actualKoResults, actualBonus = {}, joker = {}) => {
  const { bracket } = buildBracket(userPreds.group || {}, userPreds.ko || {});
  let maxExtra = 0;

  // KO matches: for each unscored match the user has both teams predicted, max = 4 pts (exact score)
  for (let mId = 73; mId <= 104; mId++) {
    const actual = actualKoResults[mId];
    const alreadyScored = actual && actual.h !== '' && actual.h != null && actual.a !== '' && actual.a != null;
    if (alreadyScored) continue;
    const m = bracket[mId];
    if (m?.home && m?.away) maxExtra += 4; // max per KO match (exact score, no underdog in KO)
  }

  // Bracket team bonuses: for each future KO round, add points for every team user predicted in it
  const KO_ROUNDS = [
    { ids: range(73, 88), round: 'R32' },
    { ids: range(89, 96), round: 'R16' },
    { ids: range(97, 100), round: 'QF' },
    { ids: range(101, 102), round: 'SF' },
    { ids: [103], round: '3rd' },
    { ids: [104], round: 'Final' },
  ];
  KO_ROUNDS.forEach(({ ids, round }) => {
    // Round is "done" if all its matches have actual results
    const roundDone = ids.every(mId => {
      const a = actualKoResults[mId];
      return a && a.h !== '' && a.h != null;
    });
    if (roundDone) return; // already scored, skip
    // Count how many teams user has predicted in this round
    const roundValue = SCORING.bracketTeam[round] || 0;
    ids.forEach(mId => {
      const m = bracket[mId];
      if (m?.home) maxExtra += roundValue;
      if (m?.away) maxExtra += roundValue;
    });
  });

  // Unrevealed bonus picks: 10 pts each
  const BONUS_KEYS = ['winner', 'runnerUp', 'thirdPlace', 'goldenBoot'];
  BONUS_KEYS.forEach(key => {
    const userPick = userPreds.bonus?.[key];
    const actual = actualBonus[key];
    if (userPick && !actual) maxExtra += SCORING.bonusPick;
  });

  return currentTotal + maxExtra;
};

// Compute bracket bonus pts attributable to a specific match card
// Iterates over ACTUAL teams in the match, checks against user's predicted rounds
const computeMatchBracketPts = (matchId, userBracket, actualDerivedBracket, actualKoResults) => {
  const round = ROUND_FOR(matchId);
  if (!round || !SCORING.bracketTeam[round]) return 0;
  const fullValue = SCORING.bracketTeam[round];

  // Actual teams for this specific match
  const m = actualDerivedBracket[matchId];
  const r = actualKoResults[matchId];
  const actualHome = m?.home || r?.homeTeam;
  const actualAway = m?.away || r?.awayTeam;
  if (!actualHome && !actualAway) return 0;

  // User's teams by round (same structure as computeUserScore)
  const userTeamsByRound = {
    R32: new Set(), R16: new Set(), QF: new Set(), SF: new Set(), Final: new Set(), '3rd': new Set(),
  };
  for (let mId = 73; mId <= 88; mId++) { const bm = userBracket[mId]; if (bm?.home) userTeamsByRound.R32.add(bm.home); if (bm?.away) userTeamsByRound.R32.add(bm.away); }
  for (let mId = 89; mId <= 96; mId++) { const bm = userBracket[mId]; if (bm?.home) userTeamsByRound.R16.add(bm.home); if (bm?.away) userTeamsByRound.R16.add(bm.away); }
  for (let mId = 97; mId <= 100; mId++) { const bm = userBracket[mId]; if (bm?.home) userTeamsByRound.QF.add(bm.home); if (bm?.away) userTeamsByRound.QF.add(bm.away); }
  for (let mId = 101; mId <= 102; mId++) { const bm = userBracket[mId]; if (bm?.home) userTeamsByRound.SF.add(bm.home); if (bm?.away) userTeamsByRound.SF.add(bm.away); }
  if (userBracket[104]?.home) userTeamsByRound.Final.add(userBracket[104].home);
  if (userBracket[104]?.away) userTeamsByRound.Final.add(userBracket[104].away);
  if (userBracket[103]?.home) userTeamsByRound['3rd'].add(userBracket[103].home);
  if (userBracket[103]?.away) userTeamsByRound['3rd'].add(userBracket[103].away);

  // R32 slot types (for wrong-place detection)
  const userSlotType = {}, actualSlotType = {};
  for (let mId = 73; mId <= 88; mId++) {
    const slot = R32_SLOTS[mId];
    const um = userBracket[mId];
    const am = actualDerivedBracket[mId];
    const ar = actualKoResults[mId];
    const aHome = am?.home || ar?.homeTeam;
    const aAway = am?.away || ar?.awayTeam;
    if (um?.home) userSlotType[um.home] = slot.home.type;
    if (um?.away) userSlotType[um.away] = slot.away.type;
    if (aHome) actualSlotType[aHome] = slot.home.type;
    if (aAway) actualSlotType[aAway] = slot.away.type;
  }

  // Score: for each actual team in this match, how many pts does the user earn?
  let pts = 0;
  [actualHome, actualAway].forEach(team => {
    if (!team) return;
    if (userTeamsByRound[round]?.has(team)) {
      if (round === 'R32') {
        const uType = userSlotType[team];
        const aType = actualSlotType[team];
        pts += (uType === aType) ? fullValue : fullValue * SCORING.halfMultiplier;
      } else {
        pts += fullValue;
      }
    } else {
      // Team not in user's predicted round — half pts if in any other round
      const inAnyRound = Object.values(userTeamsByRound).some(s => s.has(team));
      if (inAnyRound) pts += fullValue * SCORING.halfMultiplier;
    }
  });
  return pts;
};

const Flag = ({ team, size = 18 }) => {
  const emoji = TEAM_FLAGS[team];
  if (!emoji) return null;
  // Convert emoji to Twemoji URL (works on all platforms including Windows/Chrome)
  const cp = [...emoji].map(c => c.codePointAt(0).toString(16)).join('-');
  const url = 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/' + cp + '.svg';

};

function App() {
  const [currentUser, setCurrentUser] = useState(null);
  const [participants, setParticipants] = useState([]);
  const [profiles, setProfiles] = useState({});   // { name: { bankId, country, team } }
  const [predictions, setPredictions] = useState({ group: {}, ko: {} });
  const [results, setResults] = useState({ group: {}, ko: {}, bracketTeams: null, bonus: {}, rankingSnapshot: null });
  const [config, setConfig] = useState({ adminPassword: 'admin123', locked: false });
  const [view, setView] = useState('predictions');
  const [loading, setLoading] = useState(true);
  const [saveStatus, setSaveStatus] = useState('');
  const [allPredictions, setAllPredictions] = useState({});

  // Load on mount
  useEffect(() => {
    (async () => {
      const user = await storage.get(CURRENT_USER_KEY, false);
      const partList = (await storage.getJSON(PART_LIST_KEY, true)) || [];
      const profs = (await storage.getJSON(PROFILES_KEY, true)) || {};
      const res = (await storage.getJSON(RESULTS_KEY, true)) || { group: {}, ko: {}, bracketTeams: null, bonus: {}, rankingSnapshot: null };
      const cfg = (await storage.getJSON(CONFIG_KEY, true)) || { adminPassword: 'admin123', locked: false };
      setParticipants(partList);
      setProfiles(profs);
      setResults(res);
      setConfig(cfg);
      if (user) {
        setCurrentUser(user);
        const userPreds = (await storage.getJSON(PRED_PREFIX + user, true)) || { group: {}, ko: {} };
        setPredictions(userPreds);
      }
      // Load all predictions in parallel — much faster than sequential for large competitions
      const predResults = await Promise.all(
        partList.map(async p => ({ p, data: await storage.getJSON(PRED_PREFIX + p, true) }))
      );
      const all = {};
      predResults.forEach(({ p, data }) => { if (data) all[p] = data; });
      setAllPredictions(all);
      setLoading(false);
    })();
  }, []);

  // Save predictions (debounced via save status)
  const savePredictions = useCallback(async (newPreds) => {
    if (!currentUser) return;
    setPredictions(newPreds);
    setSaveStatus('saving');
    // Always back up to localStorage so logout/login doesn't lose data
    try { localStorage.setItem('wc26_pred_' + currentUser, JSON.stringify(newPreds)); } catch {}
    const ok = await storage.set(PRED_PREFIX + currentUser, newPreds, true);
    setSaveStatus(ok ? 'saved' : 'error');
    setAllPredictions(prev => ({ ...prev, [currentUser]: newPreds }));
    setTimeout(() => setSaveStatus(''), 1200);
  }, [currentUser]);

  const handleLogin = async (name, profile = null) => {
    const trimmed = name.trim();
    if (!trimmed) return;
    await storage.set(CURRENT_USER_KEY, trimmed, false);
    setCurrentUser(trimmed);

    // Always re-read from Firestore immediately before writing — never trust stale local state
    const latestList = (await storage.getJSON(PART_LIST_KEY, true)) || [];
    const latestProfiles = (await storage.getJSON(PROFILES_KEY, true)) || {};

    // Sync local state with what Firestore actually has
    if (latestList.length > participants.length) setParticipants(latestList);

    // Add to participant list only if not already present
    if (!latestList.includes(trimmed)) {
      const newList = [...latestList, trimmed];
      await storage.set(PART_LIST_KEY, newList, true);
      setParticipants(newList);
    }

    // Save profile if provided (new registration or PIN reset) — merge with Firestore data
    if (profile) {
      const newProfiles = { ...latestProfiles, [trimmed]: { ...(latestProfiles[trimmed]||{}), ...profile } };
      setProfiles(newProfiles);
      await storage.set(PROFILES_KEY, newProfiles, true);
    }
    const userPreds = (await storage.getJSON(PRED_PREFIX + trimmed, true))
      || (() => { try { const s = localStorage.getItem('wc26_pred_' + trimmed); return s ? JSON.parse(s) : null; } catch { return null; } })()
      || { group: {}, ko: {} };
    setPredictions(userPreds);
    const all = { ...allPredictions };
    all[trimmed] = userPreds;
    setAllPredictions(all);
  };

  const handleLogout = async () => {
    await storage.set(CURRENT_USER_KEY, '', false);
    setCurrentUser(null);
    setPredictions({ group: {}, ko: {} });
    setView('predictions');
  };

  const saveResults = async (newResults) => {
    setResults(newResults);
    await storage.set(RESULTS_KEY, newResults, true);
  };

  if (loading) {
    return (
      <div className="wc-app" style={{ padding: 40, textAlign: 'center' }}>
        <style>{styles}</style>
        <div className="display" style={{ fontSize: 24, fontStyle: 'italic' }}>Loading…</div>
      </div>
    );
  }

  if (!currentUser) {
    return <LoginScreen onLogin={handleLogin} onGuest={() => { setCurrentUser('__guest__'); setView('leaderboard'); }} participants={participants} profiles={profiles} allPredictions={allPredictions} locked={!!config.locked} />;
  }

  const locked = !!config.locked;
  const isGuest = currentUser === '__guest__';

  return (
    <div className="wc-app">
      <style>{styles}</style>
      <Header
        user={currentUser}
        onLogout={handleLogout}
        view={view}
        setView={setView}
        saveStatus={saveStatus}
        userProfile={profiles[currentUser] || null}
        locked={locked}
        predictions={predictions}
        profiles={profiles}
        isGuest={isGuest}
      />
      {locked && view !== 'admin' && (
        <div style={{ background: 'var(--burgundy)', color: 'white', textAlign: 'center', padding: '8px 16px', fontSize: 13, fontWeight: 600, letterSpacing: '0.04em' }}>
          🔒 COMPETITION LOCKED — predictions are now closed. Good luck!
        </div>
      )}
      <main style={{ maxWidth: 1100, margin: '0 auto', padding: '24px 16px 80px' }}>
        {view === 'predictions' && (
          <PredictionsView
            predictions={predictions}
            onSave={savePredictions}
            results={results}
            locked={locked}
          />
        )}
        {view === 'bracket' && (
          <BracketView
            predictions={predictions}
            onSave={savePredictions}
            results={results}
            locked={locked}
          />
        )}
        {view === 'bonus' && (
          <BonusPicksView
            predictions={predictions}
            onSave={savePredictions}
            results={results}
            locked={locked}
          />
        )}
        {view === 'leaderboard' && (
          <LeaderboardView
            participants={isGuest ? participants : participants.includes(currentUser) ? participants : [...participants, currentUser]}
            allPredictions={{ ...allPredictions, ...(currentUser ? { [currentUser]: predictions } : {}) }}
            results={results}
            profiles={profiles}
            showStillAlive={!!config.showStillAlive}
          />
        )}
        {view === 'simulator' && (
          <SimulatorView
            participants={participants}
            allPredictions={allPredictions}
            results={results}
            profiles={profiles}
            currentUser={currentUser}
          />
        )}
        {view === 'browse' && locked && (
          <BrowseView
            participants={participants}
            allPredictions={allPredictions}
            results={results}
            profiles={profiles}
            currentUser={currentUser}
          />
        )}
        {view === 'field' && locked && (
          <FieldView
            participants={participants}
            allPredictions={allPredictions}
            profiles={profiles}
            eliminatedTeams={config.eliminatedTeams || []}
          />
        )}
        {view === 'rules' && <RulesView />}
        {view === 'admin' && (
          <AdminView
            config={config}
            setConfig={async (c) => { setConfig(c); await storage.set(CONFIG_KEY, c, true); }}
            results={results}
            onSave={saveResults}
            participants={participants}
            allPredictions={allPredictions}
            setAllPredictions={setAllPredictions}
            profiles={profiles}
            setParticipants={setParticipants}
            setProfiles={setProfiles}
          />
        )}
      </main>
      <Footer />
    </div>
  );
}

const normalizeForLookup = (s) => s.normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase().trim();
const getGBTeam = (pick) => {
  if (!pick || !pick.trim()) return null;
  const n = normalizeForLookup(pick);
  // Direct match (normalised)
  for (const [k,v] of Object.entries(GB_LOOKUP)) {
    if (normalizeForLookup(k) === n) return v;
  }
  // Substring match
  for (const [k,v] of Object.entries(GB_LOOKUP)) {
    const kn = normalizeForLookup(k);
    if (n.includes(kn) || kn.includes(n)) return v;
  }
  return null;
};

const rankToElo = (rank) => rank ? Math.max(600, 2000 - (rank - 1) * 10) : 900;

const simMatchFn = (homeTeam, awayTeam) => {
  const eloH = rankToElo(FIFA_RANKINGS[homeTeam]);
  const eloA = rankToElo(FIFA_RANKINGS[awayTeam]);
  const pH = 1 / (1 + Math.pow(10, (eloA - eloH) / 400));
  const poi = (l) => {
    if (l <= 0) return 0;
    const L = Math.exp(-Math.min(l, 20));
    let k = 0, p = 1;
    do { k++; p *= Math.random(); } while (p > L);
    return k - 1;
  };
  return { h: poi(1.3 * pH * 2), a: poi(1.3 * (1-pH) * 2) };
};

const advanceTeam = (result, bracketEntry, type) => {
  if (!result || !bracketEntry) return null;
  const h = parseInt(result.h), a = parseInt(result.a);
  if (isNaN(h) || isNaN(a)) return null;
  const homeWins = h > a || (h === a && Math.random() < 0.5);
  if (type === 'winner') return homeWins ? bracketEntry.home : bracketEntry.away;
  return homeWins ? bracketEntry.away : bracketEntry.home;
};

const preprocessForSim = (name, allPredictions) => {
  const preds = allPredictions[name] || {};
  const groupPreds = {};
  GROUP_MATCHES.forEach(m => {
    const p = (preds.group||{})[m.id];
    if (p && p.h !== '' && p.h != null) groupPreds[m.id] = p;
  });
  const koPreds = {};
  for (let mId = 73; mId <= 104; mId++) {
    const p = (preds.ko||{})[mId];
    if (p && p.h !== '' && p.h != null) koPreds[mId] = p;
  }
  // Pre-compute user R32 bracket
  const uS = computeAllStandings(preds.group || {});
  const uC = new Set(GROUP_KEYS.filter(g =>
    GROUP_MATCHES.filter(m => m.group === g).every(m => {
      const p = (preds.group||{})[m.id]; return p && p.h !== '' && p.h != null;
    })
  ));
  const uAll = uC.size === 12;
  const uB3 = uAll ? getBest3rdPlaceGroups(uS) : [];
  const uSG = uAll ? assignThirdPlaceSlots(uB3) : {};
  const userR32 = {};
  for (let mId = 73; mId <= 88; mId++) {
    const slot = R32_SLOTS[mId];
    let home = null, away = null;
    if (slot.home.type === '1' && uC.has(slot.home.g)) home = uS[slot.home.g]?.[0]?.team;
    else if (slot.home.type === '2' && uC.has(slot.home.g)) home = uS[slot.home.g]?.[1]?.team;
    else if (slot.home.type === '3' && uAll) { const g = uSG[mId]; home = g ? uS[g]?.[2]?.team : null; }
    if (slot.away.type === '1' && uC.has(slot.away.g)) away = uS[slot.away.g]?.[0]?.team;
    else if (slot.away.type === '2' && uC.has(slot.away.g)) away = uS[slot.away.g]?.[1]?.team;
    else if (slot.away.type === '3' && uAll) { const g = uSG[mId]; away = g ? uS[g]?.[2]?.team : null; }
    userR32[mId] = { home, away };
  }
  const { bracket: userBracket } = buildBracket(preds.group || {}, preds.ko || {});
  const joker = preds.joker || {};
  const bonus = preds.bonus || {};
  return { name, preds, groupPreds, koPreds, userR32, userBracket,
    jokerTeam: joker.team||null, jokerGroup: joker.group||null, bonus, gbTeam: getGBTeam(bonus.goldenBoot) };
};

const simOneTournament = (fixedGrp, fixedKo, processed) => {
  // Simulate group stage
  const gRes = Object.assign({}, fixedGrp);
  for (let i = 0; i < GROUP_MATCHES.length; i++) {
    const m = GROUP_MATCHES[i];
    if (!(m.id in gRes)) gRes[m.id] = simMatchFn(m.home, m.away);
  }
  // Build R32 bracket from group results
  const { bracket: r32B } = buildActualBracket(gRes, {});
  const koRes = Object.assign({}, fixedKo);
  const bracket = {};
  // R32
  for (let mId = 73; mId <= 88; mId++) {
    bracket[mId] = { home: r32B[mId]?.home || null, away: r32B[mId]?.away || null };
    if (!(mId in koRes)) koRes[mId] = simMatchFn(bracket[mId].home || '', bracket[mId].away || '');
  }
  // R16 through Final using KO_FEED
  for (let mId = 89; mId <= 104; mId++) {
    const feed = KO_FEED[mId];
    if (!feed) continue;
    const is3rd = feed.loser === true;
    const home = advanceTeam(koRes[feed.h], bracket[feed.h], is3rd ? 'loser' : 'winner');
    const away = advanceTeam(koRes[feed.a], bracket[feed.a], is3rd ? 'loser' : 'winner');
    bracket[mId] = { home, away };
    if (!(mId in koRes)) koRes[mId] = simMatchFn(home || '', away || '');
  }
  // Outcomes
  const winner = advanceTeam(koRes[104], bracket[104], 'winner');
  const runnerUp = advanceTeam(koRes[104], bracket[104], 'loser');
  const third = advanceTeam(koRes[103], bracket[103], 'winner');
  // Team goals
  const goals = {};
  for (let i = 0; i < GROUP_MATCHES.length; i++) {
    const m = GROUP_MATCHES[i], r = gRes[m.id];
    if (r) { goals[m.home] = (goals[m.home]||0)+r.h; goals[m.away] = (goals[m.away]||0)+r.a; }
  }
  for (let mId = 73; mId <= 104; mId++) {
    const r = koRes[mId], b = bracket[mId];
    if (r && b) {
      if (b.home) goals[b.home] = (goals[b.home]||0)+r.h;
      if (b.away) goals[b.away] = (goals[b.away]||0)+r.a;
    }
  }
  let topTeam = null, topG = -1;
  for (const [t,g] of Object.entries(goals)) { if (g > topG) { topG = g; topTeam = t; } }
  // Build actualMatchByTeamByRound for bracket scoring
  const tmr = {}; // round -> { team -> { matchId, side } }
  tmr.R32 = {};
  for (let mId = 73; mId <= 88; mId++) {
    const b = bracket[mId];
    if (b?.home) tmr.R32[b.home] = { matchId: mId, side: 'home' };
    if (b?.away) tmr.R32[b.away] = { matchId: mId, side: 'away' };
  }
  for (let mId = 89; mId <= 104; mId++) {
    const rnd = ROUND_FOR(mId);
    if (!rnd) continue;
    if (!tmr[rnd]) tmr[rnd] = {};
    const b = bracket[mId];
    if (b?.home) tmr[rnd][b.home] = { matchId: mId, side: 'home' };
    if (b?.away) tmr[rnd][b.away] = { matchId: mId, side: 'away' };
  }
  // Score all participants
  return processed.map(pp => {
    let total = 0;
    // Group stage scoring
    for (let i = 0; i < GROUP_MATCHES.length; i++) {
      const m = GROUP_MATCHES[i];
      const pred = pp.groupPreds[m.id]; if (!pred) continue;
      const actual = gRes[m.id]; if (!actual) continue;
      const { total: pts } = scoreMatch(pred, actual, m.home, m.away, true);
      total += pts * getJokerMultiplier(m, pp.jokerTeam, pp.jokerGroup);
    }
    // R32 bracket pts
    const R32v = SCORING.bracketTeam.R32;
    for (let mId = 73; mId <= 88; mId++) {
      const ub = pp.userR32[mId]; if (!ub) continue;
      for (const [team, side] of [[ub.home,'home'],[ub.away,'away']]) {
        if (!team) continue;
        const act = tmr.R32?.[team]; if (!act) continue;
        total += (act.matchId===mId && act.side===side) ? R32v : R32v*SCORING.halfMultiplier;
      }
    }
    // KO match score predictions + R16+ bracket pts
    for (let mId = 73; mId <= 104; mId++) {
      const actR = koRes[mId]; if (!actR) continue;
      const simB = bracket[mId]; if (!simB) continue;
      // KO match score prediction
      const koPred = pp.koPreds[mId];
      const um = pp.userBracket[mId];
      if (koPred && um?.home && um?.away) {
        const swap = um.home===simB.away && um.away===simB.home;
        const eH = swap ? actR.a : actR.h, eA = swap ? actR.h : actR.a;
        const pH = parseInt(koPred.h), pA = parseInt(koPred.a);
        const aH = parseInt(eH), aA = parseInt(eA);
        if (!isNaN(pH)&&!isNaN(pA)&&!isNaN(aH)&&!isNaN(aA)) {
          if (pH===aH) total+=SCORING.homeGoals;
          if (pA===aA) total+=SCORING.awayGoals;
          const pr=pH>pA?'H':pH<pA?'A':'D', ar=aH>aA?'H':aH<aA?'A':'D';
          if (pr===ar) total+=(ar==='D'?SCORING.correctDraw:SCORING.correctResult);
          if (pH===aH&&pA===aA) total+=SCORING.exactBonus;
        }
      }
      // R16+ bracket pts
      if (mId >= 89) {
        const rnd = ROUND_FOR(mId); if (!rnd||!SCORING.bracketTeam[rnd]) continue;
        if (!um) continue;
        const v = SCORING.bracketTeam[rnd];
        for (const [team, side] of [[um.home,'home'],[um.away,'away']]) {
          if (!team) continue;
          const act = tmr[rnd]?.[team]; if (!act) continue;
          total += (act.matchId===mId && act.side===side) ? v : v*SCORING.halfMultiplier;
        }
      }
    }
    // Bonus picks
    if (winner && pp.bonus.winner===winner) total+=SCORING.bonusPick;
    if (runnerUp && pp.bonus.runnerUp===runnerUp) total+=SCORING.bonusPick;
    if (third && pp.bonus.thirdPlace===third) total+=SCORING.bonusPick;
    if (topTeam && pp.gbTeam===topTeam) total+=SCORING.bonusPick;
    return total;
  });
};

const runSimulation = (N, participants, allPredictions, results, onProgress, onComplete) => {
  const processed = participants.map(p => preprocessForSim(p, allPredictions));
  const fixedGrp = {};
  GROUP_MATCHES.forEach(m => { const r=(results.group||{})[m.id]; if(r&&r.h!==''&&r.h!=null) fixedGrp[m.id]=r; });
  const fixedKo = {};
  for (let mId=73;mId<=104;mId++) { const r=(results.ko||{})[mId]; if(r&&r.h!==''&&r.h!=null) fixedKo[mId]=r; }
  const afterResults = Object.keys(fixedGrp).length + Object.keys(fixedKo).length;
  const n = participants.length;
  const wins = new Int32Array(n), top3 = new Int32Array(n), sums = new Float64Array(n);
  let done = 0;
  const CHUNK = 200;
  const t0 = Date.now();
  const tick = () => {
    const end = Math.min(done+CHUNK, N);
    for (; done<end; done++) {
      const scores = simOneTournament(fixedGrp, fixedKo, processed);
      let max = -Infinity, tieCount = 0;
      for (let i=0;i<n;i++) { sums[i]+=scores[i]; if(scores[i]>max) max=scores[i]; }
      for (let i=0;i<n;i++) { if(scores[i]>=max) tieCount++; }
      for (let i=0;i<n;i++) { if(scores[i]>=max) wins[i]+=1/tieCount; }
      const order = Array.from({length:n},(_,i)=>i).sort((a,b)=>scores[b]-scores[a]);
      for (let k=0;k<Math.min(3,n);k++) top3[order[k]]++;
    }
    onProgress(done, N);
    if (done<N) { setTimeout(tick, 0); return; }
    const elapsed = Date.now()-t0;
    const currentScores = participants.map(p => {
      const preds = allPredictions[p]||{};
      return computeUserScore(preds, results.group||{}, results.ko||{}, results.bracketTeams, results.bonus||{}, preds.joker||{}).total;
    });
    const out = participants.map((p,i) => ({
      name:p, winPct:wins[i]/N*100, top3Pct:top3[i]/N*100,
      expectedScore:Math.round(sums[i]/N*10)/10, currentScore:currentScores[i],
    })).sort((a,b)=>b.winPct-a.winPct);
    onComplete(out, elapsed, afterResults);
  };
  setTimeout(tick, 0);
};
